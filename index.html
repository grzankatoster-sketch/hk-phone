<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>

<title>HK Panel</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#5a1d4a"/>
<script>
/* Auto-aktualizacja: gdy na serwerze pojawi się nowa wersja strony, aplikacja
   dodana do ekranu głównego (standalone PWA) sama się przeładuje — nie trzeba
   jej zamykać ani usuwać i dodawać ponownie. */
(function(){
  var url = location.pathname + (location.search || "");
  var baseline = null, busy = false, INTERVAL = 5 * 60 * 1000;
  function fp(s){ var h = 0; for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return s.length + ":" + h; }
  async function check(){
    if (busy || navigator.onLine === false) return;
    busy = true;
    try {
      var res = await fetch(url, { cache: "no-store" });
      if (res.ok){
        var cur = fp(await res.text());
        if (baseline === null) baseline = cur;
        else if (cur !== baseline){ location.reload(); return; }
      }
    } catch (e) { /* offline / chwilowy błąd — sprawdzimy później */ }
    busy = false;
  }
  if ("serviceWorker" in navigator)
    navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.update(); }).catch(function(){});
  check();
  setInterval(function(){ if (!document.hidden) check(); }, INTERVAL);
  document.addEventListener("visibilitychange", function(){ if (!document.hidden) check(); });
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --plum:#5a1d4a;
  --plum-soft:#7a3a6a;
  --cream:#fdfaf7;
  --paper:#ffffff;
  --ink:#2d1422;
  --muted:#8a6a7e;
  --line:rgba(90,29,74,.14);
  --line-strong:rgba(90,29,74,.28);
  --tint:rgba(90,29,74,.06);
  --blue:#2563eb;
  --green:#0f7a4a;
  --amber:#a07820;
  --lilac:#784b8e;
  --red:#b3261e;
}
html,body{background:var(--cream)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overscroll-behavior:none}
.header{background:var(--plum);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--plum);position:sticky;top:0;z-index:10}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.25)}
.name{font-size:17px;font-weight:800;flex:1;color:#fff}
.shift-badge{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:700}
.tabs{display:flex;background:var(--paper);border-bottom:2px solid var(--line-strong);position:sticky;top:66px;z-index:9}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab-btn.active{color:var(--plum);border-bottom-color:var(--plum)}
.tab-badge{display:inline-block;background:var(--amber);color:#fff;border-radius:999px;font-size:9px;font-weight:900;padding:1px 5px;margin-left:3px;vertical-align:middle}
.stats{display:flex;gap:6px;padding:12px 14px;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap}
.stat{background:var(--tint);border-radius:8px;padding:6px 12px;text-align:center;min-width:56px}
.stat-n{font-size:18px;font-weight:900}
.stat-l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:1px}
.sections{padding:12px 12px 80px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.room-card{background:var(--paper);border-radius:12px;margin-bottom:8px;overflow:hidden;border:1.5px solid var(--line);box-shadow:0 1px 2px rgba(90,29,74,.04);transition:border-color .2s}
.room-card.cleaning{border-color:var(--blue)}
.room-card.done{border-color:var(--green)}
.room-card.skipped{border-color:var(--lilac);opacity:.75}
.room-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.room-no{font-size:26px;font-weight:900;min-width:56px;letter-spacing:-.02em}
.room-status{font-size:12px;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:.04em}
.room-dur{font-size:11px;font-weight:700}
.room-type{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--tint);color:var(--muted);font-weight:700}
.room-phystype{font-size:11px;font-weight:800;padding:2px 8px;border-radius:7px;background:rgba(37,99,235,.1);color:var(--blue);letter-spacing:.02em;flex-shrink:0}
.room-phystype.type-changed{background:rgba(217,119,6,.16);color:var(--amber);box-shadow:0 0 0 2px rgba(217,119,6,.5);animation:typePulse 1.1s ease-in-out infinite}
@keyframes typePulse{0%,100%{box-shadow:0 0 0 2px rgba(217,119,6,.5)}50%{box-shadow:0 0 0 4px rgba(217,119,6,.15)}}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn:active{opacity:.75}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-gray{background:var(--tint);color:var(--plum);border:1px solid var(--line)}
.btn-row{display:flex;gap:8px}
.ask-banner{background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.32);border-radius:8px;padding:10px;font-size:12px;color:var(--blue);font-weight:800;text-align:center;margin-bottom:8px}
.prio-banner{background:rgba(179,38,30,.1);border:1px solid rgba(179,38,30,.35);border-radius:8px;padding:10px;font-size:12.5px;color:var(--red);font-weight:900;text-align:center;margin-bottom:8px}
.reply-panel{margin-top:8px;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--tint)}
.reply-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.reply-chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--plum);cursor:pointer;font-family:inherit}
.reply-chip:active{opacity:.7}
.reply-custom{display:flex;gap:8px}
.reply-custom input{flex:1;min-width:0;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
.reply-custom .btn{width:auto;flex:0 0 auto;padding:12px 16px;font-size:14px}
.report-panel{padding:14px;border-top:1px solid var(--line);display:none}
.report-panel.open{display:block}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.report-item{background:var(--tint);border-radius:8px;padding:10px 8px;text-align:center}
.report-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px}
.report-ctrl{display:flex;align-items:center;justify-content:center;gap:8px}
.report-ctrl button{width:28px;height:28px;border-radius:50%;border:none;background:var(--tint);color:var(--plum);font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
.report-ctrl span{font-size:18px;font-weight:900;min-width:22px;text-align:center}
.extra-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.extra-row input{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 10px;color:var(--ink);font-size:13px;font-family:inherit}
.add-extra{background:var(--tint);border:1px solid var(--line);border-radius:7px;padding:7px 14px;color:var(--plum);font-size:12px;cursor:pointer;font-family:inherit}
.num-input{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:8px 6px;color:var(--ink);font-size:16px;font-weight:800;text-align:center;font-family:inherit}
.num-input:focus{outline:none;border-color:var(--plum)}
.fault-box{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.fault-title{font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.fault-box textarea{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--ink);font-size:13px;font-family:inherit;min-height:64px;resize:vertical}
.fault-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.fault-thumb{position:relative;width:58px;height:58px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.fault-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.fault-thumb button{position:absolute;top:0;right:0;background:rgba(45,20,34,.6);border:none;color:#fff;font-size:13px;font-weight:900;width:20px;height:20px;cursor:pointer;line-height:1}
.fault-add{display:block;width:100%;background:var(--tint);border:1px dashed var(--line-strong);border-radius:8px;padding:11px;color:var(--muted);font-size:13px;text-align:center;cursor:pointer;margin-bottom:8px;font-weight:700}
.fault-add input{display:none}
.btn-fault{background:var(--red);color:#fff}
.found-title{font-size:11px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.btn-found{background:var(--green);color:#fff}
.task-card{background:var(--paper);border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;padding:12px 14px;border-left:3px solid var(--amber)}
.task-text{font-size:14px;font-weight:700;margin-bottom:6px}
.task-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 8px 30px rgba(90,29,74,.25);transition:opacity .3s;white-space:nowrap}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;color:var(--muted);font-size:14px}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--plum);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
/* Team tab */
.team-section{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.team-section-title{padding:10px 14px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--line)}
.worker-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.worker-row:last-child{border-bottom:none}
.worker-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.worker-bar-bg{height:4px;border-radius:999px;background:var(--tint);margin-top:4px}
.worker-bar{height:100%;border-radius:999px;transition:width .3s}
.log-row{display:flex;align-items:flex-start;gap:9px;padding:8px 14px;border-bottom:1px solid var(--line)}
.log-row:last-child{border-bottom:none}
.log-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.log-text{font-size:12px;font-weight:600;line-height:1.4}
.log-time{font-size:10px;color:var(--muted);margin-top:2px}
.ex-card{background:var(--paper);border:2px solid var(--amber);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.ex-title{font-size:13px;font-weight:800;color:var(--amber);margin-bottom:6px}
.ex-btns{display:flex;gap:8px;margin-top:10px}
.ex-accept{flex:1;padding:11px;border-radius:9px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.ex-reject{flex:1;padding:11px;border-radius:9px;border:1.5px solid rgba(179,38,30,.35);background:rgba(179,38,30,.06);color:var(--red);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.ex-accept:active,.ex-reject:active{opacity:.7}
.transfer-btn{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line-strong);background:var(--tint);color:var(--plum);font-size:13px;font-weight:800;cursor:pointer;margin-top:6px;text-align:left;font-family:inherit}
.request-btn{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(37,99,235,.3);background:rgba(37,99,235,.07);color:var(--blue);font-size:13px;font-weight:800;cursor:pointer;margin-top:6px;text-align:left;font-family:inherit}
.transfer-btn:active,.request-btn:active{opacity:.7}
.vac-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:rgba(160,120,32,.1);border:1px solid rgba(160,120,32,.3);color:var(--amber);font-size:12px;font-weight:700;margin:3px}
</style>
</head>
<body>
<div id="app"></div>

<script>
let sb = null;
const app = document.getElementById("app");

const params  = new URLSearchParams(location.search);
// ?w= z URL ma pierwszeństwo i jest zapamiętywany. Uruchomienie z ekranu
// głównego iPhone'a idzie do start_url bez ?w= — wtedy bierzemy z localStorage.
let WORKER = params.get("w") || "";
// ?embed=1 — widok osadzony w panelu menedżera (tryb „Praca"). Wtedy nie
// pokazujemy nakładki „Dodaj do ekranu" (instalacją zarządza panel).
const EMBED = params.get("embed") === "1";
try {
  if (WORKER) localStorage.setItem("hk_worker", WORKER);
  else WORKER = localStorage.getItem("hk_worker") || "";
} catch (e) { /* tryb prywatny / brak storage */ }
const TODAY   = (()=>{ const d=new Date(),p=n=>n<10?"0"+n:""+n; return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); })(); // data LOKALNA — spójna z panelem/serwerem HK
// Musi pasować do VITE_TENANT_ID aplikacji recepcji (domyślny tenant).
const TENANT_ID = "00000000-0000-0000-0000-000000000001";

const COLORS  = ["#5a1d4a","#9b598a","#a07820","#784b8e","#2563eb","#0f7a4a","#c2708a","#b3261e","#7a3a6a","#476d8e"];
const WCOLOR  = COLORS[Math.abs([...WORKER].reduce((s,c)=>s+c.charCodeAt(0),0)) % COLORS.length];
const wColor  = (name) => COLORS[Math.abs([...(name||"")].reduce((s,c)=>s+c.charCodeAt(0),0)) % COLORS.length];

const LINEN = [
  {key:"poszwa",label:"Poszwa"},{key:"poszewki",label:"Poszewki"},
  {key:"przes_sr",label:"Prześ.Śr."},{key:"przes_duze",label:"Prześ.Duże"},
  {key:"recz_duzy",label:"Ręcz.Duży"},{key:"recz_sredni",label:"Ręcz.Śr."},
  {key:"dywanik",label:"Dywanik"},{key:"narzuta",label:"Narzuta"},
  {key:"koldra",label:"Kołdra"},{key:"poduszka",label:"Poduszka"}
];

// ─── State ───────────────────────────────────────────────────────────────────
let myRooms    = [];
let myPmRooms  = [];
let roomStates = {};
let tasks      = [];
let openRoom   = null;
let reports    = {};
let extraItems = {};
let faultDrafts = {}; // room -> {desc, photos:[dataUrl...]}
let foundDrafts = {}; // room -> {desc, photos:[dataUrl...]} — rzeczy znalezione
const MAX_FAULT_PHOTOS = 5;
let isPm       = false;
let pmRoomTypes = {};
let roomTypes  = {}; // { roomNo: "DBL"|"TWIN"|... } — typ fizyczny pokoju (z hk_plan.room_types)
let activeTab  = "rooms";
let roomRequestSent = false; // czy pracownik wysłał już prośbę o pokój (dziś)
let replyOpen  = null; // roomNo|null — otwarty panel odpowiedzi do recepcji
let replyDraft = {};   // { roomNo: "tekst" } — robocza treść własnej odpowiedzi

// Team state
let allAssignments = {}; // { workerName: [roomNo, ...] }
let allRoomStates  = {}; // { roomNo: roomRow }
let allLogs        = []; // recent hk_logs
let hkReminders    = []; // przypomnienia od kierownika HK (hk_reminders)
let pendingExchanges = []; // parsed from logs

// ─── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, color="var(--green)", ms=2200) {
  const el = document.createElement("div");
  el.className = "toast";
  el.style.color = color;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity="0"; setTimeout(()=>el.remove(),300); }, ms);
}

// Pokoje, którym recepcja właśnie zmieniła typ (DBL→TWIN itd.) — podświetlamy
// kartę, żeby zmiana nie umknęła po zniknięciu toasta. Czyścimy po otwarciu pokoju.
const _typeChangedRooms = new Set();

// ─── Helpers ─────────────────────────────────────────────────────────────────
function now() { return new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}); }
function dur(start, end) {
  if (!start||!end) return null;
  return Math.floor((new Date(end)-new Date(start))/60000)+"min";
}
function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function uid() {
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}

// ─── Log helper ───────────────────────────────────────────────────────────────
async function addLog(action, room, extra) {
  if (!sb) return;
  await sb.from("hk_logs").insert({ date:TODAY, log_time:now(), worker:WORKER, action, room:room||null, extra:extra||null });
}

// ─── Room actions ─────────────────────────────────────────────────────────────
async function startRoom(room) {
  const started = new Date().toISOString();
  await sb.from("hk_rooms").upsert({ date:TODAY, room, worker:WORKER, status:"czyszczenie", started_at:started }, {onConflict:"date,room"});
  await addLog("start", room);
  roomStates[room] = {...(roomStates[room]||{}), status:"czyszczenie", started_at:started};
  openRoom = room;
  render();
}

async function doneRoom(room) {
  const done = new Date().toISOString();
  const report = { ...(reports[room]||{}), extraItems: extraItems[room]||[] };
  await sb.from("hk_rooms").upsert({ date:TODAY, room, worker:WORKER, status:"czyste", done_at:done, report }, {onConflict:"date,room"});
  const duration = dur(roomStates[room]?.started_at, done);
  await addLog("done", room, duration);
  roomStates[room] = {...(roomStates[room]||{}), status:"czyste", done_at:done, report};
  openRoom = null;
  render();
  toast(`Pokój ${room} — gotowe ✓`);
}

async function skipRoom(room) {
  const done = new Date().toISOString();
  await sb.from("hk_rooms").upsert({ date:TODAY, room, worker:WORKER, status:"pominięte", done_at:done }, {onConflict:"date,room"});
  await addLog("skip", room);
  roomStates[room] = {...(roomStates[room]||{}), status:"pominięte", done_at:done};
  openRoom = null;
  render();
  toast(`Pokój ${room} — pominięty`,"var(--lilac)");
}

async function doneTask(id, text) {
  await sb.from("hk_tasks").update({ status:"done", done_by:WORKER, done_at:new Date().toISOString() }).eq("id", id);
  await addLog("task_done", null, text);
  toast("Zadanie zakończone ✓");
}

// ─── Report helpers ──────────────────────────────────────────────────────────
function getReport(room) { return reports[room] || (reports[room]={}); }
function getExtra(room)  { return extraItems[room] || (extraItems[room]=[]); }
function getFaultDraft(room) { return faultDrafts[room] || (faultDrafts[room]={desc:"",photos:[]}); }
function getFoundDraft(room) { return foundDrafts[room] || (foundDrafts[room]={desc:"",photos:[]}); }

function addExtraRow(room) {
  getExtra(room).push({name:"",count:1});
  renderReportPanel(room);
}
function removeExtraRow(room, idx) {
  getExtra(room).splice(idx,1);
  renderReportPanel(room);
}

// Wymiana pokoi między pracownikami została USUNIĘTA — przypisaniami zarządza
// wyłącznie recepcja (z pomocą agenta sugestii). Telefon tylko odzwierciedla plan.

// ─── Rooms tab render ─────────────────────────────────────────────────────────
function render() {
  if (!WORKER) { app.innerHTML = `<div class="loading"><div class="empty-icon">⚠️</div><div>Brak parametru ?w= w URL</div></div>`; return; }

  const allRooms = [...myRooms, ...myPmRooms];
  const waiting   = allRooms.filter(r => { const s=roomStates[r]; return !s||s.status==="W"; });
  const cleaning  = allRooms.filter(r => roomStates[r]?.status==="czyszczenie");
  const done      = allRooms.filter(r => roomStates[r]?.status==="czyste");
  const skipped   = allRooms.filter(r => roomStates[r]?.status==="pominięte");
  const vacated   = allRooms.filter(r => roomStates[r]?.vacated && roomStates[r]?.status==="W");
  const myTasks   = tasks.filter(t=>t.status==="open"&&(t.target==="all"||t.target==="morning"||t.target===WORKER||(isPm&&t.target==="pm")));

  let html = `
  <div class="header">
    <div class="avatar" style="background:${WCOLOR}">${WORKER.charAt(0).toUpperCase()}</div>
    <div class="name">${WORKER}</div>
    <div class="shift-badge" style="background:rgba(255,255,255,.16); color:${isPm?"#f0d6e8":"#cdeede"}">${isPm?"PM":"Rano"}</div>
  </div>
  <div class="tabs">
    <button class="tab-btn${activeTab==="rooms"?" active":""}" onclick="switchTab('rooms')">🏠 Moje pokoje</button>
    <button class="tab-btn${activeTab==="team"?" active":""}" onclick="switchTab('team')">👥 Zespół</button>
  </div>`;

  if (activeTab === "team") {
    html += renderTeamHtml();
    app.innerHTML = html;
    return;
  }

  // Rooms tab
  html += `
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:var(--muted)">${waiting.length}</div><div class="stat-l">Czeka</div></div>
    ${cleaning.length?`<div class="stat"><div class="stat-n" style="color:var(--blue)">${cleaning.length}</div><div class="stat-l">Sprząta</div></div>`:""}
    <div class="stat"><div class="stat-n" style="color:var(--green)">${done.length}</div><div class="stat-l">Gotowe</div></div>
    ${skipped.length?`<div class="stat"><div class="stat-n" style="color:var(--lilac)">${skipped.length}</div><div class="stat-l">Pominięte</div></div>`:""}
    ${vacated.length?`<div class="stat"><div class="stat-n" style="color:var(--amber)">${vacated.length}</div><div class="stat-l">Pusty</div></div>`:""}
    ${myTasks.length?`<div class="stat"><div class="stat-n" style="color:var(--amber)">${myTasks.length}</div><div class="stat-l">Zadania</div></div>`:""}
  </div>
  <div class="sections">`;

  if (myTasks.length) {
    html += `<div class="section-title">Zadania (${myTasks.length})</div>`;
    myTasks.forEach(t => {
      html += `<div class="task-card">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-meta">${t.room?"🚪 "+t.room+" · ":""}${escHtml(t.created_by)}</div>
        <button class="btn btn-green" onclick="doneTask('${t.id}','${escHtml(t.text)}')">✓ Gotowe</button>
      </div>`;
    });
  }

  if (cleaning.length) {
    html += `<div class="section-title">W trakcie</div>`;
    cleaning.forEach(r => { html += roomCard(r, "czyszczenie"); });
  }
  if (waiting.length) {
    html += `<div class="section-title">Do sprzątania (${waiting.length})</div>`;
    waiting.forEach(r => { html += roomCard(r, roomStates[r]?.vacated?"vacated":"W"); });
  }
  if (done.length) {
    html += `<div class="section-title">Gotowe (${done.length})</div>`;
    done.forEach(r => { html += roomCard(r, "czyste"); });
  }
  if (skipped.length) {
    html += `<div class="section-title">Pominięte (${skipped.length})</div>`;
    skipped.forEach(r => { html += roomCard(r, "pominięte"); });
  }
  if (!allRooms.length) {
    html += `<div class="empty"><div class="empty-icon">🧹</div><div>Brak przypisanych pokoi na dziś.</div><div style="font-size:12px;margin-top:6px;color:var(--muted)">Poczekaj na przypisanie przez recepcję.</div></div>`;
  }
  html += `</div>`;
  app.innerHTML = html;

  if (openRoom && roomStates[openRoom]?.status === "czyszczenie") {
    const panel = document.getElementById(`rp-${openRoom}`);
    if (panel) { panel.classList.add("open"); renderReportPanel(openRoom); }
  }
}

// ─── Team tab render ──────────────────────────────────────────────────────────
function renderTeam() { render(); }

    ${roomRequestSent

function switchTab(t) {

// ─── Prośba o pokój → recepcja (hk_logs) ───────────────────────────────────────
async function requestRoom() {
  if (!sb || roomRequestSent) return;
  roomRequestSent = true;
  render(); // natychmiastowy feedback (przycisk → potwierdzenie)
  const myRemaining = [...myRooms, ...myPmRooms].filter(r => { const s=roomStates[r]; return !s||s.status==="W"; }).length;
  const note = myRemaining > 0
    ? `${WORKER} prosi o pokój (zostało ${myRemaining})`
    : `${WORKER} skończyła i prosi o pokój`;
  try {
    await addLog("room_request", null, note);
    toast("Prośba wysłana do recepcji ✓", "var(--green)");
  } catch (e) {
    roomRequestSent = false;
    toast("Nie udało się wysłać prośby", "var(--red)");
    render();
  }
}

// ─── Odpowiedź do recepcji (na pytanie o status pokoju) ────────────────────────
const REPLY_PRESETS = ["Myję podłogę", "Już kończę", "Dopiero zaczynam"];

// Czy recepcja oznaczyła pokój jako PILNY (w pierwszej kolejności)? priority bez późniejszego priority_off.
function priorityFor(no) {
  let on = false;
  for (const l of allLogs) {
    if (l.room !== no) continue;
    if (l.action === "priority") on = true;
    else if (l.action === "priority_off") on = false;
  }
  return on;
}

// Czy recepcja czeka na odpowiedź o tym pokoju? (info_request bez późniejszego info_reply)
function pendingAskFor(no) {
  let pending = false;
  for (const l of allLogs) {
    if (l.room !== no) continue;
    if (l.action === "info_request") pending = true;
    else if (l.action === "info_reply") pending = false;
  }
  return pending;
}

function toggleReply(no) {
  replyOpen = replyOpen === no ? null : no;
  render();
}

async function sendReply(no, text) {
  const t = (text || "").trim();
  if (!sb || !t) return;
  replyOpen = null;
  replyDraft[no] = "";
  render();
  try {
    await addLog("info_reply", no, t.slice(0, 200));
    toast("Odpowiedź wysłana do recepcji ✓", "var(--green)");
  } catch (e) {
    toast("Nie udało się wysłać odpowiedzi", "var(--red)");
  }
}

function renderReplyPanel(no) {
  const presets = REPLY_PRESETS.map(p =>
    `<button type="button" class="reply-chip" onclick="sendReply('${no}',this.textContent)">${p}</button>`
  ).join("");
  return `<div class="reply-panel">
    <div class="reply-presets">${presets}</div>
    <div class="reply-custom">
      <input id="replyin-${no}" placeholder="Własna odpowiedź…" value="${escHtml(replyDraft[no]||"")}"
        oninput="replyDraft['${no}']=this.value">
      <button type="button" class="btn btn-blue" onclick="sendReply('${no}',document.getElementById('replyin-${no}').value)">Wyślij</button>
    </div>
  </div>`;
}

// ─── Room card ────────────────────────────────────────────────────────────────
function roomCard(no, status) {
  const rs    = roomStates[no] || {};
  const isOpen = openRoom === no;
  const pm    = myPmRooms.includes(no);
  const pmt   = pmRoomTypes[no];

  const colors = { W:"var(--muted)", czyszczenie:"var(--blue)", czyste:"var(--green)", "pominięte":"var(--lilac)", vacated:"var(--amber)" };
  const labels = { W:"Czeka", czyszczenie:"Sprząta", czyste:"Czyste ✓", "pominięte":"Pominięte", vacated:"Pokój pusty" };
  const col = colors[status] || "var(--muted)";
  const lbl = labels[status] || "Czeka";
  const duration = (status==="czyste"||status==="czyszczenie") ? dur(rs.started_at, rs.done_at||new Date().toISOString()) : null;

  const pendingAsk = pendingAskFor(no);
  const isPriority  = priorityFor(no);
  const prioBanner = isPriority ? `<div class="prio-banner">⚡ Recepcja: posprzątaj w pierwszej kolejności</div>` : "";
  const askBanner  = pendingAsk ? `<div class="ask-banner">💬 Recepcja pyta o status — odpowiedz</div>` : "";
  // Przycisk odpowiedzi (z gotowcami) pokazujemy TYLKO gdy recepcja faktycznie
  // pyta o status pokoju. Bez pytania pracownik widzi sam "Zaczynam sprzątać".
  const replyBtn   = pendingAsk ? `<button class="btn btn-amber" style="flex:1;min-width:0" onclick="toggleReply('${no}')">💬 Odpowiedz</button>` : "";
  const replyUI    = replyOpen === no ? renderReplyPanel(no) : "";

  // Pobyt (PG/PGZ, zmiana popołudniowa) — gość może nie chcieć sprzątania.
  // Wyjazdy (W/WP) zawsze trzeba posprzątać, więc bez tego przycisku.
  const isPobyt = pmt === "PG" || pmt === "PGZ";

  let buttons = "";
  if (status === "W" || status === "vacated") {
    buttons = `<div class="btn-row"><button class="btn btn-blue" style="flex:3" onclick="startRoom('${no}')">▶ Zaczynam sprzątać</button>${replyBtn}</div>`;
    // Dla pobytów od razu drugi przycisk obok startu (nie po rozpoczęciu sprzątania).
    if (isPobyt) buttons += `<button class="btn btn-amber" onclick="skipRoom('${no}')" style="margin-top:8px">✕ Goście nie chcieli</button>`;
    if (status === "vacated") buttons = `<div style="background:rgba(160,120,32,.1);border:1px solid rgba(160,120,32,.3);border-radius:8px;padding:10px;font-size:12px;color:var(--amber);font-weight:700;text-align:center;margin-bottom:8px">🔔 Recepcja: pokój pusty</div>` + buttons;
  } else if (status === "czyszczenie") {
    buttons = `
      <div class="btn-row" style="margin-bottom:8px"><button class="btn btn-green" style="flex:3" onclick="toggleReport('${no}')">📋 ${isOpen?"Ukryj raport":"Wypełnij raport i zatwierdź"}</button>${replyBtn}</div>
      <div id="rp-${no}" class="report-panel"></div>`;
  } else if (pendingAsk) {
    // Pokój już posprzątany/pominięty, ale recepcja pyta — pozwól odpisać
    buttons = `<div class="btn-row">${replyBtn}</div>`;
  }
  buttons = prioBanner + askBanner + buttons + replyUI;

  return `<div class="room-card ${status==="czyszczenie"?"cleaning":status==="czyste"?"done":status==="pominięte"?"skipped":""}">
    <div class="room-head" onclick="toggleRoom('${no}')">
      <div class="room-no" style="color:${col}">${no}</div>
      ${roomTypes[no]?`<div class="room-phystype${_typeChangedRooms.has(no)?" type-changed":""}">${escHtml(roomTypes[no])}${_typeChangedRooms.has(no)?" 🔄":""}</div>`:""}
      <div class="room-status" style="color:${col}">${lbl}</div>
      ${duration?`<div class="room-dur" style="color:${col}">${duration}</div>`:""}
      ${pm?`<div class="room-type">${pmt||"PM"}</div>`:""}
    </div>
    ${buttons ? `<div style="padding:0 12px 12px">${buttons}</div>` : ""}
  </div>`;
}

function toggleRoom(no) {
  openRoom = openRoom === no ? null : no;
  _typeChangedRooms.delete(no); // Kasia otworzyła pokój — zmianę typu uznajemy za zauważoną
  render();
}
function toggleReport(no) {
  const panel = document.getElementById(`rp-${no}`);
  if (!panel) return;
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) renderReportPanel(no);

      <button onclick="removeExtraRow('${room}',${idx})" style="background:var(--tint);border:1px solid var(--line);border-radius:7px;padding:6px 10px;color:var(--red);cursor:pointer">✕</button>

  html += `<button class="btn btn-green" onclick="doneRoom('${room}')">✓ Gotowe — zatwierdź raport</button>`;

  });

    </label>
    <button class="btn btn-fault" onclick="reportFault('${room}')">⚠ Wyślij zgłoszenie usterki</button>
  </div>`;

  // ── Znaleziony przedmiot (na dole pokoju, działa jak usterka) ──
  const found = getFoundDraft(room);
  html += `<div class="fault-box">
    <div class="found-title">📦 Znaleziony przedmiot</div>
    <textarea placeholder="Co znalazłaś? Opisz przedmiot…" oninput="getFoundDraft('${room}').desc=this.value">${escHtml(found.desc)}</textarea>
    <div class="fault-thumbs">`;
  found.photos.forEach((p,idx) => {
    html += `<div class="fault-thumb"><img src="${p}"/><button onclick="removeFoundPhoto('${room}',${idx})">✕</button></div>`;
  });
  html += `</div>
    <label class="fault-add">📷 Dodaj zdjęcie (aparat lub galeria)
      <input type="file" accept="image/*" capture="environment" multiple onchange="addFoundPhotos('${room}',this)">
    </label>
    <button class="btn btn-found" onclick="reportFound('${room}')">📦 Zgłoś znaleziony przedmiot</button>
  </div>`;

  panel.innerHTML = html;
}

// ─── Usterki (zdjęcia → Supabase Storage, wpis → tabela faults) ─────────────────
async function compressImage(file) {
  const dataUrl = await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file); });
  const img = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=dataUrl; });
  const max=1600; let w=img.width, h=img.height;
  if (w>max||h>max) { const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  c.getContext("2d").drawImage(img,0,0,w,h);
  return c.toDataURL("image/jpeg",0.7);
}
async function addFaultPhotos(room, input) {
  const fd=getFaultDraft(room);
  for (const f of [...(input.files||[])]) {
    if (fd.photos.length>=MAX_FAULT_PHOTOS) { toast("Maks. "+MAX_FAULT_PHOTOS+" zdjęć","var(--amber)"); break; }
    try { fd.photos.push(await compressImage(f)); } catch { toast("Nie udało się wczytać zdjęcia","var(--red)"); }
  }
  input.value="";
  renderReportPanel(room);
}
function removeFaultPhoto(room, idx) { getFaultDraft(room).photos.splice(idx,1); renderReportPanel(room); }
async function reportFault(room) {
  const fd=getFaultDraft(room);
  if (!fd.desc.trim()) { toast("Opisz usterkę","var(--red)"); return; }
  if (!sb) { toast("Brak połączenia","var(--red)"); return; }
  toast("Wysyłanie usterki…","var(--blue)");
  const urls=[];
  for (const dataUrl of fd.photos) {
    try {
      const blob = await (await fetch(dataUrl)).blob();
      const path = `${TODAY}/${uid()}.jpg`;
      const { error } = await sb.storage.from("hk-faults").upload(path, blob, { contentType:"image/jpeg", upsert:false });
      if (!error) urls.push(sb.storage.from("hk-faults").getPublicUrl(path).data.publicUrl);
    } catch {}
  }
  const { error } = await sb.from("faults").insert({
    tenant_id:TENANT_ID, source:"hk", floor:"hk", space_id:room, room,
    description:fd.desc.trim(), reported_by:WORKER, status:"open", priority:"normal", photos:urls
  });
  if (error) { toast("Błąd zapisu usterki","var(--red)"); return; }
  await addLog("usterka", room, fd.desc.trim().slice(0,120));
  faultDrafts[room]={desc:"",photos:[]};
  toast("Usterka zgłoszona ✓","var(--green)");
  renderReportPanel(room);
}

// ─── Rzeczy znalezione (analogicznie do usterek: zdjęcia → Storage, wpis → found_items) ───
async function addFoundPhotos(room, input) {
  const fd=getFoundDraft(room);
  for (const f of [...(input.files||[])]) {
    if (fd.photos.length>=MAX_FAULT_PHOTOS) { toast("Maks. "+MAX_FAULT_PHOTOS+" zdjęć","var(--amber)"); break; }
    try { fd.photos.push(await compressImage(f)); } catch { toast("Nie udało się wczytać zdjęcia","var(--red)"); }
  }
  input.value="";
  renderReportPanel(room);
}
function removeFoundPhoto(room, idx) { getFoundDraft(room).photos.splice(idx,1); renderReportPanel(room); }
async function reportFound(room) {
  const fd=getFoundDraft(room);
  if (!fd.desc.trim()) { toast("Opisz znaleziony przedmiot","var(--red)"); return; }
  if (!sb) { toast("Brak połączenia","var(--red)"); return; }
  toast("Wysyłanie zgłoszenia…","var(--blue)");
  const urls=[];
  for (const dataUrl of fd.photos) {
    try {
      const blob = await (await fetch(dataUrl)).blob();
      const path = `found/${TODAY}/${uid()}.jpg`;
      const { error } = await sb.storage.from("hk-faults").upload(path, blob, { contentType:"image/jpeg", upsert:false });
      if (!error) urls.push(sb.storage.from("hk-faults").getPublicUrl(path).data.publicUrl);
    } catch {}
  }
  const { error } = await sb.from("found_items").insert({
    tenant_id:TENANT_ID, source:"hk", room,
    description:fd.desc.trim(), reported_by:WORKER, status:"open", photos:urls
  });
  if (error) { toast("Błąd zapisu zgłoszenia","var(--red)"); return; }
  await addLog("znalezione", room, fd.desc.trim().slice(0,120));
  foundDrafts[room]={desc:"",photos:[]};
  toast("Przedmiot zgłoszony ✓","var(--green)");
  renderReportPanel(room);
}

// ─── Team data load ───────────────────────────────────────────────────────────
async function loadTeamData() {
  if (!sb) return;
  const [{ data: plan }, { data: rData }, { data: lData }, remRes] = await Promise.all([
    sb.from("hk_plan").select("assignments,pm_assignments,pm_room_types,room_types").eq("date", TODAY).single(),
    sb.from("hk_rooms").select("*").eq("date", TODAY),
    sb.from("hk_logs").select("*").eq("date", TODAY).order("created_at"),
    sb.from("hk_reminders").select("body,active,created_at").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(20).then(r=>r, ()=>({data:[]})),
  ]);

  if (plan) {
    allAssignments = {...(plan.assignments||{}), ...(plan.pm_assignments||{})};
    roomTypes = plan.room_types || roomTypes;
  }
  if (rData) {
    allRoomStates = {};
    rData.forEach(r => { allRoomStates[r.room] = r; });
  }
  if (lData) allLogs = lData;
  hkReminders = ((remRes && remRes.data) || []).filter(r => r.active !== false);
}

// ─── Polling fallback ─────────────────────────────────────────────────────────
// Realtime bywa zawodny na telefonach (uśpiony ekran, zerwany websocket, wyłączony
// Realtime na tabeli). Co 12 s dociągamy dane, by zadania i przypisania z recepcji
// pojawiały się bez ręcznego odświeżania. Pomijamy odświeżenie, gdy ktoś właśnie pisze.
async function refreshData() {
  if (!WORKER || !sb) return;
  const ae = document.activeElement;
  if (ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return; // nie kasuj wpisywanego tekstu
  try {
    const { data: plan } = await sb.from("hk_plan").select("assignments,pm_assignments,pm_room_types,room_types").eq("date", TODAY).single();
    if (plan) {
      myRooms   = (plan.assignments   || {})[WORKER] || [];
      myPmRooms = (plan.pm_assignments|| {})[WORKER] || [];
      pmRoomTypes = plan.pm_room_types || {};
      roomTypes = plan.room_types || {};
      isPm = myPmRooms.length > 0 && myRooms.length === 0;
      allAssignments = {...(plan.assignments||{}), ...(plan.pm_assignments||{})};
    }
    const allRooms = [...myRooms, ...myPmRooms];
    if (allRooms.length) {
      const { data: rData } = await sb.from("hk_rooms").select("*").eq("date", TODAY);
      if (rData) { roomStates = {}; allRoomStates = {}; rData.forEach(r => { roomStates[r.room]=r; allRoomStates[r.room]=r; }); }
    }
    const { data: tData } = await sb.from("hk_tasks").select("*").eq("date", TODAY).order("created_at");
    if (tData) tasks = tData;
    const { data: lData } = await sb.from("hk_logs").select("*").eq("date", TODAY).order("created_at");
    if (lData) allLogs = lData;
    const y = window.scrollY;
    render();
    window.scrollTo(0, y);
    checkAcks();
  } catch (e) { /* sieć padła — spróbujemy za 12 s */ }
}

// ─── Wybór pracownika (gdy brak ?w=, np. start z ekranu głównego iPhone) ───────
function setWorker(name) {
  try { localStorage.setItem("hk_worker", name); } catch (e) {}
  const u = new URL(location.href);
  u.searchParams.set("w", name);
  location.replace(u.toString());
}

async function pickWorker() {
  if (!sb) { render(); return; }
  app.innerHTML = `<div class="loading"><div class="spinner"></div><div>Ładowanie…</div></div>`;
  // Imiona z DWÓCH źródeł: rozpisane pokoje (hk_plan) ORAZ obsada na dziś
  // (hk_roster). Dzięki temu rozpisany pracownik pojawia się na liście wyboru,
  // nawet jeśli recepcja nie przydzieliła mu jeszcze pokoi.
  const [{ data: plan }, { data: rosterRow }] = await Promise.all([
    sb.from("hk_plan").select("assignments,pm_assignments").eq("date", TODAY).maybeSingle(),
    sb.from("hk_roster").select("roster").eq("tenant_id", TENANT_ID).eq("date", TODAY).maybeSingle(),
  ]);
  const rosterNames = (Array.isArray(rosterRow?.roster) ? rosterRow.roster : [])
    .map(p => (p && p.name) || (typeof p === "string" ? p : null))
    .filter(Boolean);
  const names = [...new Set([
    ...Object.keys(plan?.assignments || {}),
    ...Object.keys(plan?.pm_assignments || {}),
    ...rosterNames,
  ])].sort((a, b) => a.localeCompare(b, "pl"));

  if (!names.length) {
    // Brak rozpiski na dziś — ale apka z ekranu głównego i tak musi wiedzieć,
    // kim jesteśmy (ma własny localStorage, osobny od Safari). Dajemy wpisać imię
    // ręcznie; zapamiętamy je na tym telefonie i ikona zacznie działać na stałe.
    app.innerHTML = `<div style="padding:24px 16px;max-width:480px;margin:0 auto">
      <div style="font-size:20px;font-weight:800;margin-bottom:6px;color:var(--plum)">Kto sprząta?</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Nie ma jeszcze rozpiski na dziś. Wpisz swoje imię — zapamiętamy je na tym telefonie i nie trzeba będzie tego powtarzać.</div>
      <input id="wname" type="text" autocomplete="name" placeholder="Twoje imię"
        style="width:100%;padding:14px 16px;margin-bottom:12px;background:var(--paper);border:1px solid var(--line);border-radius:14px;color:var(--ink);font-size:16px;box-sizing:border-box"/>
      <button id="wgo" style="width:100%;padding:14px 16px;background:var(--plum);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Zapamiętaj i wejdź</button>
    </div>`;
    const inp = document.getElementById("wname");
    const go  = () => { const v = (inp.value || "").trim(); if (v) setWorker(v); };
    document.getElementById("wgo").onclick = go;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
    inp.focus();
    return;
  }

  let html = `<div style="padding:24px 16px;max-width:480px;margin:0 auto">
    <div style="font-size:20px;font-weight:800;margin-bottom:6px;color:var(--plum)">Kto sprząta?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Wybierz swoje imię — zapamiętamy je na tym telefonie.</div>`;
  names.forEach(n => {
    html += `<button data-name="${escHtml(n)}" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;margin-bottom:10px;background:var(--paper);border:1px solid var(--line);border-radius:14px;color:var(--ink);font-size:16px;font-weight:700;text-align:left;cursor:pointer;box-shadow:0 1px 2px rgba(90,29,74,.04)">
      <span style="width:34px;height:34px;border-radius:50%;background:${wColor(n)};display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${escHtml((n[0] || "?").toUpperCase())}</span>
      ${escHtml(n)}
    </button>`;
  });
  html += `</div>`;
  app.innerHTML = html;
  app.querySelectorAll("button[data-name]").forEach(b => b.onclick = () => setWorker(b.dataset.name));
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (!WORKER) { await pickWorker(); return; }
  if (!sb) { app.innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)">Brak konfiguracji Supabase.</div>'; return; }
  app.innerHTML = `<div class="loading"><div class="spinner"></div><div>Ładowanie…</div></div>`;

  const { data: plan } = await sb.from("hk_plan").select("assignments,pm_assignments,pm_room_types,room_types").eq("date", TODAY).single();
  if (plan) {
    myRooms   = (plan.assignments   || {})[WORKER] || [];
    myPmRooms = (plan.pm_assignments|| {})[WORKER] || [];
    pmRoomTypes = plan.pm_room_types || {};
    roomTypes = plan.room_types || {};
    isPm = myPmRooms.length > 0 && myRooms.length === 0;
    allAssignments = {...(plan.assignments||{}), ...(plan.pm_assignments||{})};
  }

  const allRooms = [...myRooms, ...myPmRooms];
  if (allRooms.length) {
    const { data: rData } = await sb.from("hk_rooms").select("*").eq("date", TODAY);
    if (rData) {
      rData.forEach(r => { roomStates[r.room] = r; allRoomStates[r.room] = r; });
    }
  }

  const { data: tData } = await sb.from("hk_tasks").select("*").eq("date", TODAY).order("created_at");
  if (tData) tasks = tData;

  const { data: lData } = await sb.from("hk_logs").select("*").eq("date", TODAY).order("created_at");
  if (lData) allLogs = lData;

  render();
  checkAcks();

  // Realtime
  const allMyRooms = [...myRooms, ...myPmRooms];
  sb.channel(`phone-${WORKER}-${TODAY}`)
    .on("postgres_changes",{event:"*",schema:"public",table:"hk_rooms",filter:`date=eq.${TODAY}`}, ({new:row})=>{
      if (!row) return;
      if (row.worker === WORKER && !allMyRooms.includes(row.room)) {
        myRooms.push(row.room);
        allMyRooms.push(row.room);
      }
      roomStates[row.room]    = row;
      allRoomStates[row.room] = row;
      render();
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"hk_tasks",filter:`date=eq.${TODAY}`}, ({new:row,old,eventType})=>{
      if (eventType==="INSERT") tasks=[row,...tasks];
      else if (eventType==="UPDATE") tasks=tasks.map(t=>t.id===row.id?row:t);
      else if (eventType==="DELETE") tasks=tasks.filter(t=>t.id!==old.id);
      render();
    })
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"hk_plan",filter:`date=eq.${TODAY}`}, async ({new:row})=>{
      const newRooms   = (row.assignments   ||{})[WORKER] || [];
      const newPmRooms = (row.pm_assignments||{})[WORKER] || [];
      allAssignments = {...(row.assignments||{}), ...(row.pm_assignments||{})};
      // Zmiana TYPU pokoju (DBL→TWIN itd.) na MOICH pokojach — to się dotąd
      // działo po cichu (tylko przerysowanie). Wykrywamy diff i alarmujemy.
      const nextTypes = row.room_types || roomTypes;
      const mine = [...myRooms, ...myPmRooms];
      for (const no of mine) {
        const was = roomTypes[no], now = nextTypes[no];
        if (was && now && was !== now) {
          _typeChangedRooms.add(no);
          toast(`🔄 Pokój ${no}: typ ${was} → ${now} (zmiana recepcji)`, "var(--amber)", 6000);
          if (navigator.vibrate) try { navigator.vibrate([120,60,120]); } catch {}
        }
      }
      roomTypes = nextTypes;
      if (JSON.stringify(newRooms)!==JSON.stringify(myRooms)||JSON.stringify(newPmRooms)!==JSON.stringify(myPmRooms)) {
        myRooms=newRooms; myPmRooms=newPmRooms; pmRoomTypes=row.pm_room_types||{};
        isPm=myPmRooms.length>0&&myRooms.length===0;
        const all=[...myRooms,...myPmRooms];
        if (all.length) {
          const {data}=await sb.from("hk_rooms").select("*").eq("date",TODAY).in("room",all);
          if (data) data.forEach(r=>{ roomStates[r.room]=r; allRoomStates[r.room]=r; });
        }
        toast("Recepcja zaktualizowała plan","var(--blue)");
      }
      render();
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"hk_logs",filter:`date=eq.${TODAY}`}, ({new:row})=>{
      if (!row) return;
      allLogs = [...allLogs, row];
      render();
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"hk_quality_checks",filter:`date=eq.${TODAY}`}, ({new:row})=>{
      if (row && _firstName(row.target_worker)===_firstName(WORKER)) checkAcks();
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"hk_reminders"}, ()=> checkAcks())
    .subscribe();

  // Fallback do Realtime — gwarantuje, że nowe zadania/przypisania pojawią się
  // bez ręcznego odświeżania, nawet gdy websocket nie dostarczy zdarzenia.
  if (!window.__hkPoll) window.__hkPoll = setInterval(refreshData, 12000);
}

// ─── Powiadomienia „do przeklikania" (kontrole pokoi + przypomnienia) ──────────
// Imię porównujemy po pierwszym członie (plan: „Anna Kowalska" = ?w=Anna).
const _firstName = (n) => String(n||"").trim().toLowerCase().split(/\s+/)[0];
let _ackBusy = false;

async function checkAcks() {
  if (!sb || !WORKER || _ackBusy) return;
  if (document.getElementById("ackModal")) return;   // jeden modal naraz
  _ackBusy = true;
  try {
    // 1) Losowe kontrole pokoi przypisane do mnie (najpilniejsze).
    const { data: qc } = await sb.from("hk_quality_checks")
      .select("*").eq("date", TODAY).eq("status", "pending").order("created_at");
    const mine = (qc||[]).filter(c => _firstName(c.target_worker) === _firstName(WORKER));
    if (mine.length) { showQcModal(mine[0]); return; }

    // 2) Przypomnienia bez mojego potwierdzenia. W trybie Praca kierownika (EMBED)
    //    pomijamy — to ona je wysyła, nie musi sama sobie ich potwierdzać.
    if (EMBED) return;
    const { data: rems } = await sb.from("hk_reminders")
      .select("id,body,active,created_at").eq("tenant_id", TENANT_ID).order("created_at");
    const active = (rems||[]).filter(r => r.active !== false);
    if (active.length) {
      const ids = active.map(r=>r.id);
      const { data: acks } = await sb.from("hk_reminder_acks")
        .select("reminder_id").eq("worker", WORKER).in("reminder_id", ids);
      const acked = new Set((acks||[]).map(a=>a.reminder_id));
      const todo = active.filter(r => !acked.has(r.id));
      if (todo.length) { showReminderModal(todo[0]); return; }
    }
  } catch (e) { /* sieć — spróbujemy przy następnym odświeżeniu */ }
  finally { _ackBusy = false; }
}

function _ackOverlay(inner) {
  const o = document.createElement("div");
  o.id = "ackModal";
  o.style.cssText = "position:fixed;inset:0;z-index:1200;background:rgba(45,20,34,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;font-family:inherit";
  o.innerHTML = `<div style="background:var(--paper);width:100%;max-width:520px;border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -12px 40px rgba(45,20,34,.4);max-height:90vh;overflow:auto;animation:slideup .25s ease">${inner}</div>`;
  document.body.appendChild(o);
  return o;
}

function showQcModal(c) {
  const items = Array.isArray(c.items) ? c.items : [];
  const rows = items.map((it,i)=>`
    <label style="display:flex;align-items:center;gap:11px;padding:13px 12px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:9px;font-size:14.5px;color:var(--ink);cursor:pointer">
      <input type="checkbox" data-qi="${i}" style="width:22px;height:22px;flex-shrink:0;accent-color:var(--plum)"/>
      <span>${escHtml(it.q)}</span>
    </label>`).join("");
  const o = _ackOverlay(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="font-size:22px">🔍</span>
      <div style="font-size:18px;font-weight:800;color:var(--plum)">Kontrola pokoju ${escHtml(c.room)}</div>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${c.cleaned_by?("Sprzątał(a): "+escHtml(c.cleaned_by)+". "):""}Sprawdź pokój i potwierdź każdy punkt.</div>
    <div id="qcItems">${rows||'<div style="color:var(--muted);font-size:13px">Brak pytań w checkliście.</div>'}</div>
    <button id="qcConfirm" disabled style="width:100%;margin-top:8px;padding:14px;border:none;border-radius:12px;background:var(--plum);color:#fff;font-size:15px;font-weight:800;cursor:pointer;opacity:.5">Zatwierdź kontrolę</button>`);
  const btn = o.querySelector("#qcConfirm");
  const boxes = [...o.querySelectorAll("input[data-qi]")];
  const sync = () => { const all = boxes.length>0 && boxes.every(b=>b.checked); btn.disabled=!all; btn.style.opacity = all?"1":".5"; };
  boxes.forEach(b => b.onchange = sync);
  if (!boxes.length) { btn.disabled=false; btn.style.opacity="1"; }
  btn.onclick = async () => {
    btn.disabled = true;
    const checkedItems = items.map((it,i)=>({ q: it.q, checked: boxes[i] ? boxes[i].checked : true }));
    try {
      await sb.from("hk_quality_checks").update({ status:"done", acked_at:new Date().toISOString(), items:checkedItems }).eq("id", c.id);
    } catch(e){}
    o.remove();
    toast("Kontrola pokoju "+c.room+" zatwierdzona ✓");
    setTimeout(checkAcks, 300);   // może czeka kolejne powiadomienie
  };
}

function showReminderModal(r) {
  const o = _ackOverlay(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:22px">📌</span>
      <div style="font-size:18px;font-weight:800;color:var(--plum)">Przypomnienie</div>
    </div>
    <div style="font-size:15px;color:var(--ink);line-height:1.55;background:rgba(90,29,74,.05);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px">${escHtml(r.body)}</div>
    <button id="remOk" style="width:100%;padding:14px;border:none;border-radius:12px;background:var(--plum);color:#fff;font-size:15px;font-weight:800;cursor:pointer">Przeczytałam — OK</button>`);
  o.querySelector("#remOk").onclick = async () => {
    try { await sb.from("hk_reminder_acks").insert({ reminder_id:r.id, worker:WORKER }); } catch(e){}
    o.remove();
    setTimeout(checkAcks, 300);
  };
}
