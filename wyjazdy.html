<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#5a1d4a"/>
<title>Wyjazdy • HK</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --plum:#5a1d4a;
  --plum-soft:#7a3a6a;
  --cream:#fdfaf7;
  --paper:#ffffff;
  --ink:#2d1422;
  --muted:#8a6a7e;
  --line:rgba(90,29,74,.14);
  --line-strong:rgba(90,29,74,.28);
}
html,body{background:var(--cream)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overscroll-behavior:none}
.hdr{background:var(--plum);color:#fff;padding:14px 16px;border-bottom:2px solid var(--plum);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo svg{flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .t1{font-family:'DM Serif Display',Georgia,serif;font-size:14px;letter-spacing:.18em;font-weight:400}
.logo-text .t2{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.04em}
.dot{width:8px;height:8px;border-radius:50%;background:#7ad9a8;flex-shrink:0;box-shadow:0 0 6px rgba(122,217,168,.6)}
.dot.off{background:#f59ea6;box-shadow:0 0 6px rgba(245,158,166,.6)}
.sync{font-size:10px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums}
.legend{padding:12px 16px 4px;color:var(--muted);font-size:11px;line-height:1.6}
.days{padding:10px 12px;display:flex;flex-direction:column;gap:9px;padding-bottom:40px}
.day{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 2px rgba(90,29,74,.04)}
.day.today{border-color:var(--plum);background:linear-gradient(180deg,rgba(90,29,74,.06) 0%,var(--paper) 100%)}
.day.tomorrow{border-color:var(--line-strong)}
.day.empty{opacity:.55}
.dleft{flex:1;min-width:0}
.ddow{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.ddate{font-family:'DM Serif Display',Georgia,serif;font-size:22px;font-weight:400;margin-top:2px;line-height:1.05;color:var(--plum)}
.dlbl{font-size:10px;color:var(--plum);font-weight:800;margin-top:3px;letter-spacing:.08em}
.dright{display:flex;gap:8px;flex-shrink:0}
.pill{min-width:60px;text-align:center;border-radius:10px;padding:8px 9px;border:1.5px solid}
.pill .pl{font-size:9px;font-weight:800;letter-spacing:.06em;white-space:nowrap;text-transform:uppercase}
.pill .pv{font-size:22px;font-weight:900;line-height:1.1;margin-top:2px;font-variant-numeric:tabular-nums}
/* Brand palette derived from plum: deep plum, mauve, gold accent, lilac */
.pill.w  {border-color:rgba(90,29,74,.5);background:rgba(90,29,74,.07);color:#5a1d4a}
.pill.wp {border-color:rgba(155,89,138,.55);background:rgba(155,89,138,.08);color:#9b598a}
.pill.pg {border-color:rgba(176,128,40,.55);background:rgba(176,128,40,.08);color:#a07820}
.pill.pgz{border-color:rgba(120,75,142,.55);background:rgba(120,75,142,.08);color:#784b8e}
.pill.zero{opacity:.4}
.foot{text-align:center;color:var(--muted);font-size:11px;padding:10px}
@media (max-width:420px){
  .day{align-items:stretch;flex-direction:column;gap:10px}
  .dright{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .pill{min-width:0;padding:8px 4px}
  .pill .pl{font-size:8px}
  .pill .pv{font-size:19px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <svg viewBox="0 0 80 12" width="44" height="11" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ffffff">
        <circle cx="20" cy="6" r="2.4"/>
        <circle cx="32" cy="6" r="2.4"/>
        <circle cx="48" cy="6" r="2.4"/>
        <circle cx="60" cy="6" r="2.4"/>
      </g>
    </svg>
    <div class="logo-text">
      <div class="t1">CONRAD COMFORT</div>
      <div class="t2">Wyjazdy • Manager HK</div>
    </div>
  </div>
  <div class="dot" id="dot"></div>
  <div class="sync" id="sync"></div>
</div>
<div class="legend">Następne 7 dni • każdy dzień pokazuje osobno Wyjazd, W/P, PG i PGZ. Format 31+1 oznacza 31 pokoi + 1 apartament.</div>
<div id="days" class="days"><div class="foot">Pobieranie danych...</div></div>
<div class="foot" id="lastUpd"></div>
<script>
const SB_URL = "https://pjgcaujndvjvicqsdcns.supabase.co";
const SB_KEY = "sb_publishable_h_uQ7-zzck71HIWxnlwTbQ_Io9m7wfb";
const DAYS = 7;
const APT_ROOMS = ["106","206","218","306","318"];
const DOW = ["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];
const MON = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];

const pad = n => n<10 ? "0"+n : ""+n;
const isoDate = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());

function buildRange() {
  const out = [];
  const t = new Date(); t.setHours(0,0,0,0);
  for (let i=0; i<DAYS; i++) {
    out.push(isoDate(new Date(t.getTime()+i*86400000)));
  }
  return out;
}

function flattenAssignments(assignments) {
  const rooms = [];
  if (assignments && typeof assignments === "object") {
    Object.values(assignments).forEach(list => {
      if (Array.isArray(list)) list.forEach(no => rooms.push(String(no)));
    });
  }
  return [...new Set(rooms)].sort((a,b) => a.localeCompare(b, "pl", { numeric: true }));
}

function splitRooms(rooms) {
  const apt = rooms.filter(no => APT_ROOMS.includes(no)).length;
  return { total: rooms.length, reg: rooms.length - apt, apt };
}

function countTypes(plan) {
  const data = plan || {};
  const pmRoomTypes = data.pmRoomTypes || {};
  const assignedWRooms = flattenAssignments(data.assignments);
  const typedWRooms = [];
  const typedWpRooms = [];
  let pg=0, pgz=0;
  if (pmRoomTypes && typeof pmRoomTypes === "object") {
    Object.entries(pmRoomTypes).forEach(([no,v]) => {
      if (v==="W") typedWRooms.push(String(no));
      else if (v==="WP") typedWpRooms.push(String(no));
      else if (v==="PG") pg++;
      else if (v==="PGZ") pgz++;
    });
  }
  const fallbackWRooms = typedWRooms.length || typedWpRooms.length ? [] : assignedWRooms;
  const w = splitRooms([...new Set([...typedWRooms, ...fallbackWRooms])].sort((a,b) => a.localeCompare(b, "pl", { numeric: true })));
  const wp = splitRooms([...new Set(typedWpRooms)].sort((a,b) => a.localeCompare(b, "pl", { numeric: true })));
  return { w, wp, pg, pgz };
}

function fmtWP(reg, apt) {
  return apt ? reg+"+"+apt : ""+reg;
}

function fmtDate(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return { dow: DOW[dt.getDay()], txt: d+" "+MON[m-1] };
}

async function fetchPlans() {
  const range = buildRange();
  const from = range[0], to = range[range.length-1];
  const url = `${SB_URL}/rest/v1/hk_plan?date=gte.${from}&date=lte.${to}&select=date,assignments,pm_room_types`;
  const res = await fetch(url, { headers: { apikey: SB_KEY, Authorization: "Bearer "+SB_KEY }});
  if (!res.ok) throw new Error("Supabase HTTP "+res.status);
  const rows = await res.json();
  const m = {};
  (Array.isArray(rows) ? rows : []).forEach(row => {
    m[row.date] = { assignments: row.assignments || {}, pmRoomTypes: row.pm_room_types || {} };
  });
  return m;
}

function render(byDate) {
  const range = buildRange();
  const todayIso = range[0], tomorrowIso = range[1];
  const c = document.getElementById("days");
  c.innerHTML = "";
  range.forEach(iso => {
    const counts = countTypes(byDate[iso]);
    const cls = iso===todayIso ? "today" : (iso===tomorrowIso ? "tomorrow" : "");
    const empty = counts.w.total===0 && counts.wp.total===0 && counts.pg===0 && counts.pgz===0 && !byDate[iso] ? " empty" : "";
    const lbl = iso===todayIso ? "DZIŚ" : (iso===tomorrowIso ? "JUTRO" : "");
    const d = fmtDate(iso);
    const wZero = counts.w.total===0 ? " zero" : "";
    const wpZero = counts.wp.total===0 ? " zero" : "";
    const pgZero = counts.pg===0 ? " zero" : "";
    const pgzZero = counts.pgz===0 ? " zero" : "";
    const div = document.createElement("div");
    div.className = "day "+cls+empty;
    div.innerHTML =
      `<div class="dleft"><div class="ddow">${d.dow}</div><div class="ddate">${d.txt}</div>${lbl?`<div class="dlbl">${lbl}</div>`:""}</div>`+
      `<div class="dright"><div class="pill w${wZero}"><div class="pl">Wyjazd</div><div class="pv">${fmtWP(counts.w.reg, counts.w.apt)}</div></div>`+
      `<div class="pill wp${wpZero}"><div class="pl">W/P</div><div class="pv">${fmtWP(counts.wp.reg, counts.wp.apt)}</div></div>`+
      `<div class="pill pg${pgZero}"><div class="pl">PG</div><div class="pv">${counts.pg}</div></div>`+
      `<div class="pill pgz${pgzZero}"><div class="pl">PGZ</div><div class="pv">${counts.pgz}</div></div></div>`;
    c.appendChild(div);
  });
  document.getElementById("lastUpd").textContent = "Aktualizacja: "+new Date().toLocaleTimeString("pl-PL");
}

async function tick() {
  const dot = document.getElementById("dot");
  try {
    const m = await fetchPlans();
    dot.className = "dot";
    document.getElementById("sync").textContent = new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    render(m);
  } catch (e) {
    dot.className = "dot off";
  }
}

tick();
setInterval(tick, 5000);
</script>
</body>
</html>
