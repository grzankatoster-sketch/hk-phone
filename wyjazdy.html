<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#5a1d4a"/>
<title>Wyjazdy • HK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --plum:#5a1d4a;
  --plum-soft:#7a3a6a;
  --cream:#fdfaf7;
  --paper:#ffffff;
  --ink:#2d1422;
  --muted:#8a6a7e;
  --line:rgba(90,29,74,.14);
  --line-strong:rgba(90,29,74,.28);
}
html,body{background:var(--cream)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overscroll-behavior:none}
.hdr{background:var(--plum);color:#fff;padding:14px 16px;border-bottom:2px solid var(--plum);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo svg{flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .t1{font-family:'DM Serif Display',Georgia,serif;font-size:14px;letter-spacing:.18em;font-weight:400}
.logo-text .t2{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.04em}
.dot{width:8px;height:8px;border-radius:50%;background:#7ad9a8;flex-shrink:0;box-shadow:0 0 6px rgba(122,217,168,.6)}
.dot.off{background:#f59ea6;box-shadow:0 0 6px rgba(245,158,166,.6)}
.sync{font-size:10px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums}
.legend{padding:12px 16px 4px;color:var(--muted);font-size:11px;line-height:1.6}
.days{padding:10px 12px;display:flex;flex-direction:column;gap:9px;padding-bottom:40px}
.day{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;flex-direction:column;gap:0;box-shadow:0 1px 2px rgba(90,29,74,.04)}
.drow{display:flex;align-items:center;gap:14px}
.obsada-btn{margin-top:11px;width:100%;background:rgba(90,29,74,.06);border:1px solid var(--line);border-radius:10px;padding:9px;color:var(--plum);font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
.planner{margin-top:10px;border-top:1px dashed var(--line-strong);padding-top:11px;display:flex;flex-direction:column;gap:7px}
.rost-head{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.rost-row{display:flex;align-items:center;gap:8px}
.rost-name{flex:1;font-weight:700;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rost-role{font-size:12px;padding:5px 6px;border-radius:7px;border:1px solid var(--line);background:var(--paper);color:var(--ink);font-family:inherit}
.rost-load{min-width:56px;text-align:center;font-weight:900;font-size:15px;color:var(--plum);font-variant-numeric:tabular-nums}
.rost-x{background:none;border:none;color:#c2708a;font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
.rost-empty{font-size:12px;color:var(--muted);padding:4px 0}
.rost-add{display:flex;gap:7px;margin-top:3px}
.rost-inp{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:14px;font-family:inherit}
.rost-addbtn{padding:8px 14px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}
.rost-send{margin-top:8px;width:100%;padding:11px;border-radius:9px;border:none;background:#0f7a4a;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.day.today{border-color:var(--plum);background:linear-gradient(180deg,rgba(90,29,74,.06) 0%,var(--paper) 100%)}
.day.tomorrow{border-color:var(--line-strong)}
.day.empty{opacity:.55}
.dleft{flex:1;min-width:0}
.ddow{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.ddate{font-family:'DM Serif Display',Georgia,serif;font-size:22px;font-weight:400;margin-top:2px;line-height:1.05;color:var(--plum)}
.dlbl{font-size:10px;color:var(--plum);font-weight:800;margin-top:3px;letter-spacing:.08em}
.dright{display:flex;gap:8px;flex-shrink:0}
.pill{min-width:60px;text-align:center;border-radius:10px;padding:8px 6px;border:1.5px solid;overflow:hidden}
.pill .pl{font-size:9px;font-weight:800;letter-spacing:.06em;white-space:nowrap;text-transform:uppercase}
.pill .pv{font-size:22px;font-weight:900;line-height:1.1;margin-top:2px;font-variant-numeric:tabular-nums;white-space:nowrap;display:inline-flex;align-items:baseline;justify-content:center;gap:2px}
.pill .pv .apt{font-size:.5em;font-weight:800;letter-spacing:.04em;opacity:.85;transform:translateY(-.2em)}
/* Brand palette derived from plum: deep plum, mauve, gold accent, lilac */
.pill.w  {border-color:rgba(90,29,74,.5);background:rgba(90,29,74,.07);color:#5a1d4a}
.pill.wp {border-color:rgba(155,89,138,.55);background:rgba(155,89,138,.08);color:#9b598a}
.pill.pg {border-color:rgba(176,128,40,.55);background:rgba(176,128,40,.08);color:#a07820}
.pill.pgz{border-color:rgba(120,75,142,.55);background:rgba(120,75,142,.08);color:#784b8e}
.pill.zero{opacity:.4}
.foot{text-align:center;color:var(--muted);font-size:11px;padding:10px}
@media (max-width:420px){
  .drow{align-items:stretch;flex-direction:column;gap:10px}
  .dright{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .pill{min-width:0;padding:8px 3px}
  .pill .pl{font-size:8px}
  .pill .pv{font-size:18px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <svg viewBox="0 0 80 12" width="44" height="11" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ffffff">
        <circle cx="20" cy="6" r="2.4"/>
        <circle cx="32" cy="6" r="2.4"/>
        <circle cx="48" cy="6" r="2.4"/>
        <circle cx="60" cy="6" r="2.4"/>
      </g>
    </svg>
    <div class="logo-text">
      <div class="t1">CONRAD COMFORT</div>
      <div class="t2">Wyjazdy • Manager HK</div>
    </div>
  </div>
  <div class="dot" id="dot"></div>
  <div class="sync" id="sync"></div>
</div>
<div id="days" class="days"><div class="foot">Pobieranie danych...</div></div>
<div class="foot" id="lastUpd"></div>
<script>
const SB_URL = "https://pjgcaujndvjvicqsdcns.supabase.co";
const SB_KEY = "sb_publishable_h_uQ7-zzck71HIWxnlwTbQ_Io9m7wfb";
const sb = (window.supabase && window.supabase.createClient) ? window.supabase.createClient(SB_URL, SB_KEY) : null;
const TENANT_ID = "00000000-0000-0000-0000-000000000001"; // = VITE_TENANT_ID recepcji
const DAYS = 3;
const APT_ROOMS = ["106","206","218","306","318"];
const DOW = ["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];
const MON = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];

const pad = n => n<10 ? "0"+n : ""+n;
const isoDate = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());

function buildRange() {
  const out = [];
  const t = new Date(); t.setHours(0,0,0,0);
  for (let i=0; i<DAYS; i++) {
    out.push(isoDate(new Date(t.getTime()+i*86400000)));
  }
  return out;
}

function flattenAssignments(assignments) {
  const rooms = [];
  if (assignments && typeof assignments === "object") {
    Object.values(assignments).forEach(list => {
      if (Array.isArray(list)) list.forEach(no => rooms.push(String(no)));
    });
  }
  return [...new Set(rooms)].sort((a,b) => a.localeCompare(b, "pl", { numeric: true }));
}

function splitRooms(rooms) {
  const apt = rooms.filter(no => APT_ROOMS.includes(no)).length;
  return { total: rooms.length, reg: rooms.length - apt, apt };
}

function countTypes(plan) {
  const data = plan || {};
  const pmRoomTypes = data.pmRoomTypes || {};
  const assignedWRooms = flattenAssignments(data.assignments);
  const typedWRooms = [];
  let pg=0, pgz=0;
  if (pmRoomTypes && typeof pmRoomTypes === "object") {
    Object.entries(pmRoomTypes).forEach(([no,v]) => {
      if (v==="W" || v==="WP") typedWRooms.push(String(no));
      else if (v==="PG") pg++;
      else if (v==="PGZ") pgz++;
    });
  }
  const allWRooms = [...new Set([...typedWRooms, ...assignedWRooms])]
    .sort((a,b) => a.localeCompare(b, "pl", { numeric: true }));
  const w = splitRooms(allWRooms);
  return { w, pg, pgz };
}

function fmtWP(reg, apt) {
  return apt ? reg+"+"+apt+'<span class="apt">APT</span>' : ""+reg;
}

function fmtDate(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return { dow: DOW[dt.getDay()], txt: d+" "+MON[m-1] };
}

async function fetchPlans() {
  const range = buildRange();
  const from = range[0], to = range[range.length-1];
  const url = `${SB_URL}/rest/v1/hk_plan?date=gte.${from}&date=lte.${to}&select=date,assignments,pm_room_types`;
  const res = await fetch(url, { headers: { apikey: SB_KEY, Authorization: "Bearer "+SB_KEY }});
  if (!res.ok) throw new Error("Supabase HTTP "+res.status);
  const rows = await res.json();
  const m = {};
  (Array.isArray(rows) ? rows : []).forEach(row => {
    m[row.date] = { assignments: row.assignments || {}, pmRoomTypes: row.pm_room_types || {} };
  });
  return m;
}

function toast(msg, color="#0f7a4a"){
  const e=document.createElement("div");
  e.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:800;z-index:999;box-shadow:0 8px 30px rgba(90,29,74,.25);transition:opacity .3s";
  e.style.color=color; e.textContent=msg; document.body.appendChild(e);
  setTimeout(()=>{ e.style.opacity="0"; setTimeout(()=>e.remove(),300); },2400);
}

// ── Obsada + podział na żywo (jak Auto-przypisz: apartament = waga 3 pokoi) ──
let expandedDay = null;
let lastByDate = {};
const escapeHtml = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const rosterKey = d => "hk-roster-"+d;
const getRoster = d => { try { return JSON.parse(localStorage.getItem(rosterKey(d))||"[]"); } catch { return []; } };
const setRoster = (d,arr) => localStorage.setItem(rosterKey(d), JSON.stringify(arr));
const capitalize = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;

// Podział pokoi per osoba = JEDNO źródło prawdy: realne przypisania z programu
// (hk_plan.assignments: { "Imię": ["101","106",...] } — to, co rozpisała recepcja).
// Dzięki temu liczby na telefonie są identyczne z programem, bez własnej heurystyki.
function normName(s){ return String(s||"").trim().toLowerCase(); }
function loadsFromAssignments(assignments){
  const map = {};
  if (assignments && typeof assignments === "object") {
    Object.entries(assignments).forEach(([person, list]) => {
      if (!Array.isArray(list)) return;
      const apt = list.filter(no => APT_ROOMS.includes(String(no))).length;
      map[normName(person)] = { reg: list.length - apt, apt, name: person };
    });
  }
  return map;
}
const fmtLoad = L => L.apt ? L.reg+"+"+L.apt : ""+L.reg;

// Szacunkowy podział pokoi na osobę, gdy recepcja jeszcze nie rozpisała —
// kierownik od razu widzi obciążenie i może dobrać obsadę. Liczy tą samą wagą
// co program (apartament=3, dyżur=0.85 udziału). Po realnym rozpisaniu w
// recepcji telefon zastępuje szacunek danymi z hk_plan.assignments (1:1).
function estimateSplit(roster, counts){
  const out = {};
  const reg = counts.w.reg|0, apt = counts.w.apt|0;
  // Popołudnie nie sprząta wyjazdowych — liczymy tylko poranne/dyżur.
  const morning = roster.map((w,i)=>({w,i})).filter(x=>x.w.role!=="popoludnie");
  const n = morning.length;
  if (!n || (!reg && !apt)) return out;
  const dutyLocal = morning.findIndex(x=>x.w.role==="dyzur");
  const DUTY_RATIO = 0.85;
  const totalWeight = reg + apt*3;
  const rawRatios = morning.map((_,i)=> (i===dutyLocal && dutyLocal>=0) ? DUTY_RATIO : 1.0);
  const ratioSum = rawRatios.reduce((s,v)=>s+v,0) || 1;
  const weightTargets = rawRatios.map(v=>Math.floor(v/ratioSum*totalWeight));
  // Apartamenty (waga 3) rozdajemy najpierw — kolejka preferuje osoby poza dyżurem.
  const aptWeights = new Array(n).fill(0);
  const aptCount = new Array(n).fill(0);
  const nonDuty = morning.map((_,i)=>i).filter(i=>i!==dutyLocal);
  const dutyArr = dutyLocal>=0 ? [dutyLocal] : [];
  const aptQueue = [...nonDuty,...nonDuty,...dutyArr,...nonDuty,...dutyArr];
  const queue = aptQueue.length ? aptQueue : morning.map((_,i)=>i);
  for (let r=0;r<apt;r++){ const pi = queue[r%queue.length] ?? 0; aptCount[pi]++; aptWeights[pi]+=3; }
  // Pokoje zwykłe wypełniają pozostałe cele wagowe.
  const regTargets = morning.map((_,i)=>Math.max(0, weightTargets[i]-aptWeights[i]));
  const regSum = regTargets.reduce((s,v)=>s+v,0);
  const scale = regSum>0 ? reg/regSum : 1;
  const adj = regTargets.map(v=>Math.round(v*scale));
  let diff = reg - adj.reduce((s,v)=>s+v,0);
  const diffOrder = [...nonDuty, dutyLocal>=0?dutyLocal:-1].filter(i=>i>=0);
  for (let j=0; diff>0 && diffOrder.length; j++){ adj[diffOrder[j%diffOrder.length]]++; diff--; }
  while (diff<0 && diffOrder.length){
    const mx = Math.max(...diffOrder.map(i=>adj[i]));
    const idx = diffOrder.find(i=>adj[i]===mx && adj[i]>0);
    if (idx===undefined) break;
    adj[idx]--; diff++;
  }
  morning.forEach((x,li)=>{ out[x.i] = { reg: adj[li], apt: aptCount[li] }; });
  return out;
}

// Globalne handlery — inline onclick przetrwa rebuild innerHTML
window.toggleDay = (iso)=>{ expandedDay = expandedDay===iso ? null : iso; render(lastByDate); };
window.addRosterWorker = (iso)=>{
  const inp = document.getElementById("rost-input-"+iso);
  const name = (inp && inp.value || "").trim();
  if (!name) return;
  // Pierwsza wpisana osoba domyślnie na dyżurze (0.7 udziału), reszta poranna.
  const arr = getRoster(iso); arr.push({ name: capitalize(name), role: arr.length===0 ? "dyzur" : "poranna" });
  setRoster(iso, arr); render(lastByDate);
  const ni = document.getElementById("rost-input-"+iso); if (ni) ni.focus();
};
window.removeRosterWorker = (iso, idx)=>{ const arr=getRoster(iso); arr.splice(idx,1); setRoster(iso,arr); render(lastByDate); };
window.setRosterRole = (iso, idx, role)=>{ const arr=getRoster(iso); if(arr[idx]){ arr[idx].role=role; setRoster(iso,arr); render(lastByDate); } };
window.sendRoster = async (iso)=>{
  const roster = getRoster(iso);
  if (!roster.length){ toast("Dodaj najpierw pracowników.", "#f59ea6"); return; }
  if (!sb){ toast("Brak biblioteki Supabase — odśwież stronę.", "#f59ea6"); return; }
  try{
    const { error } = await sb.from("hk_roster").upsert(
      { tenant_id:TENANT_ID, date:iso, roster, updated_at:new Date().toISOString() },
      { onConflict:"tenant_id,date" }
    );
    if (!error) toast("Obsada wysłana do recepcji ✓");
    else toast("Błąd: "+error.message, "#f59ea6");
  }catch(e){ toast("Błąd: "+(e&&e.message||e), "#f59ea6"); }
};

function plannerHtml(iso, counts) {
  const roster = getRoster(iso);
  const plan = lastByDate[iso] || {};
  const loads = loadsFromAssignments(plan.assignments);
  const anyAssigned = Object.keys(loads).length > 0;
  // Brak realnego rozpisania → policz szacunek, by kierownik widział obciążenie.
  const est = anyAssigned ? {} : estimateSplit(roster, counts);
  const rows = roster.map((w, idx)=>{
    let load;
    if (w.role==="popoludnie") load = "popoł.";
    else if (anyAssigned) { const L = loads[normName(w.name)]; load = L ? fmtLoad(L) : "—"; }
    else { const E = est[idx]; load = E ? fmtLoad(E)+"≈" : "—"; }
    return `<div class="rost-row">
      <span class="rost-name">${escapeHtml(w.name)}</span>
      <select class="rost-role" onchange="setRosterRole('${iso}',${idx},this.value)">
        <option value="poranna"${w.role==="poranna"?" selected":""}>Poranna</option>
        <option value="dyzur"${w.role==="dyzur"?" selected":""}>Dyżur</option>
        <option value="popoludnie"${w.role==="popoludnie"?" selected":""}>Popołudnie</option>
      </select>
      <span class="rost-load">${load}</span>
      <button class="rost-x" onclick="removeRosterWorker('${iso}',${idx})" aria-label="Usuń">×</button>
    </div>`;
  }).join("");
  // Osoby rozpisane w programie, których nie ma w lokalnej obsadzie — pokaż jako
  // podgląd (read-only), by telefon zawsze odzwierciedlał realny podział recepcji 1:1.
  const rosterNames = new Set(roster.map(w=>normName(w.name)));
  const extraRows = Object.values(loads)
    .filter(L => !rosterNames.has(normName(L.name)))
    .sort((a,b)=>a.name.localeCompare(b.name,"pl"))
    .map(L => `<div class="rost-row">
      <span class="rost-name">${escapeHtml(L.name)}</span>
      <span class="rost-role" style="opacity:.6;border-style:dashed">w programie</span>
      <span class="rost-load">${fmtLoad(L)}</span>
    </div>`).join("");
  let body = rows + extraRows;
  if (!body) body = roster.length
    ? '<div class="rost-empty">Czeka na rozpisanie w recepcji…</div>'
    : '<div class="rost-empty">Dodaj pracowników, by zobaczyć podział.</div>';
  else if (rows && !anyAssigned) body += '<div class="rost-empty">≈ podział szacunkowy — recepcja może go zmienić</div>';
  return `<div class="planner">
    <div class="rost-head">Obsada · ${counts.w.reg}${counts.w.apt?"+"+counts.w.apt+" APT":""} do podziału</div>
    ${body}
    <div class="rost-add">
      <input id="rost-input-${iso}" class="rost-inp" placeholder="Imię pracownika" autocomplete="off"
        onkeydown="if(event.key==='Enter')addRosterWorker('${iso}')"/>
      <button class="rost-addbtn" onclick="addRosterWorker('${iso}')">Dodaj</button>
    </div>
    ${roster.length ? `<button class="rost-send" onclick="sendRoster('${iso}')">📤 Wyślij obsadę do recepcji</button>` : ""}
  </div>`;
}

function render(byDate) {
  lastByDate = byDate;
  const range = buildRange();
  const todayIso = range[0], tomorrowIso = range[1];
  const c = document.getElementById("days");
  c.innerHTML = "";
  range.forEach(iso => {
    const counts = countTypes(byDate[iso]);
    const cls = iso===todayIso ? "today" : (iso===tomorrowIso ? "tomorrow" : "");
    const empty = counts.w.total===0 && counts.pg===0 && counts.pgz===0 && !byDate[iso] ? " empty" : "";
    const lbl = iso===todayIso ? "DZIŚ" : (iso===tomorrowIso ? "JUTRO" : "");
    const d = fmtDate(iso);
    const wZero = counts.w.total===0 ? " zero" : "";
    const pgZero = counts.pg===0 ? " zero" : "";
    const pgzZero = counts.pgz===0 ? " zero" : "";
    const rosterCount = getRoster(iso).length;
    const div = document.createElement("div");
    div.className = "day "+cls+empty;
    div.innerHTML =
      `<div class="drow">`+
        `<div class="dleft"><div class="ddow">${d.dow}</div><div class="ddate">${d.txt}</div>${lbl?`<div class="dlbl">${lbl}</div>`:""}</div>`+
        `<div class="dright"><div class="pill w${wZero}"><div class="pl">Wyjazd</div><div class="pv">${fmtWP(counts.w.reg, counts.w.apt)}</div></div>`+
        `<div class="pill pg${pgZero}"><div class="pl">PG</div><div class="pv">${counts.pg}</div></div>`+
        `<div class="pill pgz${pgzZero}"><div class="pl">PGZ</div><div class="pv">${counts.pgz}</div></div></div>`+
      `</div>`+
      `<button class="obsada-btn" onclick="toggleDay('${iso}')">${expandedDay===iso?"▲ Ukryj obsadę":"▼ Obsada"+(rosterCount?` (${rosterCount})`:"")}</button>`+
      (expandedDay===iso ? plannerHtml(iso, counts) : "");
    c.appendChild(div);
  });
  document.getElementById("lastUpd").textContent = "Aktualizacja: "+new Date().toLocaleTimeString("pl-PL");
}

async function tick() {
  const dot = document.getElementById("dot");
  try {
    const m = await fetchPlans();
    lastByDate = m;
    dot.className = "dot";
    document.getElementById("sync").textContent = new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    // Nie przerysowuj, gdy menadżer planuje obsadę (otwarty planer / wpisuje) — inaczej
    // zniknąłby wpisywany tekst i rozwinięty dzień. Liczby odświeżą się po zamknięciu.
    const ae = document.activeElement;
    const typing = ae && /^(INPUT|SELECT)$/.test(ae.tagName);
    if (!expandedDay && !typing) render(m);
  } catch (e) {
    dot.className = "dot off";
  }
}

tick();
setInterval(tick, 5000);
</script>
</body>
</html>
