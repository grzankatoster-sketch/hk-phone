<script>
/* Auto-aktualizacja: gdy na serwerze pojawi się nowa wersja strony, aplikacja
   dodana do ekranu głównego (standalone PWA) sama się przeładuje — nie trzeba
   jej zamykać ani usuwać i dodawać ponownie. */
(function(){
  var url = location.pathname + (location.search || "");
  var baseline = null, busy = false, INTERVAL = 5 * 60 * 1000;
  function fp(s){ var h = 0; for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return s.length + ":" + h; }
  async function check(){
    if (busy || navigator.onLine === false) return;
    busy = true;
    try {
      var res = await fetch(url, { cache: "no-store" });
      if (res.ok){
        var cur = fp(await res.text());
        if (baseline === null) baseline = cur;
        else if (cur !== baseline){ location.reload(); return; }
      }
    } catch (e) { /* offline / chwilowy błąd — sprawdzimy później */ }
    busy = false;
  }
  if ("serviceWorker" in navigator)
    navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.update(); }).catch(function(){});
  check();
  setInterval(function(){ if (!document.hidden) check(); }, INTERVAL);
  document.addEventListener("visibilitychange", function(){ if (!document.hidden) check(); });
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --plum:#5a1d4a; --plum-soft:#7a3a6a; --cream:#fdfaf7; --paper:#ffffff;
  --ink:#2d1422; --muted:#8a6a7e; --line:rgba(90,29,74,.14); --line-strong:rgba(90,29,74,.28);
  --ok:#0f7a4a; --bad:#c2415a;
}
html,body{background:var(--cream)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overscroll-behavior:none}
/* ── Interaktywna warstwa tła (nakładka na animowaną aurorę body::before) ──
   Przezroczysta — dorzuca tylko reakcję na kursor/dotyk, nie zasłania gradientu. */
#bgfx{position:fixed;inset:0;width:100%;height:100%;z-index:-1;display:block;pointer-events:none;background:transparent}
.hdr,.wrap,.foot{position:relative;z-index:1}
@media (prefers-reduced-motion: reduce){#bgfx{display:none}}
.hdr{background:var(--plum);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .t1{font-family:'DM Serif Display',Georgia,serif;font-size:14px;letter-spacing:.18em;font-weight:400}
.logo-text .t2{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.04em}
.logout{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.wrap{max-width:560px;margin:0 auto;padding:18px 14px 40px}
.h2{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--plum);font-weight:400;margin-bottom:4px}
.sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.grid{display:flex;flex-direction:column;gap:10px}
.acct{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,#fff,#fdfbfa);border:1.5px solid var(--line);border-radius:15px;padding:13px 14px;cursor:pointer;text-align:left;font-family:inherit;width:100%;box-shadow:0 1px 2px rgba(90,29,74,.05);transition:border-color .16s,box-shadow .16s,transform .08s}
.acct:hover{border-color:var(--line-strong);box-shadow:0 6px 18px rgba(90,29,74,.1)}
.acct:active{transform:scale(.985);box-shadow:0 1px 2px rgba(90,29,74,.05)}
.acct .av{width:42px;height:42px;border-radius:13px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 5px rgba(90,29,74,.18);text-shadow:0 1px 2px rgba(0,0,0,.18)}
.acct .meta{flex:1;min-width:0}
.acct .nm{font-weight:800;font-size:15.5px;color:var(--ink);letter-spacing:-.01em}
.acct .rl{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct .badge{font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:999px;border:1px solid var(--line-strong);color:var(--plum);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.acct .badge.new{color:var(--ok);border-color:rgba(15,122,74,.4);background:rgba(15,122,74,.07)}
.acct .chev{color:var(--line-strong);font-size:22px;font-weight:700;line-height:1;flex-shrink:0;transition:transform .16s,color .16s}
.acct:hover .chev{color:var(--plum);transform:translateX(2px)}
.login-id{display:flex;align-items:center;gap:13px;margin-bottom:2px}
.login-id .av{width:46px;height:46px;border-radius:14px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 6px rgba(90,29,74,.2);text-shadow:0 1px 2px rgba(0,0,0,.18)}
.card{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:18px 16px}
.field{margin-top:12px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.03em}
.inp{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-size:15px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--plum)}
.btn{width:100%;margin-top:16px;padding:13px;border-radius:11px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.55;cursor:default}
.link{background:none;border:none;color:var(--plum);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:10px 0;margin-top:6px}
.msg{margin-top:12px;font-size:13px;font-weight:700;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;color:var(--bad);background:rgba(194,65,90,.08);border:1px solid rgba(194,65,90,.3)}
.msg.info{display:block;color:var(--plum);background:rgba(90,29,74,.06);border:1px solid var(--line)}
.msg.ok{display:block;color:var(--ok);background:rgba(31,138,76,.08);border:1px solid rgba(31,138,76,.3)}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5}
.panelbox{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:20px 16px}
.panelbox .role-ttl{font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:var(--plum);font-weight:400}
.panelbox .role-who{font-size:12.5px;color:var(--muted);margin-top:3px}
.soon{margin-top:16px;font-size:11px;font-weight:800;color:var(--ok);letter-spacing:.06em;text-transform:uppercase}
.soonlist{margin-top:8px;display:flex;flex-direction:column;gap:7px}
.soonlist .it{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--ink);background:rgba(90,29,74,.04);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.soonlist .it .d{color:var(--plum);font-weight:900}
.foot{text-align:center;color:var(--muted);font-size:11px;padding:16px 10px}
.spin{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px}
/* ── Dashboard HK ── */
.dhdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
.dhdr .role-ttl{font-family:'DM Serif Display',Georgia,serif;font-size:21px;color:var(--plum);font-weight:400}
.dhdr .role-who{font-size:11.5px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;margin:14px 0;background:rgba(90,29,74,.06);padding:4px;border-radius:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:0 0 auto;padding:9px 13px;border:none;background:transparent;border-radius:8px;font-weight:800;font-size:12.5px;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.on{background:var(--paper);color:var(--plum);box-shadow:0 1px 3px rgba(90,29,74,.12)}
.day{background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px}
.day.today{border-color:var(--plum);background:linear-gradient(180deg,rgba(90,29,74,.05),var(--paper))}
.drow{display:flex;align-items:center;gap:12px}
.dleft{flex:1;min-width:0}
.ddow{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.ddate{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--plum);line-height:1.05;margin-top:2px}
.dlbl{font-size:10px;color:var(--plum);font-weight:800;margin-top:3px;letter-spacing:.08em}
.dright{display:flex;gap:7px;flex-shrink:0}
.pill{min-width:54px;text-align:center;border-radius:9px;padding:7px 5px;border:1.5px solid}
.pill .pl{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.pill .pv{font-size:19px;font-weight:900;line-height:1.1;margin-top:2px}
.pill.w{border-color:rgba(90,29,74,.5);background:rgba(90,29,74,.07);color:#5a1d4a}
.pill.pg{border-color:rgba(176,128,40,.55);background:rgba(176,128,40,.08);color:#a07820}
.pill.pgz{border-color:rgba(120,75,142,.55);background:rgba(120,75,142,.08);color:#784b8e}
.pill.zero{opacity:.4}
.wcard{background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer}
.wcard:hover{border-color:var(--plum)}
.wtop{display:flex;align-items:center;gap:10px}
.wtop .av{width:34px;height:34px;border-radius:50%;background:rgba(90,29,74,.08);color:var(--plum);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.wtop .nm{font-weight:800;font-size:14.5px;flex:1;min-width:0}
.wtop .prog{font-weight:900;font-size:14px;color:var(--plum);font-variant-numeric:tabular-nums}
.bar{height:7px;border-radius:99px;background:rgba(90,29,74,.1);margin-top:9px;overflow:hidden}
.bar > span{display:block;height:100%;background:var(--ok);border-radius:99px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:11.5px;font-weight:700;padding:4px 8px;border-radius:7px;border:1px solid var(--line);color:var(--ink);background:rgba(90,29,74,.03)}
.chip.done{color:var(--ok);border-color:rgba(15,122,74,.35);background:rgba(15,122,74,.07);text-decoration:line-through;opacity:.85}
.statrow{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.statrow .k{flex:1;font-size:13.5px;font-weight:700}
.statrow .v{font-weight:900;font-size:16px;color:var(--plum);font-variant-numeric:tabular-nums}
.feed{margin-top:4px}
.fitem{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line)}
.fitem .ic{font-weight:900;flex-shrink:0}
.fitem .tm{color:var(--muted);font-size:11px;margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}
.empty{font-size:12.5px;color:var(--muted);text-align:center;padding:22px 10px;background:rgba(90,29,74,.03);border:1px dashed var(--line-strong);border-radius:11px}
/* Zmiany — grafik edytowalny */
.zm-nav{width:32px;height:30px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);border-radius:8px;font-size:16px;font-weight:800;cursor:pointer;line-height:1}
.zm-nav:hover{background:rgba(90,29,74,.05)}
.zm-h{width:100%;min-width:58px;font-size:11.5px;font-weight:600;text-align:center;border:1px solid var(--line);border-radius:6px;padding:3px 4px;background:var(--paper);color:var(--ink);outline:none}
.zm-h:focus{border-color:var(--plum)}
.zm-s{width:100%;margin-top:3px;font-size:10px;border:1px solid var(--line);border-radius:6px;padding:2px 3px;background:var(--paper);color:var(--muted);outline:none;cursor:pointer}
.zm-days{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.zm-day{flex:0 0 auto;min-width:42px;padding:6px 4px;border:1px solid var(--line-strong);background:var(--paper);color:var(--muted);border-radius:9px;font-weight:800;font-size:12px;cursor:pointer;text-align:center;line-height:1.2}
.zm-day.on{background:var(--plum);color:#fff;border-color:var(--plum)}
.zm-list{display:flex;flex-direction:column;gap:7px}
.zm-row{display:grid;grid-template-columns:1fr 86px 104px;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--paper)}
.zm-row .zm-name{font-weight:700;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zm-row .zm-s{margin-top:0}
/* Zmiany — layout grafik + podsumowanie z boku */
.zm-wrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-top:2px}
.zm-grid{flex:1 1 440px;min-width:0}
.zm-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--paper)}
.zm-side{flex:1 1 188px;max-width:236px;border:1px solid var(--line);border-radius:11px;background:var(--paper);padding:10px 4px 8px;align-self:stretch}
.zm-side-hd{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:0 10px 8px}
.zm-side-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;border-top:1px solid var(--line)}
.zm-side-nm{font-weight:700;font-size:12.5px;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zm-side-st{font-size:12px;font-weight:800;color:var(--plum);white-space:nowrap;flex:0 0 auto}
.zm-side-st small{font-weight:600;color:var(--muted);font-size:10px}
.zm-side-tot{border-top:2px solid var(--line-strong);margin-top:2px}
.zm-side-tot .zm-side-nm{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.03em}
.zm-side-orph{margin-top:8px;padding:8px 10px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.45}
.zm-side-orph b{color:var(--bad);font-size:11px}
.zm-side-orph i{display:block;margin-top:4px;font-size:10px;font-style:normal;color:var(--muted)}
@media(max-width:760px){.zm-side{flex-basis:100%;max-width:none}}

<style>
/* ════════ REDESIGN „cichy luksus" — telefon + komputer (sidebar) ════════ */
:root{
  --serif:'Fraunces',Georgia,serif; --ui:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --plum:#5a1d4a; --plum-2:#7a3a6a; --plum-deep:#3a1230;
  --cream:#f7f1ec; --paper:#fffdfb; --ink:#2a1320; --muted:#9a8290;
  --line:rgba(58,18,48,.12); --line-strong:rgba(58,18,48,.22);
  --gold:#b0863a; --ok:#1f7a52; --bad:#c2415a;
  --shadow:0 1px 2px rgba(58,18,48,.05), 0 14px 32px -18px rgba(58,18,48,.32);
  --r:16px;
}
body{font-family:var(--ui);background:
  radial-gradient(1100px 480px at 100% -10%, rgba(122,58,106,.10), transparent 60%),
  radial-gradient(900px 420px at -10% 0%, rgba(176,134,58,.07), transparent 55%),
  var(--cream);}
.hdr,.foot{display:none!important}
.h2,.role-ttl,.ddate,.kpi .v,.topbar h1,.brand .b1{font-family:var(--serif);font-weight:500;letter-spacing:-.01em}

/* ── Logowanie (wyśrodkowane) ── */
#app.wrap.auth{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 20px}
.wrap.auth::before{content:"CONRAD COMFORT";display:block;text-align:center;font-family:var(--serif);letter-spacing:.24em;color:var(--plum);font-size:15px}
.wrap.auth::after{content:"Panel menedżerski";display:block;text-align:center;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:3px 0 22px}
.wrap.auth .h2{font-size:23px;text-align:center}
.wrap.auth .sub{text-align:center}
.card{border-radius:var(--r);box-shadow:var(--shadow);border-color:var(--line)}
.btn{background:linear-gradient(180deg,var(--plum-2),var(--plum));box-shadow:0 8px 20px -8px rgba(90,29,74,.6);border-radius:13px;letter-spacing:.01em}
.btn:hover{filter:brightness(1.06)}
.inp{border-radius:12px}.inp:focus{box-shadow:0 0 0 3px rgba(90,29,74,.12)}
.remember{display:flex;align-items:center;gap:9px;margin:2px 0 12px;cursor:pointer;user-select:none}
.remember input{width:18px;height:18px;accent-color:var(--plum);cursor:pointer;flex-shrink:0}
.remember span{font-size:13px;color:var(--muted)}

/* ── Pulpit: powłoka ── */
#app.dash{max-width:none;margin:0;padding:0}
.shell{min-height:100vh}
.side{display:none}
.main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:13px 15px;background:rgba(255,253,251,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar h1{font-size:20px;color:var(--plum);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-out{background:rgba(90,29,74,.07);border:1px solid var(--line);color:var(--plum);border-radius:10px;padding:8px 12px;font:700 12.5px var(--ui);cursor:pointer}
.tabs.mob{display:flex;gap:6px;margin:0;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--paper)}
.tabs.mob::-webkit-scrollbar{height:0}
.content{padding:16px 13px 70px;width:100%}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:11px 13px;box-shadow:var(--shadow)}
.kpi .l{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.kpi .v{font-size:25px;color:var(--plum);margin-top:2px;line-height:1}
.kpi .v.ok{color:var(--ok)} .kpi .v.gold{color:var(--gold)} .kpi .v.bad{color:var(--bad)}

/* ── Komponenty: szlif ── */
.wcard,.statrow,.day{box-shadow:var(--shadow);border-radius:14px}
.wcard{transition:border-color .15s,box-shadow .15s,transform .08s}
.wcard:hover{box-shadow:0 14px 30px -16px rgba(58,18,48,.4)}
.wtop .av{border-radius:11px;background:linear-gradient(135deg,var(--plum-2),var(--plum));color:#fff}
.pill{border-radius:11px}
.tab.on{box-shadow:0 2px 8px -2px rgba(90,29,74,.25)}
.soon{color:var(--gold)}

/* ════════ KOMPUTER (≥ 920px): sidebar + szeroka treść + siatka ════════ */
@media(min-width:920px){
  .shell{display:grid;grid-template-columns:264px 1fr}
  .side{display:flex;flex-direction:column;gap:16px;padding:22px 16px;color:#fff;position:sticky;top:0;height:100vh;
    background:linear-gradient(170deg,var(--plum) 0%,var(--plum-deep) 100%);box-shadow:inset -1px 0 0 rgba(255,255,255,.06)}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 6px 6px}
  .brand .b1{font-size:14px;letter-spacing:.16em;color:#fff}

const avatarBg = (n) => {
  let h = 0; const s = String(n||"");
  for (let k = 0; k < s.length; k++) h = (h * 31 + s.charCodeAt(k)) >>> 0;
  const hue = h % 360, hue2 = (hue + 26) % 360;
  return `linear-gradient(135deg, hsl(${hue} 46% 46%), hsl(${hue2} 52% 38%))`;
};

function findAccount(name) {
  const n = String(name||"").trim().toLowerCase();
  return accounts.find(a => String(a.name||"").trim().toLowerCase() === n);
}
window.loginNameHint = () => {
  const a = findAccount((document.getElementById("lname")||{}).value);
  const cw = document.getElementById("codeWrap"), h = document.getElementById("lhint"), pw = document.getElementById("lpw");
  const first = a && !a.claimed;
  if (cw) cw.style.display = (first && a.requires_code) ? "" : "none";
  if (pw) pw.setAttribute("autocomplete", first ? "new-password" : "current-password");
  if (h) { if (first) { h.style.display="block"; h.textContent="Pierwsze logowanie — wpisane hasło zostanie zapisane jako Twoje."; } else h.style.display="none"; }
};
window.submitLogin = async () => {
  const name = (document.getElementById("lname")||{}).value || "";
  const pw   = (document.getElementById("lpw")||{}).value || "";
  const code = (document.getElementById("lcode")||{}).value || "";
  const a = findAccount(name);
  const btn = document.getElementById("lbtn");
  if (!a)  return setMsg("Nie znam takiego loginu — sprawdź pisownię imienia.", "err");
  if (!pw) return setMsg("Wpisz hasło.", "err");
  if (!a.claimed && pw.length < 6) return setMsg("Pierwsze hasło musi mieć min. 6 znaków.", "err");
  const remember = !!(document.getElementById("lremember")||{}).checked;
  if (btn) { btn.disabled = true; btn.textContent = "Chwila…"; }
  setMsg("", "");
  try {
    if (a.claimed) {
      const { error } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
      if (error) throw new Error("Błędne hasło.");
    } else {
      if (a.requires_code) {
        const { data: ok } = await sb.rpc("precheck_claim", { p_email: a.email, p_code: code });
        if (!ok) throw new Error("Nieprawidłowy kod od administratora.");
      }
      const { error: su } = await sb.auth.signUp({ email: a.email, password: pw });
      if (su) {
        // Konto Auth już istnieje (np. wcześniejsza próba) → zaloguj tym hasłem i napraw flagę.
        const { error: si } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
        if (si) throw new Error("To konto ma już hasło. Wpisz właściwe hasło, albo poproś admina o reset (zakładka Konta).");
        await sb.rpc("claim_account", { p_email: a.email, p_code: code });
      } else {
        await sb.rpc("claim_account", { p_email: a.email, p_code: code });
      }
    }
    try {
      if (remember) localStorage.setItem("panel_remember_name", a.name);
      else localStorage.removeItem("panel_remember_name");
    } catch(_) {}
    await showPanelFromSession(true);
  } catch (e) {
    setMsg((e && e.message) || "Nie udało się zalogować.", "err");
    if (btn) { btn.disabled = false; btn.textContent = "Zaloguj"; }
  }
};

          <label>${first ? "Nowe hasło (min. 6 znaków)" : "Hasło"}</label>
          <input id="pw" class="inp" type="password" autocomplete="${first ? "new-password" : "current-password"}"
            inputmode="text" enterkeyhint="${first ? "next" : "go"}" placeholder="••••••••"/>
        </div>

        <div class="field">

function setMsg(text, kind) {
  const m = document.getElementById("authMsg");
  if (!m) return;
  m.className = "msg " + (kind || "");
  m.textContent = text || "";
}

window.submitAuth = async (i, first) => {
  const a = accounts[i];
  if (!a) return;
  const pw = (document.getElementById("pw")||{}).value || "";
  const btn = document.getElementById("goBtn");
  if (first) {
    const pw2 = (document.getElementById("pw2")||{}).value || "";
    if (pw.length < 6) return setMsg("Hasło musi mieć min. 6 znaków.", "err");
    if (pw !== pw2)   return setMsg("Hasła nie są takie same.", "err");
  } else if (!pw) {
    return setMsg("Wpisz hasło.", "err");
  }
  if (btn) { btn.disabled = true; btn.textContent = "Chwila…"; }
  setMsg("", "");
  const code = (document.getElementById("ccode")||{}).value || "";
  try {
    if (first) {
      // Kod jednorazowy (jeśli wymagany) — weryfikacja PRZED utworzeniem konta.
      if (a.requires_code) {
        const { data: ok } = await sb.rpc("precheck_claim", { p_email: a.email, p_code: code });
        if (!ok) throw new Error("Nieprawidłowy kod od administratora.");
      }
      // Pierwsze logowanie: utwórz konto Auth z wybranym hasłem, potem zwiąż ze spisem.
      const { error: suErr } = await sb.auth.signUp({ email: a.email, password: pw });
      if (suErr) {
        // Konto już istnieje (np. ktoś przejął) → spróbuj normalnego logowania.
        const { error: siErr } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
        if (siErr) throw new Error("To konto jest już aktywne. Jeśli to Ty — zaloguj się swoim hasłem; jeśli nie pamiętasz, poproś admina o reset.");
      } else {
        await sb.rpc("claim_account", { p_email: a.email, p_code: code });
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
      if (error) throw new Error("Błędne hasło.");
    }
    await showPanelFromSession(true);
  } catch (e) {
    setMsg((e && e.message) || "Nie udało się zalogować.", "err");
    if (btn) { btn.disabled = false; btn.textContent = first ? "Ustaw hasło i wejdź" : "Zaloguj"; }
  }
};

let CURRENT = { role: null, name: "" };

async function showPanelFromSession(fresh) {
  app.innerHTML = '<div class="spin">Wczytywanie panelu…</div>';
  let role = null, name = "";
  let { data: { user } } = await sb.auth.getUser();
  // PWA z ekranu głównego: sesja bywa wczytana z localStorage z wygasłym tokenem —
  // odśwież i ponów, zanim uznamy brak roli za błąd.
  if (!user || !user.email) {
    try { await sb.auth.refreshSession(); } catch(_) {}
    ({ data: { user } } = await sb.auth.getUser());
  }
  if (!user || !user.email) {
    // Brak ważnej sesji → wróć do logowania zamiast martwego ekranu.
    try { await sb.auth.signOut(); } catch(_) {}
    logoutBtn.style.display = "none";
    return showLogin();
  }
  let { data: roleData } = await sb.rpc("current_app_role");
  role = roleData || null;
  let { data: me } = await sb.from("app_accounts").select("name,role").eq("email", user.email).maybeSingle();
  if (me) { name = me.name; if (!role) role = me.role; }
  // Jeszcze brak roli? Token mógł dopiero co dojść — odśwież sesję i spróbuj raz jeszcze.
  if (!role) {
    try { await sb.auth.refreshSession(); } catch(_) {}
    ({ data: roleData } = await sb.rpc("current_app_role"));
    role = roleData || null;
    ({ data: me } = await sb.from("app_accounts").select("name,role").eq("email", user.email).maybeSingle());
    if (me) { name = me.name || name; if (!role) role = me.role; }
  }
  logoutBtn.style.display = "";
  if (!role) {
    app.innerHTML = `<div class="card"><div class="msg err" style="display:block">Twoje konto nie ma jeszcze przypisanej roli. Skontaktuj się z adminem.</div></div>`;
    return;
  }
  CURRENT = { role, name, email: user.email };
  // Rejestruj tylko realne wejście (kliknięcie „Zaloguj"), nie odświeżenie/wznowienie PWA —
  // dzięki temu admin widzi w „Logach" kto faktycznie wszedł i czy coś potem zrobił.
  if (fresh) { try { await sb.rpc("log_action", { p_action:"logowanie", p_detail: role||"" }); } catch {} }
  startMailWatch();   // licznik nieprzeczytanej poczty (badge na zakładce „Poczta")
  // Admin: pełny pulpit + Konta. Gastro: własny zestaw (Grafik/Zadania/Akcje).
  // Pozostałe role dziedziczą widok HK.
  renderHkDashboard(role, name);
  notifInit();        // preferencje powiadomień + watcher (dzwonek/badge per kategoria)
}

const MON = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];
const pad = n => n<10 ? "0"+n : ""+n;
const isoDate = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const fmtDate = iso => { const [y,m,d]=iso.split("-").map(Number); const dt=new Date(y,m-1,d); return { dow:DOW[dt.getDay()], txt:d+" "+MON[m-1] }; };

// Dolny pasek telefonu mieści maks. 4 stałe zakładki + „Więcej".
// Resztę przenosimy do arkusza. Priorytet decyduje, co zostaje na pasku;
// kolejność na pasku zachowuje naturalną kolejność z tabsFor().
function splitMobTabs(tabs){
  const PRIO = ["pulpit","live","zadania","kasa","poczta","wyjazdy","grafik","konserw","tablica"];
  const keys = tabs.map(t => t[0]);
  const chosen = [];
  for (const k of PRIO){ if (chosen.length < 4 && keys.includes(k)) chosen.push(k); }
  for (const k of keys){ if (chosen.length < 4 && !chosen.includes(k)) chosen.push(k); } // dopełnij, gdy rola nie ma priorytetowych
  let primary  = tabs.filter(t => chosen.includes(t[0]));
  let overflow = tabs.filter(t => !chosen.includes(t[0]));
  // Gdy do schowania zostaje 0–1 zakładek, „Więcej" nie ma sensu — pokaż wszystko na pasku.
  if (overflow.length <= 1){ primary = tabs.slice(); overflow = []; }
  return { primary, overflow };
}

// Role recepcyjne widzą dodatkowo Zadania + Kasę; grafik widzą HK + recepcyjne.
const RECEPCJA_ROLES = new Set(["koordynator","mgr_recepcja","mgr_glowny","mgr_operacyjny"]);
const GRAFIK_ROLES   = new Set(["mgr_hk","koordynator","mgr_recepcja","mgr_glowny","mgr_operacyjny"]);
const KONSERW_ROLES  = new Set(["mgr_glowny","mgr_operacyjny"]);
function tabsFor(role){
  // Gastro: osobny, węższy zestaw (bez modułów HK).
  if (role === "mgr_gastro") return [["poczta","Poczta"],["grafik","Grafik"],["zadania","Zadania"],["tablica","Tablica"],["akcje","Akcje"]];
  const A = role === "admin";  // admin widzi wszystko
  const t = [];
  // Poczta wewnętrzna (panel ↔ panel) — dla każdej roli, zaraz po Pulpicie.
  t.push(["poczta","Poczta"]);
  // Pulpit dnia (jeden ekran-przegląd) — landing dla ról recepcyjnych/koordynatora.
  if (A || RECEPCJA_ROLES.has(role)) t.push(["pulpit","Pulpit"]);
  t.push(["live","Na żywo"],["wyjazdy","Wyjazdy"],["staty","Statystyki"]);
  if (A || role === "mgr_hk") t.push(["praca","Praca"]);   // tryb pracy: sprzątanie pokoi (jak telefon HK)
  if (A || role === "mgr_hk") t.push(["jakosc","Jakość"]); // pulpit losowych kontroli pokoi
  if (A || RECEPCJA_ROLES.has(role)) t.push(["tablica","Tablica"]);          // Tablica nie dla HK
  if (A || RECEPCJA_ROLES.has(role) || role === "mgr_hk") t.push(["znalezione","Znalezione"]); // rzeczy znalezione (recepcja + HK)
  if (A || GRAFIK_ROLES.has(role))   t.push(["grafik","Grafik"]);
  if (A || RECEPCJA_ROLES.has(role)) t.push(["zmiany","Zmiany"], ["zadania","Zadania"], ["kasa","Kasa"]); // Zmiany tylko recepcja
  if (A || KONSERW_ROLES.has(role))  t.push(["konserw","Konserw."], ["sla","SLA"], ["plan","Plan"]);
  if (A || GRAFIK_ROLES.has(role))   t.push(["akcje","Akcje"]);
  if (A)                             t.push(["konta","Konta"], ["logi","Logi"]);
  return t;
}

// ── Wyjazdy (logika 1:1 z wyjazdy.html: W/WP + PG + PGZ na 3 dni) ──
function countTypes(plan) {
  const data = plan || {};
  const pmRoomTypes = data.pm_room_types || {};
  // Wyjazdy liczymy WYLACZNIE po statusie W/WP z pm_room_types (lustro recepcji,
  // ta sama liczba co panel HK). assignments zawiera tez pobyty PG/PGZ rozpisane
  // sprzataczkom — wrzucenie ich do licznika zawyzalo wyjazdy (14+3 zamiast 12).
  const typedW = []; let pg=0, pgz=0;
  if (pmRoomTypes && typeof pmRoomTypes === "object") {
    Object.entries(pmRoomTypes).forEach(([no,v]) => {
      if (v==="W"||v==="WP") typedW.push(String(no)); else if (v==="PG") pg++; else if (v==="PGZ") pgz++;
    });
  }
  const allW = [...new Set(typedW)];
  const apt = allW.filter(no => APT_ROOMS.includes(no)).length;
  return { w:{ total:allW.length, reg:allW.length-apt, apt }, pg, pgz };
}
const fmtWP = (reg, apt) => apt ? `${reg}+${apt} APT` : `${reg}`;

  const last = range[range.length-1];
  try {

      sb.from("hk_plan").select("date,assignments,pm_room_types").gte("date",range[0]).lte("date",last),

const FEED_ICON = { start:"▶", done:"✓", skip:"✕", vacate:"🔔", task_done:"☑" };
const FEED_COLOR = { start:"#2563eb", done:"#1f7a52", skip:"#b0863a", vacate:"#7a3a6a", task_done:"#1f7a52" };
function feedText(l){
  const a = l.action;
  if (a==="start")  return `${l.worker||"?"} zaczyna pokój ${l.room||""}`;
  if (a==="done")   return `${l.worker||"?"} skończyła pokój ${l.room||""}`;

let LIVE_DATA = { byWorker:{}, today:"" };
async function loadLive() {
  const today = isoDate(new Date());
  const paint = async () => {
    let rooms = [], logs = [], roster = [], roomTypes = {}, planAssign = {}, pmAssign = {};
    try {
      const [r1, r2, r3, r4] = await Promise.all([
        sb.from("hk_rooms").select("room,worker,status,vacated").eq("date", today),
        sb.from("hk_logs").select("action,worker,room,extra,log_time,created_at").eq("date", today).order("created_at", { ascending:false }).limit(14),
        sb.from("hk_roster").select("roster").eq("tenant_id", TENANT_ID).eq("date", today).maybeSingle(),
        sb.from("hk_plan").select("assignments,pm_assignments,pm_room_types").eq("date", today).order("updated_at", { ascending:false }).limit(1).maybeSingle(),
      ]);
      rooms = r1.data || []; logs = r2.data || [];
      roster = (r3.data && Array.isArray(r3.data.roster)) ? r3.data.roster : [];
      roomTypes = (r4.data && r4.data.pm_room_types) || {};
      planAssign = (r4.data && r4.data.assignments) || {};
      pmAssign   = (r4.data && r4.data.pm_assignments) || {};
    } catch { body('<div class="empty">Brak połączenia z danymi HK.</div>'); return; }
    const byWorker = {};
    const roomOwner = {}; // room -> aktualny właściciel (plan, a potem live z hk_rooms)
    const ensure = (w, role) => {
      if (!w) return null;
      byWorker[w] = byWorker[w] || { rooms:[], done:0, role:role||"" };
      if (role && !byWorker[w].role) byWorker[w].role = role;
      return byWorker[w];
    };
    // Wszyscy z obsady dnia (też bez pokoi).
    roster.forEach(p => { const w=(p && p.name) || (typeof p==="string"?p:null); ensure(w, (p&&p.role)||""); });
    // Dodaj/uaktualnij pokój pracownika. POBYTY (PG/PGZ — typ z pm_room_types) też
    // liczymy: są przydzielane osobno (pm_assignments, zwykle popołudnie) i widać je
    // na imiennej stronie pracownika, więc panel musi się z nią zgadzać. Pole `pobyt`
    // pozwala je odróżnić od wyjazdów (W/WP) w widoku szczegółów.
    // live=true (z hk_rooms) wygrywa nad planem przy reassignmencie.
    const addRoom = (w, room, status, vacated, live) => {
      if (!w) return;
      const type = String(roomTypes[room]||"").toUpperCase();
      const isPobyt = (type === "PG" || type === "PGZ");
      const prev = roomOwner[room];
      if (prev && prev !== w) {
        if (!live) return;                          // plan nie odbiera pokoju żywemu właścicielowi
        const pb = byWorker[prev]; if (pb) pb.rooms = pb.rooms.filter(x => x.room !== room);
      }
      roomOwner[room] = w;
      const b = ensure(w); if (!b) return;
      let e = b.rooms.find(x => x.room === room);
      if (!e) { e = { room, done:false, vacated:false, pobyt:isPobyt }; b.rooms.push(e); }
      if (status  !== undefined) e.done    = DONE_STATES.has(String(status||"").toLowerCase());
      if (vacated !== undefined) e.vacated = !!vacated;
    };
    // 1) LICZBA pokoi na osobę = z planu — jak w aplikacji i na imiennych stronach,
    //    nawet zanim powstaną wiersze hk_rooms (pracownik jeszcze nic nie zaczął).
    //    assignments = wyjazdy (W/WP), pm_assignments = pobyty (PG/PGZ, np. popołudnie).
    Object.entries(planAssign).forEach(([w, rms]) => { if (Array.isArray(rms)) rms.forEach(room => addRoom(w, String(room))); });
    Object.entries(pmAssign).forEach(([w, rms]) => { if (Array.isArray(rms)) rms.forEach(room => addRoom(w, String(room))); });
    // 2) Realny STAN (czyszczenie / czyste / pusty) nakładamy z hk_rooms.
    rooms.forEach(r => { if (r.worker) addRoom(r.worker, r.room, r.status, r.vacated, true); });
    // 3) Przelicz „zrobione" po nałożeniu stanu.
    Object.values(byWorker).forEach(b => { b.done = b.rooms.filter(x => x.done).length; });
    LIVE_DATA = { byWorker, today };
    const workers = Object.entries(byWorker).filter(([w]) => w && w!=="—").sort((a,b)=>a[0].localeCompare(b[0],"pl"));
    let html;
    if (!workers.length) {
      html = '<div class="empty">Dziś nikt nie ma jeszcze obsady ani przypisanych pokoi.</div>';
    } else {
      html = workers.map(([w, d]) => {
        const total = d.rooms.length, pct = total ? Math.round(d.done/total*100) : 0;
        const role = d.role ? ` <span style="font-size:11px;color:var(--muted);font-weight:600">${esc(d.role)}</span>` : "";
        const vac = d.rooms.filter(r=>r.vacated && !r.done).length;
        const vacB = vac ? ` <span style="font-size:10px;font-weight:800;color:#a07820;background:rgba(176,134,58,.12);border:1px solid rgba(176,134,58,.35);border-radius:99px;padding:1px 7px">🔔 ${vac} pusty</span>` : "";
        // Osobno: pokoje wyjazdowe (W/WP) vs pobyty (PG/PGZ).
        const wj = d.rooms.filter(r=>!r.pobyt), pg = d.rooms.filter(r=>r.pobyt);
        const seg = [`<span style="font-size:10.5px;font-weight:800;color:var(--plum);background:rgba(90,29,74,.08);border:1px solid rgba(90,29,74,.2);border-radius:99px;padding:1px 8px">Wyjazdy ${wj.filter(r=>r.done).length}/${wj.length}</span>`];
        if (pg.length) seg.push(`<span style="font-size:10.5px;font-weight:800;color:#1f7a52;background:rgba(31,122,82,.08);border:1px solid rgba(31,122,82,.28);border-radius:99px;padding:1px 8px">PG ${pg.filter(r=>r.done).length}/${pg.length}</span>`);
        const splitLine = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${seg.join("")}</div>`;
        return `<div class="wcard" onclick="showLiveWorker('${esc(w).replace(/'/g,"\\'")}')">
          <div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}${role}${vacB}</span><span class="prog">${d.done}/${total}</span></div>
          <div class="bar"><span style="width:${pct}%"></span></div>${splitLine}</div>`;
      }).join("");
    }
    let kpis = "";
    if (workers.length) {
      // Rozdziel pokoje wyjazdowe (W/WP) od pobytów (PG/PGZ) — kierownik musi je widzieć osobno.
      let tot=0, don=0, totW=0, totP=0;
      workers.forEach(([,d])=>{ tot+=d.rooms.length; don+=d.done; d.rooms.forEach(r=>{ if(r.pobyt) totP++; else totW++; }); });
      const pct = tot ? Math.round(don/tot*100) : 0;
      kpis = `<div class="kpis">
        <div class="kpi"><div class="l">Wyjazdy</div><div class="v">${totW}</div></div>
        <div class="kpi"><div class="l">Pobyty PG</div><div class="v gold">${totP}</div></div>
        <div class="kpi"><div class="l">Zrobione</div><div class="v ok">${don}</div></div>
        <div class="kpi"><div class="l">Postęp</div><div class="v">${pct}%</div></div>
        <div class="kpi"><div class="l">Ekipa</div><div class="v">${workers.length}</div></div>
      </div>`;
    }

window.showLiveWorker = async (w) => {
  stopLive();
  body('<div class="spin">Wczytywanie…</div>');
  const today = isoDate(new Date());
  let logs = [];
  try { const { data } = await sb.from("hk_logs").select("action,worker,room,created_at,log_time").eq("date", today).eq("worker", w).order("created_at"); logs = data || []; }
  catch {}
  const d = (LIVE_DATA.byWorker||{})[w] || { rooms:[], done:0 };
  const fmtT = l => l.log_time || (l.created_at ? new Date(l.created_at).toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}) : "");
  const starts = {}, durs = [], elapsed = {};
  const tStart = {}, tDone = {}, tSkip = {}; // godzina ostatniego kliknięcia per pokój
  logs.forEach(l => {
    if (l.action==="start") { tStart[l.room] = fmtT(l); if (l.created_at) starts[l.room] = new Date(l.created_at).getTime(); }
    else if (l.action==="done") { tDone[l.room] = fmtT(l); if (l.created_at && starts[l.room]) { const m=(new Date(l.created_at).getTime()-starts[l.room])/60000; if(m>0&&m<300) durs.push(m); } delete starts[l.room]; }
    else if (l.action==="skip") { tSkip[l.room] = fmtT(l); delete starts[l.room]; }
  });
  Object.entries(starts).forEach(([room,ts]) => { elapsed[room] = Math.round((Date.now()-ts)/60000); });
  const avg = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;
  const roomsSorted = d.rooms.slice().sort((a,b)=>String(a.room).localeCompare(String(b.room),"pl",{numeric:true}));
  const renderRow = (r) => {
    const el = elapsed[r.room];
    const sk = tSkip[r.room];
    let status, times = "";
    if (sk) {
      status = `<span class="chip" style="color:var(--lilac);border-color:rgba(138,106,126,.45);background:rgba(138,106,126,.1)">goście nie chcieli</span>`;
      times = `✕ ${esc(sk)}`;
    } else if (r.done) {
      status = `<span class="chip done">gotowe</span>`;
      times = `${tStart[r.room]?`▶ ${esc(tStart[r.room])}`:""}${tDone[r.room]?`${tStart[r.room]?" · ":""}✓ ${esc(tDone[r.room])}`:""}`;
    } else if (el!=null) {
      status = `<span class="chip" style="color:var(--gold);border-color:rgba(176,134,58,.4)">w trakcie · ${el} min</span>`;
      times = tStart[r.room]?`▶ ${esc(tStart[r.room])}`:"";
    } else if (r.vacated) {
      status = `<span class="chip" style="color:#a07820;border-color:rgba(176,134,58,.45);background:rgba(176,134,58,.1)">🔔 pusty — do sprzątania</span>`;
    } else {
      status = `<span class="chip">do zrobienia</span>`;
    }
    const tline = times ? `<span style="display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">${times}</span>` : "";
    // Tag typu pokoju — czytelny też przy przewijaniu w obrębie sekcji.
    const typeTag = r.pobyt
      ? `<span style="font-size:9.5px;font-weight:800;color:#1f7a52;background:rgba(31,122,82,.1);border-radius:5px;padding:1px 5px;margin-right:6px;vertical-align:middle">PG</span>`
      : `<span style="font-size:9.5px;font-weight:800;color:var(--plum);background:rgba(90,29,74,.08);border-radius:5px;padding:1px 5px;margin-right:6px;vertical-align:middle">WYJ</span>`;
    return `<div class="statrow"><span class="k">${typeTag}Pokój ${esc(r.room)}${tline}</span>${status}</div>`;
  };
  // Osobno pokoje wyjazdowe (W/WP) i pobyty (PG/PGZ).
  const wj = roomsSorted.filter(r=>!r.pobyt), pg = roomsSorted.filter(r=>r.pobyt);
  const section = (title, arr, accent) => arr.length
    ? `<div class="soon" style="margin-top:14px;color:${accent}">${title} · ${arr.filter(r=>r.done).length}/${arr.length}</div>${arr.map(renderRow).join("")}`
    : "";
  const list = (wj.length || pg.length)
    ? section("Wyjazdy (W/WP)", wj, "var(--plum)") + section("Pobyty — PG/PGZ", pg, "#1f7a52")
    : '<div class="empty">Brak przypisanych pokoi.</div>';
  const sumSplit = `Wyjazdy ${wj.filter(r=>r.done).length}/${wj.length}${pg.length?` · PG ${pg.filter(r=>r.done).length}/${pg.length}`:""}`;
  body(`<button class="link" onclick="setHkTab('live')">‹ Wróć do listy</button>
    <div class="panelbox">
      <div class="role-ttl" style="font-size:20px">${esc(w)}</div>
      <div class="role-who">Dziś: ${d.done}/${d.rooms.length} pokoi · ${sumSplit}${avg!=null?` · średnio ${avg} min/pokój`:""}</div>
      <div style="margin-top:12px">${list}</div>
      <div class="note">Godziny: ▶ start sprzątania · ✓ zakończenie · ✕ goście nie chcieli. Widoczne tylko dla kierownika.</div>
    </div>`);

// Tempo pracy — liczone z hk_logs (start→done), zwracane jako ETYKIETA (bez minut).
// Czas jest mierzony, ale konkretne minuty celowo nie są nigdzie pokazywane.
async function workerPaceLabel(worker){
  const today=new Date(), from=new Date(today); from.setDate(today.getDate()-6);
  const fk=isoDate(from), tk=isoDate(today);
  let logs=[];
  try { const { data } = await sb.from("hk_logs").select("action,worker,room,created_at,date").eq("worker",worker).gte("date",fk).lte("date",tk); logs=data||[]; }
  catch { return "brak danych"; }
  const starts={}, durs=[];
  logs.filter(l=>l.created_at).sort((a,b)=>String(a.created_at).localeCompare(String(b.created_at))).forEach(l=>{
    if (l.action==="start") starts[l.room]=new Date(l.created_at).getTime();
    else if (l.action==="done" && starts[l.room]){ const m=(new Date(l.created_at).getTime()-starts[l.room])/60000; if(m>2&&m<240) durs.push(m); delete starts[l.room]; }
  });
  if (!durs.length) return "brak danych";
  const avg=durs.reduce((a,b)=>a+b,0)/durs.length;
  return avg<25 ? "sprawne tempo" : avg<=40 ? "równe tempo" : "dokładne, spokojne tempo";
}

// ── Aktywna zmiana (kto pracuje teraz) — z lustra „schedule" aplikacji recepcji ──
// Format lustra (jak w loadZmiany): sched["YYYY-MM-DD"]["Osoba"] = { shift, start, end }.
// Okna zmian jako fallback, gdy wpis nie ma godzin (start/end). nocna kończy się po północy → koniec >24.
const SHIFT_WIN = { poranna:[6,14], popoludnie:[14,22], popoludniowa:[14,22], wieczorowa:[14,23], dzienna:[7,19], nocna:[22,30], dyzur:[8,20] };
const _hm = s => { if (s==null||s==="") return null; const m=String(s).match(/(\d{1,2})(?::?(\d{2}))?/); if(!m) return null; let h=+m[1]; if(m[2]) h+=(+m[2])/60; return h; };
function shiftWindow(en){
  let s=_hm(en.start), e=_hm(en.end);
  if (s==null||e==null){ const w=SHIFT_WIN[en.shift]; if(w){ s=w[0]; e=w[1]; } }
  if (s==null||e==null) return null;
  if (e<=s) e+=24;            // zmiana przechodzi przez północ
  return [s,e];
}
function shiftHoursLabel(en){
  const s=(en.start??""), e=(en.end??""); if (s!==""||e!=="") return `${s}–${e}`;
  const w=SHIFT_WIN[en.shift]; return w ? `${w[0]}–${w[1]>24?w[1]-24:w[1]}` : "";
}
function activeShiftData(sched){
  const today = isoDate(new Date());
  const yest  = isoDate(new Date(Date.now()-864e5));
  const now = new Date(); const nowH = now.getHours()+now.getMinutes()/60;
  const collect = dk => { const day = sched && sched[dk]; if(!day||typeof day!=="object") return [];
    return Object.keys(day).filter(p=>day[p]).map(p=>({ person:p, shift:day[p].shift, start:day[p].start, end:day[p].end })); };
  const todayEntries = collect(today);
  const isActive = (en,off) => { const w=shiftWindow(en); if(!w) return false; const cur=nowH+(off?24:0); return cur>=w[0] && cur<w[1]; };
  const active = [ ...todayEntries.filter(en=>isActive(en,0)),
                   ...collect(yest).filter(en=>isActive(en,1)) ];   // wczorajsza nocka po północy
  const byShift = {}; todayEntries.forEach(en=>{ const k=en.shift||"inna"; (byShift[k]=byShift[k]||[]).push(en); });
  return { today, todayEntries, active, byShift };
}
function activeShiftCard(sched){
  const d = activeShiftData(sched);
  if (!sched || !d.todayEntries.length)
    return `<div class="card" style="margin-bottom:12px"><div class="soon" style="margin-top:0">Aktywna zmiana — kto pracuje teraz</div>
      <div class="note" style="margin:0">Brak grafiku na dziś (pojawi się, gdy recepcja zapisze grafik w aplikacji).</div></div>`;
  const groups = {}; d.active.forEach(en=>{ const k=en.shift||"inna"; (groups[k]=groups[k]||[]).push(en); });
  const keys = Object.keys(groups);
  const inner = keys.length ? keys.map(k=>{
      const ppl = groups[k].map(en=>esc(en.person)).join(", ");
      const hrs = shiftHoursLabel(groups[k][0]);
      return `<div class="statrow" style="gap:8px;align-items:center">
        <span class="chip" style="color:var(--ok);border-color:rgba(31,122,82,.4);white-space:nowrap">● ${esc(SHIFT_LBL[k]||k)}${hrs?` · ${esc(hrs)}`:""}</span>
        <span class="k" style="flex:1">${ppl}</span></div>`;
    }).join("") : `<div class="note" style="margin:0">Nikt nie jest teraz na zmianie wg grafiku.</div>`;
  return `<div class="card" style="margin-bottom:12px"><div class="soon" style="margin-top:0">Aktywna zmiana — kto pracuje teraz</div>${inner}</div>`;
}

// ── Zadania: przekazane na komputer recepcji (manager_alerts) + dodawanie z telefonu ──
const PRIO = { high:{l:"Pilne",c:"#c2415a"}, normal:{l:"Zwykłe",c:"#5a1d4a"}, low:{l:"Info",c:"#8a6a7e"} };
// Selektor zmiany w Zadaniach: cel (zmiana + osoby) jest dla wszystkich ról oprócz menedżera HK i gastronomii.
const SHIFT_PICKER_OFF = new Set(["mgr_hk","mgr_gastro"]);
let ZAD_SCHED = null;   // lustro „schedule" wczytane na czas renderu Zadań (do selektora osób)
let ZAD_PICK  = null;   // wybór z kalendarza: { date:"YYYY-MM-DD", shift:""|klucz, people:[] }. null = tryb „dziś" (z <select>).
let ZAD_CAL   = [];     // bufor terminów wyrenderowanych w modalu kalendarza (onclick → indeks)
function zadShiftOptions(){
  const d = activeShiftData(ZAD_SCHED);
  let opts = `<option value="current">Aktualna zmiana (auto)</option>`;
  Object.keys(d.byShift).forEach(k=>{
    const names = d.byShift[k].map(e=>e.person).join(", ");
    opts += `<option value="shift:${esc(k)}">${esc(SHIFT_LBL[k]||k)}${names?` — ${esc(names)}`:""}</option>`;
  });
  return opts + `<option value="all">Cała załoga dziś</option><option value="none">Bez przypisania do zmiany</option>`;
}
function zadPeopleFor(val){
  const d = activeShiftData(ZAD_SCHED);
  if (val==="none") return [];
  if (val==="all")  return d.todayEntries.map(e=>e.person);
  if (val==="current") return (d.active.length ? d.active : d.todayEntries).map(e=>e.person);
  if (val && val.indexOf("shift:")===0){ const k=val.slice(6); return (d.byShift[k]||[]).map(e=>e.person); }
  return [];
}
// Render listy osób (checkboxy do zawężenia) z aktywnego terminu: wybór z kalendarza ma pierwszeństwo nad <select>.

// ── Kalendarz: wybór konkretnego dnia / zmiany / osoby z grafiku (najbliższe 14 dni) ──
window.zadOpenCal = () => {
  const sched = ZAD_SCHED || {};
  const base = new Date(); base.setHours(0,0,0,0);
  ZAD_CAL = [];
  let daysHtml = "";
  for (let i=0;i<14;i++){
    const dk = isoDate(new Date(base.getTime()+i*86400000));
    const day = sched[dk];
    const entries = (day && typeof day==="object")
      ? Object.keys(day).filter(p=>day[p]).map(p=>({ person:p, shift:day[p].shift||"inna", start:day[p].start, end:day[p].end }))
      : [];
    const f = fmtDate(dk);
    const dlabel = `${f.dow} ${f.txt}`;
    const byShift = {}; entries.forEach(en=>{ (byShift[en.shift]=byShift[en.shift]||[]).push(en); });
    const allPeople = entries.map(e=>e.person);
    const dayIdx = entries.length ? ZAD_CAL.push({ date:dk, shift:"", people:allPeople })-1 : -1;
    let inner;
    if (!entries.length){
      inner = `<div class="note" style="margin:0;font-size:12px">Brak grafiku na ten dzień.</div>`;
    } else {
      inner = Object.keys(byShift).map(k=>{
        const ppl = byShift[k];
        const hrs = shiftHoursLabel(ppl[0]);
        const sIdx = ZAD_CAL.push({ date:dk, shift:k, people:ppl.map(e=>e.person) })-1;
        const chips = ppl.map(e=>{
          const pIdx = ZAD_CAL.push({ date:dk, shift:k, people:[e.person] })-1;
          return `<button type="button" class="zadcal-chip" onclick="zadPickIdx(${pIdx})">${esc(e.person)}</button>`;
        }).join("");
        return `<div class="zadcal-shift">
          <button type="button" class="zadcal-shiftbtn" onclick="zadPickIdx(${sIdx})">${esc(SHIFT_LBL[k]||k)}${hrs?` · ${esc(hrs)}`:""}</button>
          <div class="zadcal-people">${chips}</div></div>`;
      }).join("");
    }
    daysHtml += `<div class="zadcal-day">
      <div class="zadcal-dayhead"><span>${esc(dlabel)}</span>
        ${dayIdx>=0?`<button type="button" class="zadcal-allday" onclick="zadPickIdx(${dayIdx})">Cały dzień</button>`:""}
      </div>${inner}</div>`;
  }
  const ov = document.createElement("div");
  ov.id = "zadCalOv"; ov.className = "zadcal-ov";
  ov.innerHTML = `<div class="zadcal-box" role="dialog" aria-modal="true" aria-label="Wybór dnia i zmiany">
    <div class="zadcal-top"><strong>Wybierz termin zadania</strong>
      <button type="button" class="zadcal-x" onclick="zadCloseCal()" aria-label="Zamknij">✕</button></div>
    <div class="zadcal-hint">Dotknij dzień, zmianę lub osobę — grafik z aplikacji recepcji.</div>
    <div class="zadcal-list">${daysHtml}</div></div>`;
  ov.addEventListener("click", e=>{ if (e.target===ov) zadCloseCal(); });
  document.body.appendChild(ov);
  document.addEventListener("keydown", zadCalEsc);
};
function zadCalEsc(e){ if (e.key==="Escape") zadCloseCal(); }
window.zadCloseCal = () => { const ov=document.getElementById("zadCalOv"); if (ov) ov.remove(); document.removeEventListener("keydown", zadCalEsc); };
window.zadPickIdx = (i) => {
  const t = ZAD_CAL[i]; if (!t) return;
  ZAD_PICK = { date:t.date, shift:t.shift||"", people:[...new Set(t.people||[])] };
  zadCloseCal(); zadSyncPickUI(); zadRenderPeople();
};
// Recepcja filtruje alerty po target_shift === selectedShift, więc klucz MUSI być kluczem zmiany recepcji.
const RECEPCJA_SHIFTS = new Set(["poranna","popoludniowa","wieczorowa","dzienna","nocna"]);
// Klucz zmiany do kolumny manager_alerts.target_shift (null = wszystkie zmiany → alert widoczny dla każdej zmiany).
function zadTargetShiftKey(){
  if (ZAD_PICK){ return RECEPCJA_SHIFTS.has(ZAD_PICK.shift) ? ZAD_PICK.shift : null; }
  const sel = document.getElementById("zShift"); if (!sel) return null;
  const val = sel.value || "current";
  if (val==="all" || val==="none") return null;
  let key = null;
  if (val.indexOf("shift:")===0) key = val.slice(6);
  else { const d = activeShiftData(ZAD_SCHED); key = d.active.length ? d.active[0].shift : null; }  // current → aktywna zmiana
  return RECEPCJA_SHIFTS.has(key) ? key : null;   // nieznany klucz → wszystkie zmiany (nie chowamy zadania na recepcji)
}
// Data celu (kolumna manager_alerts.target_date). null = bez konkretnej daty (zachowanie „dziś").
function zadTargetDate(){ return ZAD_PICK ? ZAD_PICK.date : null; }
// Zawężenie do konkretnych osób (gdy odznaczono część grafiku) — trafia do treści, bo recepcja filtruje po zmianie/dacie, nie po osobie.
function zadTargetPeople(){
  let all;
  if (ZAD_PICK){ all = [...new Set(ZAD_PICK.people||[])]; }
  else {
    const sel = document.getElementById("zShift"); if (!sel) return "";
    const val = sel.value || "current"; if (val==="none") return "";
    all = [...new Set(zadPeopleFor(val))];
  }
  const checked = Array.from(document.querySelectorAll(".zp:checked")).map(c=>c.value);
  if (!all.length || checked.length===all.length) return "";   // cała zmiana → bez listy osób
  return checked.join(", ");
}
async function loadZadania() {
  const showPicker = !SHIFT_PICKER_OFF.has(CURRENT.role);
  let rows = [];
  try {
    const [alerts, sched] = await Promise.all([
      sb.from("manager_alerts").select("id,title,body,priority,created_by,created_at,done,target_shift,target_date")
        .eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(60),
      showPicker ? getMirror("schedule") : Promise.resolve(null),
    ]);
    rows = alerts.data || [];
    ZAD_SCHED = sched || null;
  } catch { return body('<div class="empty">Nie udało się pobrać zadań.</div>'); }
  ZAD_PICK = null;   // nowy render → start od trybu „dziś"
  rows = rows.filter(r => !r.done);
  const pickerHtml = showPicker ? `
      <div class="field"><label>Na jaką zmianę?</label>
        <select id="zShift" class="inp" onchange="zadShiftChanged()">${zadShiftOptions()}</select>
        <button type="button" class="zadcal-btn" onclick="zadOpenCal()">📅 Inny dzień / zmiana</button>
        <div id="zPick" style="display:none"></div></div>
      <div class="field"><label>Dotyczy osób (odznacz, by zawęzić)</label>
        <div id="zPeople" class="chips"></div></div>` : "";
  const form = `
    ${showPicker ? activeShiftCard(ZAD_SCHED) : ""}
    <div class="card" style="margin-bottom:12px">
      <div class="soon" style="margin-top:0">Przekaż zadanie na komputer recepcji</div>
      <div class="field"><label>Treść zadania</label>
        <input id="zTitle" class="inp" placeholder="np. Sprawdzić rezerwację 312" onkeydown="if(event.key==='Enter')addZadanie()"/></div>
      <div class="field"><label>Szczegóły (opcjonalnie)</label>
        <input id="zBody" class="inp" placeholder="dodatkowy opis" onkeydown="if(event.key==='Enter')addZadanie()"/></div>
      <div class="field"><label>Priorytet</label>
        <select id="zPrio" class="inp"><option value="normal">Zwykłe</option><option value="high">Pilne</option><option value="low">Info</option></select></div>
      ${pickerHtml}
      <button id="zBtn" class="btn" onclick="addZadanie()">Wyślij na komputer</button>
      <div id="zMsg" class="msg"></div>
    </div>`;
  const list = rows.length ? rows.map(r => {
    const p = PRIO[r.priority] || PRIO.normal;
    const when = r.created_at ? new Date(r.created_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    // Cel zadania: zmiana z kolumny target_shift, osoby z pierwszej linii treści „Dla osób: …".
    let bodyTxt = r.body || "", people = "";
    const mt = bodyTxt.match(/^Dla(?: os[oó]b)?:\s*([^\n]+)\n?/i);
    if (mt){ people = mt[1]; bodyTxt = bodyTxt.slice(mt[0].length); }
    const shiftLbl = r.target_shift ? (SHIFT_LBL[r.target_shift]||r.target_shift) : "";
    const dateLbl = r.target_date ? (()=>{ const f=fmtDate(r.target_date); return `${f.dow} ${f.txt}`; })() : "";
    const parts = [dateLbl, shiftLbl, people].filter(Boolean);
    const tgt = parts.length ? (parts.length===1 && people && !dateLbl && !shiftLbl ? `Osoby: ${people}` : parts.join(" · ")) : "";
    return `<div class="statrow" style="align-items:flex-start;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <span class="chip" style="color:${p.c};border-color:${p.c}55">${p.l}</span>
        <span class="k" style="flex:1">${esc(r.title||"")}</span>
        <span class="tm" style="font-size:11px;color:var(--muted)">${esc(when)}</span>
      </div>
      ${tgt?`<span class="chip" style="color:var(--plum);border-color:var(--line-strong)">🕘 ${esc(tgt)}</span>`:""}
      ${bodyTxt?`<div style="font-size:12.5px;color:var(--muted)">${esc(bodyTxt)}</div>`:""}
      <div style="display:flex;align-items:center;gap:8px;width:100%;margin-top:2px">
        ${r.created_by?`<span style="font-size:11px;color:var(--muted);flex:1">od: ${esc(r.created_by)}</span>`:`<span style="flex:1"></span>`}
        <button class="rost-addbtn" style="padding:6px 11px;border-radius:8px;border:1px solid rgba(31,122,82,.4);background:rgba(31,122,82,.08);color:var(--ok);font-weight:800;font-size:11.5px;cursor:pointer"
          onclick="markZadanieDone('${r.id}')">✓ Zrobione</button>
      </div>
    </div>`;
  }).join("") : '<div class="empty">Brak otwartych zadań. 🎉</div>';
  body(form + `<div class="soon">Przekazane zadania</div>` + list);
  if (showPicker){ zadSyncPickUI(); zadRenderPeople(); }   // wypełnij listę osób dla domyślnej „aktualnej zmiany"
}
window.addZadanie = async () => {
  const title = (document.getElementById("zTitle")||{}).value || "";
  const bodyv = (document.getElementById("zBody")||{}).value || "";
  const prio  = (document.getElementById("zPrio")||{}).value || "normal";
  const msg = document.getElementById("zMsg"); const btn = document.getElementById("zBtn");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!title.trim()) return setM("Wpisz treść zadania.", "err");
  // Cel zmiany → kolumna target_shift (recepcja filtruje alerty po zmianie: PreShiftModal/Inbox).
  // Zawężenie do osób → pierwsza linia treści „Dla osób: …" (recepcja nie ma filtra po osobie).
  const tShift  = (typeof zadTargetShiftKey === "function") ? zadTargetShiftKey() : null;
  const tDate   = (typeof zadTargetDate === "function") ? zadTargetDate() : null;
  const tPeople = (typeof zadTargetPeople === "function") ? zadTargetPeople() : "";
  const baseBody = bodyv.trim() || title.trim();
  const finalBody = tPeople ? `Dla osób: ${tPeople}\n${baseBody}` : baseBody;
  if (btn){ btn.disabled=true; btn.textContent="Wysyłanie…"; }
  try {
    const { error } = await sb.from("manager_alerts").insert({
      tenant_id: TENANT_ID, title: title.trim(), body: finalBody,
      priority: prio, created_by: CURRENT.name || "Panel", target_shift: tShift, target_date: tDate,
      kind: "task",   // zadanie → zakładka „Zadania" recepcji (nie „Pilne"; pilne = high pokazuje się też jako alert)
    });
    if (error) throw error;
    try { await sb.rpc("log_action", { p_action:"zadanie_dodane", p_detail: title.trim() }); } catch {}
    loadZadania();
  } catch (e) {
    setM((e&&e.message)||"Nie udało się wysłać.", "err");
    if (btn){ btn.disabled=false; btn.textContent="Wyślij na komputer"; }
  }
};

window.markZadanieDone = async (id) => {
  try {
    const { error } = await sb.from("manager_alerts").update({ done:true, done_at:new Date().toISOString(), done_by:CURRENT.name||"Panel" }).eq("id", id);
    if (error) throw error;
    try { await sb.rpc("log_action", { p_action:"zadanie_zrobione", p_detail:"oznaczono zrobione" }); } catch {}
    loadZadania();
  } catch (e) { alert((e&&e.message)||"Nie udało się oznaczyć."); }
};

// ─────────────────────────── Poczta wewnętrzna (panel ↔ panel) ───────────────────────────
// Kanał osoba↔osoba/rola na bazie manager_messages (migracja 0037). Niezależny od
// manager_alerts (tamto celuje w zmianę recepcji). Typy: prośba / zadanie / info.
const MAIL_KIND   = { prosba:"Prośba", zadanie:"Zadanie", info:"Info" };
const MAIL_STATUS = { open:{l:"Otwarta",c:"#5a1d4a"}, in_progress:{l:"W toku",c:"#b5761e"}, done:{l:"Zrobione",c:"#1f7a52"}, rejected:{l:"Odrzucona",c:"#c2415a"} };
let MAIL_VIEW = "list";      // list (karty próśb + composer na dole) | thread
let MAIL_THREAD = null;      // id otwartego wątku
let MAIL_ACCOUNTS = [];      // lista kont (adresaci)
let MAIL_UNREAD = 0;
let MAIL_CH = null;          // kanał realtime

const mailWhen = iso => iso ? new Date(iso).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
const mailIsMine = r => r.from_email === CURRENT.email;
const mailToMe   = r => r.to_email === CURRENT.email || r.to_role === CURRENT.role;
const mailDest   = r => r.to_email
  ? ((MAIL_ACCOUNTS.find(a=>a.email===r.to_email)||{}).name || "osoba")
  : ("wszyscy: " + ROLE_LABEL(r.to_role));

function setMailBadge(){
  // Poczta jest jedną z kategorii powiadomień — jej licznik karmi wspólny system
  // (dzwonek + badge na zakładce). „Nieprzeczytane poczty" liczymy z read_at.
  NOTIF_COUNTS.poczta = notifOn("poczta") ? (MAIL_UNREAD || 0) : 0;
  notifPaint();
}
async function refreshMailUnread(){
  if (!CURRENT.email) return;
  try {
    const { count } = await sb.from("manager_messages")
      .select("id", { count:"exact", head:true })
      .or(`to_email.eq.${CURRENT.email},to_role.eq.${CURRENT.role}`)
      .is("read_at", null).neq("from_email", CURRENT.email);
    MAIL_UNREAD = count || 0; setMailBadge();
  } catch {}
}
function startMailWatch(){
  refreshMailUnread();
  try { if (MAIL_CH) sb.removeChannel(MAIL_CH); } catch {}
  try {
    MAIL_CH = sb.channel("panel-poczta")
      .on("postgres_changes", { event:"*", schema:"public", table:"manager_messages", filter:`tenant_id=eq.${TENANT_ID}` },
        () => { refreshMailUnread();
          // Odśwież widok poczty na żywo, ale nie wycieraj tekstu, gdy ktoś właśnie pisze prośbę/odpowiedź.
          if (hkTab!=="poczta") return;
          const ae = document.activeElement;
          if (ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName||"") && /^m(To|Body|Pilne|Desk|Reply)$/.test(ae.id||"")) return;
          loadPoczta();
        })
      .subscribe();
  } catch {}
}

// ─────────────────────────── Powiadomienia panelu (per konto) ───────────────────────────
// Każde konto wybiera, O CZYM chce powiadomień (dzwonek w topbarze + badge na zakładce).
// Preferencje w panel_notif_prefs (mig. 0039). „Nieprzeczytane" liczymy po stronie klienta:
//   • poczta  → manager_messages.read_at (MAIL_UNREAD),
//   • korekty / notatki / raporty → snapshot panel_mirror, różnica id vs ostatnio widziane,
//   • zadania → manager_alerts kind=task (otwarte), różnica id,
//   • grafik  → zmiana snapshotu schedule (hash) vs ostatnio widziany.
// Stan „widziane" trzymamy w localStorage (per email+kategoria) — bez zmian schematu.
// Pierwsze wejście NIE buczy wstecznie: nieznaną kategorię inicjalizujemy bieżącym stanem.
const NOTIF_CATS = {
  poczta:  { label:"Poczta",           icon:"✉",  tab:"poczta"  },
  korekty: { label:"Korekty kasy",     icon:"🧾", tab:"kasa"    },
  notatki: { label:"Notatki służbowe", icon:"📝", tab:"kasa"    },
  raporty: { label:"Raporty zmian",    icon:"📋", tab:"kasa"    },
  zadania: { label:"Zadania",          icon:"✓",  tab:"zadania" },
  grafik:  { label:"Grafik",           icon:"📅", tab:"grafik"  },
};
let NOTIF_PREFS = null;     // { cat:bool } z DB; null = jeszcze nie wczytane (traktuj jak „wszystko ON")
let NOTIF_COUNTS = {};      // { cat:liczba nieprzeczytanych }
let NOTIF_CH = null;        // kanał realtime (panel_mirror + manager_alerts)
let NOTIF_OPEN = false;     // dropdown otwarty
let NOTIF_SETTINGS = false; // dropdown pokazuje ustawienia

// Kategoria dostępna dla roli, gdy rola ma odpowiadającą zakładkę (spójne z tabsFor).
function notifAvail(cat){
  const tab = NOTIF_CATS[cat] && NOTIF_CATS[cat].tab;
  return (tabsFor(CURRENT.role) || []).some(([k]) => k === tab);
}
// Włączona = dostępna dla roli I nie odznaczona (brak wpisu → domyślnie ON).
function notifOn(cat){
  if (!notifAvail(cat)) return false;
  if (NOTIF_PREFS && cat in NOTIF_PREFS) return !!NOTIF_PREFS[cat];
  return true;
}
function notifAvailCats(){ return Object.keys(NOTIF_CATS).filter(notifAvail); }

const notifSeenKey = cat => `notif_seen:${CURRENT.email}:${cat}`;
function notifHash(s){ let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return h; }

// Klucze elementów danej kategorii — do różnicy „nowe vs widziane".
async function notifKeys(cat){
  try {
    if (cat === "korekty"){ const a = await getMirror("payment_corrections"); return Array.isArray(a) ? a.map(x => String(x.id || x.reservation || "")).filter(Boolean) : []; }
    if (cat === "notatki"){ const a = await getMirror("employee_reports");   return Array.isArray(a) ? a.map(x => String(x.id || ((x.createdAt||"") + "|" + (x.author||"")))).filter(Boolean) : []; }
    if (cat === "raporty"){ const a = await getMirror("reports_full");        return Array.isArray(a) ? a.map(x => String((x.dayKey||x.day_key||"") + "|" + (x.shiftKey||x.shift_key||"") + "|" + (x.employee||x.employeeName||""))).filter(Boolean) : []; }
    if (cat === "grafik"){ const s = await getMirror("schedule"); return s ? ["h:" + notifHash(JSON.stringify(s))] : []; }
    if (cat === "zadania"){
      const { data } = await sb.from("manager_alerts").select("id,done").eq("tenant_id", TENANT_ID).eq("kind", "task");
      return (data || []).filter(r => !r.done).map(r => String(r.id));
    }
  } catch {}
  return [];
}

// Przelicz liczniki wszystkich (poza pocztą — ta z MAIL_UNREAD przez setMailBadge).
async function notifRefresh(){
  if (!CURRENT.email) return;
  NOTIF_COUNTS.poczta = notifOn("poczta") ? (MAIL_UNREAD || 0) : 0;
  await Promise.all(notifAvailCats().filter(c => c !== "poczta").map(async cat => {
    if (!notifOn(cat)) { NOTIF_COUNTS[cat] = 0; return; }
    const raw = localStorage.getItem(notifSeenKey(cat));
    const keys = await notifKeys(cat);
    if (raw == null) { try { localStorage.setItem(notifSeenKey(cat), JSON.stringify(keys)); } catch {} NOTIF_COUNTS[cat] = 0; return; }
    let seen; try { seen = new Set(JSON.parse(raw || "[]")); } catch { seen = new Set(); }
    NOTIF_COUNTS[cat] = keys.filter(k => !seen.has(k)).length;
  }));
  notifPaint();
}

// Wejście w zakładkę = oznacz jej kategorie jako przeczytane (poczta: read_at osobno).
async function notifMarkTabSeen(tab){
  const cats = notifAvailCats().filter(c => NOTIF_CATS[c].tab === tab && c !== "poczta");
  if (!cats.length) return;
  await Promise.all(cats.map(async cat => {
    const keys = await notifKeys(cat);
    try { localStorage.setItem(notifSeenKey(cat), JSON.stringify(keys)); } catch {}
    NOTIF_COUNTS[cat] = 0;
  }));
  notifPaint();
}

function notifTabCount(tab){
  return notifAvailCats().filter(c => NOTIF_CATS[c].tab === tab && notifOn(c)).reduce((s, c) => s + (NOTIF_COUNTS[c] || 0), 0);
}
function notifTotal(){ return notifAvailCats().filter(notifOn).reduce((s, c) => s + (NOTIF_COUNTS[c] || 0), 0); }

function notifPaint(){
  document.querySelectorAll("[data-notifbadge]").forEach(el => {
    const n = notifTabCount(el.getAttribute("data-notifbadge"));
    if (n > 0){ el.hidden = false; el.textContent = n > 99 ? "99+" : String(n); }
    else { el.hidden = true; el.textContent = ""; }
  });
  const b = document.getElementById("notifBellCount");
  if (b){ const t = notifTotal(); if (t > 0){ b.hidden = false; b.textContent = t > 99 ? "99+" : String(t); } else { b.hidden = true; b.textContent = ""; } }
  const mb = document.getElementById("moreBadge"); // suma z zakładek schowanych pod „Więcej"
  if (mb){ const n = OVERFLOW_TABS.reduce((s,k) => s + notifTabCount(k), 0); if (n > 0){ mb.hidden = false; mb.textContent = n > 99 ? "99+" : String(n); } else { mb.hidden = true; mb.textContent = ""; } }
  if (NOTIF_OPEN) notifRenderMenu();
}

// ── Dropdown dzwonka ──
window.notifToggle = () => {
  NOTIF_OPEN = !NOTIF_OPEN; NOTIF_SETTINGS = false;
  const m = document.getElementById("notifMenu"); if (!m) return;
  m.hidden = !NOTIF_OPEN; if (NOTIF_OPEN) notifRenderMenu();
};
document.addEventListener("click", (e) => {
  if (!NOTIF_OPEN) return;
  if (e.target.closest(".notif-wrap")) return;   // klik w dzwonek/menu — nie zamykaj
  NOTIF_OPEN = false; const m = document.getElementById("notifMenu"); if (m) m.hidden = true;
});

function notifRenderMenu(){
  const m = document.getElementById("notifMenu"); if (!m) return;
  if (NOTIF_SETTINGS){
    const rows = notifAvailCats().map(c => `
      <label class="notif-set">
        <input type="checkbox" ${notifOn(c) ? "checked" : ""} onchange="notifSetPref('${c}', this.checked)">
        <span class="ni">${NOTIF_CATS[c].icon}</span><span class="nl">${NOTIF_CATS[c].label}</span>
      </label>`).join("");
    m.innerHTML = `<div class="notif-hd"><button class="notif-gear" onclick="notifBackList()" title="Wróć">‹</button>
        <span>Co Cię powiadamiać</span><span style="width:22px"></span></div>
      ${rows}
      <div class="notif-foot">Wybór zapisuje się automatycznie i działa na każdym urządzeniu.</div>`;
    return;
  }
  const cats = notifAvailCats().filter(notifOn);
  const rows = cats.map(c => {
    const n = NOTIF_COUNTS[c] || 0;
    return `<button class="notif-row" onclick="notifOpenCat('${c}')">
      <span class="ni">${NOTIF_CATS[c].icon}</span>
      <span class="nl">${NOTIF_CATS[c].label}</span>
      ${n > 0 ? `<span class="navbadge">${n > 99 ? "99+" : n}</span>` : `<span class="nz">—</span>`}
    </button>`;
  }).join("");
  m.innerHTML = `<div class="notif-hd"><span>Powiadomienia</span>
      <button class="notif-gear" onclick="notifGoSettings()" title="Ustawienia">⚙</button></div>
    ${rows || `<div class="notif-empty">Wszystkie powiadomienia wyłączone.<br>Włącz je w ⚙ ustawieniach.</div>`}`;
}
window.notifOpenCat  = (c) => { NOTIF_OPEN = false; const m = document.getElementById("notifMenu"); if (m) m.hidden = true; setHkTab(NOTIF_CATS[c].tab); };
window.notifGoSettings = () => { NOTIF_SETTINGS = true; notifRenderMenu(); };
window.notifBackList   = () => { NOTIF_SETTINGS = false; notifRenderMenu(); };
window.notifSetPref = async (cat, on) => {
  if (!NOTIF_PREFS) NOTIF_PREFS = {};
  NOTIF_PREFS[cat] = !!on;
  await notifSavePrefs();
  await notifRefresh();
  notifRenderMenu();
};

// ── Preferencje w DB (panel_notif_prefs) ──
async function notifLoadPrefs(){
  NOTIF_PREFS = {};
  if (!CURRENT.email) return;
  try {
    const { data } = await sb.from("panel_notif_prefs").select("prefs")
      .eq("tenant_id", TENANT_ID).eq("email", CURRENT.email).maybeSingle();
    if (data && data.prefs && typeof data.prefs === "object") NOTIF_PREFS = data.prefs;
  } catch {}
}
async function notifSavePrefs(){
  if (!CURRENT.email) return;
  try {
    await sb.from("panel_notif_prefs").upsert(
      { tenant_id: TENANT_ID, email: CURRENT.email, prefs: NOTIF_PREFS, updated_at: new Date().toISOString() },
      { onConflict: "tenant_id,email" });
  } catch {}
}

async function notifInit(){
  await notifLoadPrefs();
  await notifRefresh();
  try { if (NOTIF_CH) sb.removeChannel(NOTIF_CH); } catch {}
  try {
    NOTIF_CH = sb.channel("panel-notif")
      .on("postgres_changes", { event:"*", schema:"public", table:"panel_mirror",   filter:`tenant_id=eq.${TENANT_ID}` }, () => notifRefresh())
      .on("postgres_changes", { event:"*", schema:"public", table:"manager_alerts", filter:`tenant_id=eq.${TENANT_ID}` }, () => notifRefresh())
      .subscribe();
  } catch {}
}

async function loadPoczta(){
  body('<div class="spin">Wczytywanie poczty…</div>');
  try {
    const [accRes, msgRes] = await Promise.all([
      sb.from("app_accounts").select("name,email,role,active"),
      sb.from("manager_messages").select("*").eq("tenant_id", TENANT_ID).order("created_at", { ascending:true }).limit(500),
    ]);
    MAIL_ACCOUNTS = (accRes.data || []).filter(a => a.active !== false);
    window._MAIL_ROWS = msgRes.data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać poczty.</div>'); }
  if (MAIL_VIEW === "thread")  return mailRenderThread();
  return mailRenderList();
}

function mailThreads(){
  // Grupuj po thread_id; zwróć ostatnią wiadomość + meta (czy nieprzeczytane, korespondent).
  const rows = window._MAIL_ROWS || [];
  const byThread = {};
  rows.forEach(r => { (byThread[r.thread_id] = byThread[r.thread_id] || []).push(r); });
  return Object.values(byThread).map(list => {
    list.sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
    const root = list[0], last = list[list.length-1];
    const unread = list.filter(r => mailToMe(r) && !mailIsMine(r) && !r.read_at).length;
    return { id: root.thread_id, root, last, count:list.length, unread, list };
  }).sort((a,b)=> new Date(b.last.created_at)-new Date(a.last.created_at));
}

// „Kto czegoś od Ciebie chce" — luźne karty próśb. Bez tematu/typu/priorytetu jako pól.
// Komponowanie na samym DOLE listy (prosty pasek „poproś kogoś"), bez paska zakładek u góry.
function mailReqMsg(t){ return t.list.find(r => r.kind !== "info") || t.root; }   // wiadomość prośby ze statusem
function mailRenderList(){
  const threads = mailThreads();
  // Do Ciebie: wątki z prośbą do mnie od kogoś innego.   Twoje prośby: które ja rozpocząłem.
  const incoming = threads.filter(t => t.list.some(r => mailToMe(r) && !mailIsMine(r)));
  const outgoing = threads.filter(t => mailIsMine(t.root));

  const card = (t, mine) => {
    const r = t.root, req = mailReqMsg(t);
    const st = MAIL_STATUS[req.status] || MAIL_STATUS.open;
    const who = mine ? mailDest(r) : r.from_name;
    const lead = mine ? `Prosisz <b>${esc(who)}</b>:` : `<b>${esc(who)}</b> prosi Cię:`;
    const closed = req.status === "done" || req.status === "rejected";
    const av = esc(initials(who)), avbg = avatarBg(who);
    const actions = (!mine && !closed)
      ? `<button class="rost-addbtn" style="padding:6px 11px;border-radius:8px;border:1px solid rgba(31,122,82,.4);background:rgba(31,122,82,.08);color:var(--ok);font-weight:800;font-size:11.5px;cursor:pointer"
            onclick="event.stopPropagation();mailQuickDone('${req.id}')">✓ Zrobione</button>
         <button class="rost-addbtn" style="padding:6px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);font-weight:800;font-size:11.5px;cursor:pointer"
            onclick="event.stopPropagation();mailOpen('${r.thread_id}')">Odpisz</button>`
      : `<span class="chip" style="color:${st.c};border-color:${st.c}55">${st.l}</span>`;
    return `<div class="statrow" style="align-items:flex-start;gap:11px;cursor:pointer;${t.unread?'box-shadow:inset 3px 0 0 #c2415a':''}" onclick="mailOpen('${r.thread_id}')">
      <span class="me-av" style="width:38px;height:38px;flex:0 0 auto;background:${avbg};font-size:13px">${av}</span>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="flex:1;font-size:13.5px;${t.unread?'font-weight:800':''}">${lead}${r.priority==="high"?' <span class="chip" style="color:#c2415a;border-color:#c2415a55">pilne</span>':''}</span>
          ${t.unread?`<span class="navbadge">${t.unread}</span>`:""}
          <span class="tm" style="font-size:11px;color:var(--muted)">${esc(mailWhen(t.last.created_at))}</span>
        </div>
        <div style="font-size:13px;color:var(--ink);white-space:pre-wrap">${esc(r.body||"")}${t.count>1?` <span style="color:var(--muted)">· ${t.count} wiad.</span>`:""}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px">${actions}</div>
      </div>
    </div>`;
  };

  const inHtml  = incoming.length ? incoming.map(t => card(t,false)).join("")
                                  : `<div class="empty">Nikt nic od Ciebie teraz nie chce 🎉</div>`;
  const outHtml = outgoing.length ? `<div class="soon" style="margin-top:16px">Twoje prośby</div>` + outgoing.map(t => card(t,true)).join("") : "";
  body(`${inHtml}${outHtml}${mailComposer()}`);
}

// Pasek „poproś kogoś" — na samym DOLE listy. Krótko: do kogo + o co + (pilne) + wyślij.
function mailComposer(){
  const me = CURRENT.email;
  const people = MAIL_ACCOUNTS.filter(a => a.email !== me)
    .map(a => `<option value="email:${esc(a.email)}">${esc(a.name)} — ${esc(ROLE_LABEL(a.role))}</option>`).join("");
  const roles = [...new Set(MAIL_ACCOUNTS.map(a=>a.role))]
    .map(rr => `<option value="role:${rr}">Wszyscy: ${esc(ROLE_LABEL(rr))}</option>`).join("");
  return `<div class="card" style="margin-top:16px">
    <div class="soon" style="margin-top:0">Poproś kogoś o coś</div>
    <div class="field"><select id="mTo" class="inp">
      <option value="">— do kogo? —</option>
      <optgroup label="Osoby">${people}</optgroup>
      <optgroup label="Działy / role">${roles}</optgroup>
    </select></div>
    <div class="field"><textarea id="mBody" class="inp" rows="2" placeholder="Czego potrzebujesz? np. sprawdź proszę grafik na piątek"></textarea></div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">
      <label class="remember" style="margin:0"><input id="mPilne" type="checkbox"/><span>❗ pilne</span></label>
      ${mailCanBridge() ? `<label class="remember" style="margin:0"><input id="mDesk" type="checkbox"/><span>📌 pokaż też na recepcji</span></label>` : ""}
    </div>
    <button id="mBtn" class="btn" onclick="mailSend()">Wyślij prośbę</button>
    <div id="mMsg" class="msg"></div>
  </div>`;
}
// Most do recepcji: tylko role, które i tak wystawiają zadania na dyżur (jak zakładka Zadania).
function mailCanBridge(){ return CURRENT.role==="admin" || RECEPCJA_ROLES.has(CURRENT.role); }

// Szybkie „Zrobione" wprost z karty (bez wchodzenia w wątek).
window.mailQuickDone = async (id) => {
  try {
    const { error } = await sb.from("manager_messages")
      .update({ status:"done", done_at:new Date().toISOString(), done_by:CURRENT.name||"Panel" }).eq("id", id);
    if (error) throw error;
    loadPoczta();
  } catch (e) { alert((e&&e.message)||"Nie udało się oznaczyć."); }
};

window.mailSend = async () => {
  const to   = (document.getElementById("mTo")||{}).value || "";
  const bd   = (document.getElementById("mBody")||{}).value || "";
  const prio = (document.getElementById("mPilne")||{}).checked ? "high" : "normal";
  const msg = document.getElementById("mMsg"), btn = document.getElementById("mBtn");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!to)        return setM("Wybierz, kogo prosisz.", "err");
  if (!bd.trim()) return setM("Napisz, o co prosisz.", "err");
  // Bez osobnego pola „temat" — temat to skrót treści (kolumna subject jest NOT NULL).
  const subj = bd.trim().split("\n")[0].slice(0, 60);
  const row = {
    tenant_id: TENANT_ID, thread_id: crypto.randomUUID(),
    from_email: CURRENT.email, from_name: CURRENT.name || "Panel", from_role: CURRENT.role,
    subject: subj, body: bd.trim(), kind: "prosba", priority: prio, status: "open",
  };
  if (to.startsWith("email:")) row.to_email = to.slice(6);
  else if (to.startsWith("role:")) row.to_role = to.slice(5);
  const toDesk = mailCanBridge() && !!(document.getElementById("mDesk")||{}).checked;
  if (btn){ btn.disabled=true; btn.textContent="Wysyłanie…"; }
  try {
    const { error } = await sb.from("manager_messages").insert(row);
    if (error) throw error;
    // Most do recepcji: kopia jako zadanie na komputer dyżuru (target_shift/date null = widoczne od razu).
    if (toDesk){
      try {
        await sb.from("manager_alerts").insert({
          tenant_id: TENANT_ID, title: subj, body: bd.trim(),
          priority: prio, created_by: CURRENT.name || "Panel",
          target_shift: null, target_date: null, kind: "task",
        });
      } catch {}
    }
    try { await sb.rpc("log_action", { p_action:"poczta_wyslana", p_detail: subj + (toDesk?" (+recepcja)":"") }); } catch {}
    loadPoczta();

    setM((e&&e.message)||"Nie udało się wysłać.", "err");
