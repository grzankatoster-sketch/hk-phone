  }
};

window.mailGo = (v) => { MAIL_VIEW = v; MAIL_THREAD = (v==="thread"?MAIL_THREAD:null); loadPoczta(); };
window.mailOpen = async (threadId) => { MAIL_THREAD = threadId; MAIL_VIEW = "thread"; await mailMarkThreadRead(threadId); loadPoczta(); };

async function mailMarkThreadRead(threadId){
  const rows = (window._MAIL_ROWS || []).filter(r => r.thread_id===threadId && mailToMe(r) && !mailIsMine(r) && !r.read_at);
  if (!rows.length) return;
  const ids = rows.map(r=>r.id);
  try { await sb.from("manager_messages").update({ read_at:new Date().toISOString() }).in("id", ids); } catch {}
  rows.forEach(r => r.read_at = new Date().toISOString());
  refreshMailUnread();
}

function mailRenderThread(){
  const list = (window._MAIL_ROWS || []).filter(r => r.thread_id===MAIL_THREAD)
    .sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  if (!list.length){ MAIL_VIEW="list"; return mailRenderList(); }
  const root = list[0];
  const reqMsg = list.find(r => r.kind!=="info");  // wiadomość prośby/zadania ze statusem

      <div style="max-width:80%;border:1px solid var(--line);border-radius:12px;padding:9px 12px;background:${mine?'rgba(90,29,74,.06)':'var(--paper)'}">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${esc(r.from_name)}${mine?" (Ty)":""} · ${esc(mailWhen(r.created_at))}</div>
        <div style="font-size:13.5px;white-space:pre-wrap">${esc(r.body)}</div>
        ${r.reply_note?`<div style="font-size:12px;color:var(--muted);margin-top:5px;border-top:1px dashed var(--line);padding-top:5px">↳ ${esc(r.reply_note)}</div>`:""}
      </div></div>`;
  }).join("");
  // Akcje na prośbie/zadaniu — tylko dla adresata, gdy jeszcze otwarte/w toku.
  let actions = "";
  if (reqMsg && mailToMe(reqMsg) && !mailIsMine(reqMsg) && (reqMsg.status==="open"||reqMsg.status==="in_progress")){
    actions = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0">
      ${reqMsg.status==="open"?`<button class="btn" style="width:auto;padding:8px 14px;background:#b5761e" onclick="mailSetStatus('${reqMsg.id}','in_progress')">Przyjmuję / w toku</button>`:""}
      <button class="btn" style="width:auto;padding:8px 14px;background:#1f7a52" onclick="mailSetStatus('${reqMsg.id}','done')">✓ Zrobione</button>
      <button class="btn" style="width:auto;padding:8px 14px;background:#c2415a" onclick="mailReject('${reqMsg.id}')">Odrzuć</button>
    </div>`;
  }
  body(`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <button class="zm-nav" style="width:auto;padding:0 14px;font-weight:800" onclick="mailGo('list')">‹ Wróć</button>
      <span class="k" style="flex:1;font-size:16px;font-weight:800">${esc(root.subject||"(bez tematu)")}</span>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
        <span class="chip" style="color:var(--plum);border-color:var(--line-strong)">${MAIL_KIND[root.kind]||root.kind}</span>
        ${st?`<span class="chip" style="color:${st.c};border-color:${st.c}55">${st.l}</span>`:""}
        ${root.priority==="high"?`<span class="chip" style="color:#c2415a;border-color:#c2415a55">Pilne</span>`:""}
        <span style="font-size:11.5px;color:var(--muted)">do: ${esc(mailDest(root))}</span>
      </div>
      ${bubbles}
      ${actions}
      <div class="field" style="margin-top:6px"><label>Odpowiedz</label>
        <textarea id="mReply" class="inp" rows="3" placeholder="Napisz odpowiedź…"></textarea></div>
      <button class="btn" onclick="mailReply()">Wyślij odpowiedź</button>
      <div id="mrMsg" class="msg"></div>
    </div>`);
}

window.mailSetStatus = async (id, status) => {
  const patch = { status };

  try {
    const { error } = await sb.from("manager_messages").update(patch).eq("id", id);
    if (error) throw error;
    try { await sb.rpc("log_action", { p_action:"poczta_status", p_detail: status }); } catch {}
    loadPoczta();

};

window.mailReject = async (id) => {
  const note = prompt("Powód odrzucenia (opcjonalnie):") || "";
  try {
    const { error } = await sb.from("manager_messages").update({ status:"rejected", reply_note: note.trim() || null }).eq("id", id);
    if (error) throw error;
    loadPoczta();
  } catch (e) { alert((e&&e.message)||"Nie udało się odrzucić."); }

window.mailReply = async () => {
  const txt = (document.getElementById("mReply")||{}).value || "";
  const msg = document.getElementById("mrMsg");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!txt.trim()) return setM("Wpisz treść odpowiedzi.", "err");
  const list = (window._MAIL_ROWS || []).filter(r => r.thread_id===MAIL_THREAD)
    .sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  const root = list[0]; const last = list[list.length-1];
  // Adresat odpowiedzi = druga strona wątku (jeśli ja jestem nadawcą roota → adresat roota; inaczej → nadawca roota).
  const row = {

// ── Kasa: stan kasy ostatnich dni (shift_reports) ──
const SHIFT_LBL = { poranna:"Poranna", popoludniowa:"Popołudniowa", wieczorowa:"Wieczorowa", nocna:"Nocna", dzienna:"Dzienna" };
const DOC_KASA = { paragon:"Paragon", faktura:"Faktura", fiskalny:"Paragon fiskalny", inny:"Inny dokument" };
const zl = v => (v==null||isNaN(v)) ? "—" : Number(v).toLocaleString("pl-PL",{minimumFractionDigits:2,maximumFractionDigits:2})+" zł";
let kasaFull = false;
window.toggleKasaFull = () => { kasaFull = !kasaFull; loadKasa(); };
let kasaTab = "sejf";
window.setKasaTab = (t) => { kasaTab = t; loadKasa(); };
// Normalizuje datę do klucza ISO (YYYY-MM-DD). Mirror aplikacji recepcji zapisuje
// część dat w formacie pl-PL ("DD.MM.RRRR, GG:MM" z fmtA), a część jako ISO/dayKey —
// bez tej normalizacji filtr zakresu odrzucał wszystko (korekty/notatki nie pokazywały się).
const kasaIso = v => {
  if (!v) return "";
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m = s.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);   // DD.MM.RRRR
  if (m) return `${m[3]}-${pad(+m[2])}-${pad(+m[1])}`;
  const t = new Date(s); return isNaN(t) ? "" : isoDate(t);
};
const kasaNum = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
async function loadKasa() {
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate() - (kasaFull ? 89 : 6));
  const fromKey = isoDate(from), toKey = isoDate(today);
  const inRange = k => { const dk = kasaIso(k); return !!dk && dk>=fromKey && dk<=toKey; };
  const toggle = `<button class="rost-addbtn fullspan" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px" onclick="toggleKasaFull()">${kasaFull ? "Pokaż ostatnie 7 dni" : "Pokaż pełną historię (90 dni)"}</button>`;
  let rows = [];
  try {
    const { data } = await sb.from("shift_reports").select("day_key,shift_key,employee,cash_closing,safe_total,cash_current,saved_at")
      .eq("tenant_id", TENANT_ID).gte("day_key", fromKey).lte("day_key", toKey).order("saved_at", { ascending:false }).limit(300);
    rows = data || [];
  } catch {}
  // Korekty płatności + raporty zmian + notatki służbowe — z mirrora aplikacji recepcji (panel_mirror).
  // Zatwierdzenia korekt trzymamy osobno (payment_correction_approvals), bo mirror jest read-only.
  const [corr, rf, notes, cashState, apprRes] = await Promise.all([
    getMirror("payment_corrections"), getMirror("reports_full"), getMirror("employee_reports"), getMirror("cash_state"),
    sb.from("payment_correction_approvals").select("correction_id,decision,manager,note,decided_at").eq("tenant_id", TENANT_ID).then(r=>r, ()=>({data:[]})),
  ]);
  const apprBy = {}; (apprRes && apprRes.data || []).forEach(a => { apprBy[a.correction_id] = a; });
  // Fallback stanu kasy: gdy brak wierszy w shift_reports (zmiana zamknięta offline lub
  // przed wdrożeniem zapisu do DB), odtwórz kasę z lustra raportów pełnych (reports_full).
  if (!rows.length && Array.isArray(rf)) {
    rows = rf.filter(r => inRange(r.dayKey||r.day_key||r.savedAt)).map(r => ({
      day_key: kasaIso(r.dayKey||r.day_key||r.savedAt),
      shift_key: r.shiftKey||r.shift_key,
      employee: r.employeeName||r.employee,
      cash_closing: kasaNum(r.cashClosingDocumentsAmount),
      safe_total: typeof r.safeTotal==="number"?r.safeTotal:kasaNum(r.safeTotal),
      cash_current: kasaNum(r.cashCurrentAmount),
      saved_at: r.savedAt,
    }));
  }
  let corrPend = 0, corrCount = 0, rfCount = 0, notesCount = 0;
  // ── Alerty „do weryfikacji" — czysto panelowe heurystyki na danych kasy/korekt ──
  const alerts = [];
  // 1) Zmiana zamykająca dzień (wieczorowa/nocna) bez zarejestrowanego KW.
  rows.forEach(r => {
    const closing = (r.shift_key==="wieczorowa"||r.shift_key==="nocna");
    if (closing && (r.cash_closing==null || r.cash_closing===0)) {
      const d = fmtDate(r.day_key);
      alerts.push(`${d.txt}: ${SHIFT_LBL[r.shift_key]||r.shift_key} (${esc(r.employee||"—")}) — brak KW (zmiana zamykająca dzień)`);
    }
  });
  // 2) Spadek stanu sejfu dzień-do-dnia (możliwy wypływ gotówki do zweryfikowania).
  const safeByDay = {};
  rows.forEach(r => { if (r.safe_total!=null) { const dk=r.day_key; if (!(dk in safeByDay)) safeByDay[dk]=r.safe_total; } });
  const safeDays = Object.keys(safeByDay).sort();
  for (let i=1;i<safeDays.length;i++){
    const prev=safeByDay[safeDays[i-1]], cur=safeByDay[safeDays[i]];
    if (prev>0 && cur < prev - 0.5) { const d=fmtDate(safeDays[i]); alerts.push(`${d.txt}: kasa spadła o ${zl(prev-cur)} (z ${zl(prev)} do ${zl(cur)})`); }
  }
  // 3) Korekty oczekujące dłużej niż 3 dni.
  if (Array.isArray(corr)) {
    const cut = isoDate(new Date(Date.now()-3*86400000));
    corr.forEach(c => { if (!c.done && !apprBy[c.id]) { const dk=kasaIso(c.submittedAt||c.createdAt); if (dk && dk < cut) alerts.push(`Korekta „${esc(DOC_KASA[c.docType]||c.docType||"")}${c.reservation?` · rez. ${esc(c.reservation)}`:""}" oczekuje od ${dk}`); } });
  }
  const alertHtml = alerts.length
    ? `<div class="fullspan" style="margin-bottom:10px;padding:11px 13px;border:1px solid rgba(194,65,90,.35);background:rgba(194,65,90,.07);border-radius:11px">
        <div style="font-weight:800;font-size:12.5px;color:var(--bad);margin-bottom:5px">⚠️ Do weryfikacji (${alerts.length})</div>
        ${alerts.slice(0,8).map(a=>`<div style="font-size:12px;color:var(--ink);padding:1px 0">• ${a}</div>`).join("")}
      </div>` : "";
  let cashHtml;
  if (!rows.length) {
    cashHtml = `<div class="empty">Brak raportów kasy. Pojawią się, gdy recepcja zamknie zmianę.</div>`;
  } else {
    const byDay = {};
    rows.forEach(r => { (byDay[r.day_key] = byDay[r.day_key] || []).push(r); });
    // Tylko bieżący (najnowszy) dzień — bez historii kasy z poprzednich dni.
    const days = Object.keys(byDay).sort().reverse().slice(0, 1);
    cashHtml = days.map(dk => {
      const d = fmtDate(dk);
      const items = byDay[dk].map(r => {
        // Kasetka (bieżąca gotówka) = WYŁĄCZNIE live stan recepcji (cash_state.kasetka). Gdy go brak
        // (recepcja nie wypchnęła lustra), pokazujemy „— oczekuje", a NIE safe_total/cash_current —
        // bo te to zrzuty SPRZED wpłaty do sejfu (np. 800) i myliłyby się z bieżącą kasą (500).
        // Historyczny zrzut per zmiana zostaje w podzakładce „Raporty".
        const rowKasetka = (cashState && cashState.kasetka != null) ? cashState.kasetka : null;
        const kasetkaCell = rowKasetka != null ? zl(rowKasetka)
          : `<span style="color:var(--muted);font-weight:600;font-size:12px">— oczekuje na recepcję</span>`;
        return `
        <div class="statrow" style="margin-bottom:6px">
          <div class="k">
            <div>${esc(SHIFT_LBL[r.shift_key]||r.shift_key||"")} · ${esc(r.employee||"—")}</div>
            <div style="font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px">
              KW: ${zl(r.cash_closing)}</div>
          </div>
          <div class="v" title="Kasetka">${kasetkaCell}</div>
        </div>`; }).join("");
      return `<div style="margin-bottom:14px"><div class="soon" style="margin-top:0">${d.dow}, ${d.txt}</div>${items}</div>`;
    }).join("");
  }
  // Korekty płatności (paragon/faktura) — dokumenty, nie kwoty. Rozwijany opis + decyzja kierownika.
  let corrHtml = "";
  if (Array.isArray(corr)) {
    const list = corr.filter(c => inRange(c.submittedAt||c.createdAt||c.dateKey||c.date)).slice(0,80);
    // Stan = decyzja z panelu (apprBy) ma pierwszeństwo; w jej braku — flaga done z aplikacji recepcji.
    const stateOf = c => { const a=apprBy[c.id]; if (a) return a.decision==="rejected"?"rejected":"approved"; return c.done?"approved":"pending"; };
    corrPend = list.filter(c=>stateOf(c)==="pending").length;
    corrCount = list.length;
    if (list.length) corrHtml = list.map(c => {
      const who = esc(c.submittedBy||c.employee||c.name||"—");
      const when = esc(String(c.submittedAt||c.createdAt||"").trim());
      const doc = esc(DOC_KASA[c.docType]||c.docType||"Korekta");
      const resv = esc(c.reservation||"");
      const why = esc(c.explanation||c.reason||c.note||"");
      const shift = esc(SHIFT_LBL[c.shift]||c.shift||"");
      const st = stateOf(c); const a = apprBy[c.id];
      const dWhen = a&&a.decided_at ? new Date(a.decided_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
      const status = st==="approved"
        ? `<span class="chip" style="color:var(--ok);border-color:rgba(15,122,74,.35);background:rgba(15,122,74,.07)">zatwierdzona</span>`
        : st==="rejected"
        ? `<span class="chip" style="color:var(--bad);border-color:rgba(194,65,90,.4);background:rgba(194,65,90,.07)">odrzucona</span>`
        : `<span class="chip" style="color:var(--gold);border-color:rgba(176,134,58,.4)">oczekuje</span>`;
      const decided = a ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${a.decision==="rejected"?"Odrzucił":"Zatwierdził"}: ${esc(a.manager||"—")}${dWhen?` · ${dWhen}`:""}</div>` : "";
      const cid = esc(String(c.id||"")).replace(/'/g,"\\'");
      const actions = (st==="pending" && c.id)
        ? `<div style="display:flex;gap:7px;margin-top:7px">
            <button class="rost-addbtn" style="padding:7px 12px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:12px;cursor:pointer" onclick="event.stopPropagation();decideCorrection('${cid}','approved')">Zatwierdź</button>
            <button class="rost-addbtn" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--bad);font-weight:800;font-size:12px;cursor:pointer" onclick="event.stopPropagation();decideCorrection('${cid}','rejected')">Odrzuć</button>
          </div>` : "";
      return `<div class="statrow" style="flex-direction:column;align-items:stretch;gap:4px;cursor:pointer" onclick="this.querySelector('.corr-body').style.display=this.querySelector('.corr-body').style.display==='block'?'none':'block'">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div style="font-weight:800;font-size:13px">${doc}${resv?` · rez. ${resv}`:""}</div>${status}</div>
        <div style="font-size:11.5px;color:var(--muted);font-weight:600">${who}${shift?` · ${shift}`:""}${when?` · ${when}`:""}</div>${decided}
        <div class="corr-body" style="display:none;font-size:12.5px;color:var(--ink);white-space:pre-wrap;margin-top:2px;line-height:1.45">${why||"(brak opisu)"}</div>
        ${actions}
      </div>`;
    }).join("");
  }
  // Raporty zmian = źródło raportu dobowego. Każda zmiana rozwijana: kasa, zadania, przekazanie, braki.
  let rfHtml = "";
  if (Array.isArray(rf)) {
    const byDk = {}; rf.forEach(r => { const dk=kasaIso(r.dayKey||r.day_key||r.savedAt); if(inRange(dk)) (byDk[dk]=byDk[dk]||[]).push(r); });
    const dks = Object.keys(byDk).sort().reverse().slice(0, kasaFull?90:7);
    rfCount = dks.reduce((n,dk)=>n+byDk[dk].length,0);
    if (dks.length) rfHtml = dks.map(dk => {
      const d = fmtDate(dk);
      const shifts = byDk[dk];
      const items = shifts.map(r => {
        const sh = esc(SHIFT_LBL[r.shiftKey||r.shift_key]||r.shiftLabel||r.shiftKey||r.shift_key||"");
        const who = esc(r.employeeName||r.employee||"—");
        const allTasks = [...(r.baseTasks||[]), ...(r.carryOver||[])];
        const tDone = allTasks.filter(t=>t.status==="[OK]").length, tTot = allTasks.length;
        const cash = `Kasetka: ${zl(kasaNum(r.cashCurrentAmount))} · KW: ${zl(kasaNum(r.cashClosingDocumentsAmount))} · Kasa: ${zl(typeof r.safeTotal==="number"?r.safeTotal:kasaNum(r.safeTotal))}`;
        const handover = esc(r.handoverNote||"");
        const taskLines = allTasks.map(t=>`<div style="font-size:12px;padding:1px 0">${t.status==="[OK]"?"✓":"✗"} ${esc(t.text)}</div>`).join("");
        const missing = (r.missingTasks||[]).map(t=>esc(t.text||t)).filter(Boolean);
        return `<div class="statrow" style="flex-direction:column;align-items:stretch;gap:3px;cursor:pointer" onclick="this.querySelector('.rf-body').style.display=this.querySelector('.rf-body').style.display==='block'?'none':'block'">
          <div style="display:flex;justify-content:space-between;gap:8px"><div style="font-weight:800;font-size:12.5px">${sh} — ${who}</div><div style="font-size:11.5px;color:var(--muted);font-weight:700">${tTot?`${tDone}/${tTot} zadań`:""}</div></div>
          <div style="font-size:11px;color:var(--muted);font-weight:600">${cash}</div>
          <div class="rf-body" style="display:none;margin-top:5px">
            ${handover?`<div style="font-size:12px;color:var(--ink);margin-bottom:6px"><b>Przekazanie:</b> ${handover}</div>`:""}
            ${taskLines?`<div style="margin-bottom:4px">${taskLines}</div>`:""}
            ${missing.length?`<div style="font-size:11.5px;color:var(--bad)"><b>Braki:</b> ${missing.join(", ")}</div>`:""}
          </div>
        </div>`;
      }).join("");
      return `<div style="margin-bottom:14px"><div style="font-weight:800;font-size:13px;margin-bottom:5px">${d.dow}, ${d.txt} <span style="color:var(--muted);font-weight:600">· ${shifts.length} ${shifts.length===1?"zmiana":"zmian"}</span></div>${items}</div>`;
    }).join("");
  }
  // Przesłane notatki służbowe (employee_reports) — pełna treść rozwijana po kliknięciu.
  let notesHtml = "";
  if (Array.isArray(notes)) {
    const list = notes.filter(n => inRange(n.reportDate||n.createdAt)).slice(0,40);
    notesCount = list.length;
    if (list.length) notesHtml = list.map((n,i) => {
      const subj = esc(n.subject||"Notatka służbowa");
      const author = esc(n.author||"—"); const to = esc(n.handoverTo||"");
      const when = esc(kasaIso(n.reportDate||n.createdAt));
      const content = esc(n.content||"");
      return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:4px;cursor:pointer" onclick="this.querySelector('.note-body').style.display=this.querySelector('.note-body').style.display==='block'?'none':'block'">
        <div style="font-weight:800;font-size:13px">${subj}</div>
        <div style="font-size:11.5px;color:var(--muted);font-weight:600">${author}${to?` → ${to}`:""}${when?` · ${when}`:""}</div>
        <div class="note-body" style="display:none;font-size:12.5px;color:var(--ink);white-space:pre-wrap;margin-top:4px;line-height:1.45">${content}</div>
      </div>`;
    }).join("");
  }
  // ── Hero: kasetka (live KPI recepcji = stała kasowa) jako główna liczba, sejf obok ──
  const safeRow = rows.find(r => r.safe_total != null);
  const lastRow = rows[0];
  // Kasetka i sejf z lustra live recepcji (cash_state); w jego braku fallback do raportów.
  const kasetkaVal = cashState && cashState.kasetka != null ? cashState.kasetka : null;
  const safeVal = cashState && cashState.safe != null ? cashState.safe : (safeRow ? safeRow.safe_total : null);
  const heroSub = lastRow
    ? `Kasa: ${zl(safeVal)} · ostatnia zmiana: ${esc(SHIFT_LBL[lastRow.shift_key]||lastRow.shift_key||"—")} · ${esc(lastRow.employee||"—")} · ${fmtDate(lastRow.day_key).txt}`
    : (safeVal!=null ? `Kasa: ${zl(safeVal)}` : "Brak zamkniętych zmian w wybranym okresie.");
  const heroHtml = `<div class="fullspan" style="background:var(--plum);color:#fff;border-radius:14px;padding:15px 17px;margin-bottom:12px;box-shadow:0 4px 14px -6px rgba(90,29,74,.5)">
      <div style="font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;opacity:.78">Kasetka${kasetkaVal==null?" (oczekuje na dane z recepcji)":""}</div>
      <div style="font-size:27px;font-weight:900;line-height:1.1;margin:3px 0 4px">${kasetkaVal!=null ? zl(kasetkaVal) : "—"}</div>
      <div style="font-size:11.5px;font-weight:600;opacity:.82">${heroSub}</div>
    </div>`;
  // ── Zakładki: rozdzielają cztery niezależne tematy zamiast jednego scrolla ──
  const tab = (id,label,count) => `<button class="tab ${kasaTab===id?"on":""}" onclick="setKasaTab('${id}')">${label}${count?` <span style="font-size:10.5px;opacity:.7">${count}</span>`:""}</button>`;
  const tabsHtml = `<div class="tabs fullspan" style="margin:0 0 12px">
      ${tab("sejf","Kasa")}${tab("korekty","Korekty",corrPend||corrCount)}${tab("raporty","Raporty",rfCount)}${tab("notatki","Notatki",notesCount)}
    </div>`;
  const hint = t => `<div class="note fullspan" style="margin-top:0;margin-bottom:10px">${t}</div>`;
  let panel;
  if (kasaTab === "korekty") {
    panel = corrPend ? hint(`${corrPend} korekt oczekuje na decyzję. Kliknij, by rozwinąć opis i zatwierdzić/odrzucić.`) : hint("Korekty płatności (paragon/faktura). Kliknij, by rozwinąć szczegóły.");
    panel += corrHtml || `<div class="empty">Brak korekt w wybranym okresie.</div>`;
  } else if (kasaTab === "raporty") {
    panel = toggle + hint("Raporty zmian / dobowe. Kliknij zmianę, by zobaczyć kasę, zadania, przekazanie i braki.");
    panel += rfHtml || `<div class="empty">Brak raportów zmian w wybranym okresie.</div>`;
  } else if (kasaTab === "notatki") {
    panel = hint("Przesłane notatki służbowe. Kliknij, by rozwinąć treść.");
    panel += notesHtml || `<div class="empty">Brak notatek w wybranym okresie.</div>`;
  } else {
    panel = hint("Bieżący stan kasy po ostatnich zmianach. Po prawej: kwota w kasie.");
    panel += cashHtml;
  }
  body(heroHtml + alertHtml + tabsHtml + panel);
}

// Decyzja kierownika o korekcie (zatwierdź/odrzuć) — zapis do payment_correction_approvals.
window.decideCorrection = async (correctionId, decision) => {
  if (!correctionId) return;
  const note = decision==="rejected" ? (prompt("Powód odrzucenia (opcjonalnie):")||"") : "";
  try {
    const { error } = await sb.from("payment_correction_approvals").upsert(
      { tenant_id:TENANT_ID, correction_id:correctionId, decision, manager:CURRENT.name||"Panel", note, decided_at:new Date().toISOString() },
      { onConflict:"tenant_id,correction_id" });
    if (error) throw error;
    try { await sb.rpc("log_action", { p_action:"korekta_decyzja", p_detail:`${decision==="rejected"?"odrzucona":"zatwierdzona"} (${correctionId})` }); } catch {}
    loadKasa();
  } catch (e) { alert("Nie udało się zapisać decyzji" + (e&&e.message?`: ${e.message}`:".")); }
};

// ── Pulpit dnia: jeden ekran-przegląd dla koordynatora/recepcji. Agreguje dane z innych
//    zakładek (obsada, wyjazdy, kasa, zadania, ogłoszenia); kafelki skaczą do sekcji. ──
async function loadPulpit() {
  const today = isoDate(new Date()); const d = fmtDate(today);
  body('<div class="spin">Wczytywanie…</div>');
  let plan={}, roster=[], sched=null, cashRows=[], corr=[], appr=[], alerts=[], rems=[], rf=null, cashState=null, faults=[];
  try {
    const [pl, ro, sc, sr, mc, ma, rm, rfm, ar, cs, fa] = await Promise.all([
      sb.from("hk_plan").select("assignments,pm_room_types").eq("date",today).maybeSingle(),
      sb.from("hk_roster").select("roster").eq("tenant_id",TENANT_ID).eq("date",today).maybeSingle(),
      getMirror("schedule"),
      sb.from("shift_reports").select("shift_key,cash_current,safe_total,cash_closing,saved_at,employee").eq("tenant_id",TENANT_ID).eq("day_key",today).order("saved_at",{ascending:false}),
      getMirror("payment_corrections"),
      sb.from("manager_alerts").select("priority,done").eq("tenant_id",TENANT_ID),
      sb.from("standing_reminders").select("title,active,created_at").eq("tenant_id",TENANT_ID).order("created_at",{ascending:false}).limit(40),
      getMirror("reports_full"),
      sb.from("payment_correction_approvals").select("correction_id").eq("tenant_id",TENANT_ID).then(r=>r,()=>({data:[]})),
      getMirror("cash_state"),
      sb.from("faults").select("status,priority,due_at,reported_at").eq("tenant_id",TENANT_ID).in("status",["open","in_progress"]).limit(400).then(r=>r,()=>({data:[]})),
    ]);
    plan   = (pl && pl.data) || {};
    roster = (ro && ro.data && Array.isArray(ro.data.roster)) ? ro.data.roster : [];
    sched  = sc;
    cashRows = (sr && sr.data) || [];
    corr   = Array.isArray(mc) ? mc : [];
    alerts = (ma && ma.data) || [];
    rems   = ((rm && rm.data) || []).filter(r => r.active !== false);
    rf     = rfm;
    appr   = (ar && ar.data) || [];
    cashState = (cs && typeof cs === "object") ? cs : null;
    faults = (fa && fa.data) || [];
  } catch { return body('<div class="empty">Nie udało się wczytać pulpitu.</div>'); }

  // Obsada: HK z roster + recepcja z mirrora grafiku.
  const recCount = (sched && typeof sched==="object" && sched[today]) ? Object.values(sched[today]).filter(Boolean).length : 0;
  const hkCount = roster.length;
  // Wyjazdy/pobyty dnia.
  const types = countTypes(plan);
  // Kasa: ostatni stan sejfu + czy zmiana zamykająca ma KW (fallback z reports_full).
  let cash = cashRows.slice();
  if (!cash.length && Array.isArray(rf)) {
    cash = rf.filter(r => kasaIso(r.dayKey||r.day_key||r.savedAt)===today).map(r => ({
      shift_key:r.shiftKey||r.shift_key, safe_total: typeof r.safeTotal==="number"?r.safeTotal:kasaNum(r.safeTotal),
      cash_closing:kasaNum(r.cashClosingDocumentsAmount), saved_at:r.savedAt }));
    cash.sort((a,b)=>String(b.saved_at||"").localeCompare(String(a.saved_at||"")));
  }
  const safe = cash.length ? cash[0].safe_total : null;
  // Live stan kasy (kasetka) WYŁĄCZNIE z lustra recepcji (cash_state). Brak lustra → null → „—
  // oczekuje", a NIE safe_total (to zrzut sprzed wpłaty do sejfu, myliłby się z bieżącą kasą).
  const kasaLive = (cashState && cashState.kasetka != null) ? cashState.kasetka : null;
  const kasaTxt = kasaLive != null ? zl(kasaLive) : "— oczekuje na recepcję";
  const closingShift = cash.find(r => r.shift_key==="wieczorowa"||r.shift_key==="nocna");
  const kwMissing = closingShift && (closingShift.cash_closing==null || closingShift.cash_closing===0);
  const kwTxt = kwMissing ? "⚠ brak" : (closingShift ? "✓ zarejestr." : "—");
  // Korekty oczekujące (bez decyzji panelu, nie done).
  const apprIds = new Set(appr.map(a => a.correction_id));
  const pendCorr = corr.filter(c => !c.done && !apprIds.has(c.id)).length;
  // Zadania otwarte / pilne.
  const openTasks = alerts.filter(a => !a.done);
  const pilne = openTasks.filter(a => a.priority==="high").length;
  // Usterki: otwarte, po terminie SLA, zgłoszone dziś (data lokalna — zgodnie z konwencją HK).
  const now = Date.now();
  const overdueFaults = faults.filter(r => r.due_at && new Date(r.due_at).getTime() < now);
  const faultsToday = faults.filter(r => r.reported_at && isoDate(new Date(r.reported_at)) === today).length;
  const hasSla = (tabsFor(CURRENT.role) || []).some(([k]) => k === "sla");
  // Pokrycie zmian recepcji dziś (z lustra grafiku) — tylko gdy są dane o zmianach (brak danych ≠ brak obsady).
  const shiftSet = new Set(Object.values((sched && sched[today]) || {}).map(v => v && v.shift).filter(Boolean));
  const covTxt = [["poranna","R"],["popoludniowa","Po"],["nocna","N"]]
    .map(([k,a]) => shiftSet.has(k) ? a : `<span style="color:var(--bad)">${a}✗</span>`).join(" · ");

  // Pasek krytycznych alertów — pokazuje wyłącznie realne, klikalne problemy dnia.
  const flags = [];
  if (hasSla && overdueFaults.length) flags.push({ t:`${overdueFaults.length} usterek po terminie SLA`, tab:"sla", bad:true });
  if (kwMissing)                       flags.push({ t:"Brak KW przy zamknięciu dnia", tab:"kasa", bad:true });
  if (pilne)                           flags.push({ t:`${pilne} pilnych zadań`, tab:"zadania", bad:true });
  if (pendCorr)                        flags.push({ t:`${pendCorr} korekt kasy do decyzji`, tab:"kasa", bad:false });
  const banner = flags.length ? `<div class="fullspan" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">`
    + flags.map(f => { const col = f.bad ? "var(--bad)" : "var(--gold)"; const bg = f.bad ? "rgba(194,65,90,.08)" : "rgba(176,134,58,.09)";
        return `<button onclick="setHkTab('${f.tab}')" style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:800;font-size:12.5px;color:${col};background:${bg};border:1px solid ${col};border-radius:11px;padding:8px 13px"><span style="font-size:15px">${f.bad?"⚠":"●"}</span>${esc(f.t)}<span style="opacity:.7;font-weight:700">›</span></button>`; }).join("")
    + `</div>` : "";

  const kpis = `<div class="kpis">
    <div class="kpi"><div class="l">Obsada dziś</div><div class="v">${hkCount + recCount}</div></div>
    <div class="kpi"><div class="l">Wyjazdy</div><div class="v gold">${fmtWP(types.w.reg, types.w.apt)}</div></div>
    <div class="kpi"><div class="l">Zadania</div><div class="v${pilne?' bad':''}">${openTasks.length}</div></div>
    <div class="kpi"><div class="l">Kasa</div><div class="v ok"${kasaLive==null?' style="font-size:13px;color:var(--muted)"':''}>${kasaTxt}</div></div>
  </div>`;

  const line = (l,v,c) => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0"><span style="color:var(--muted);font-weight:600">${l}</span><span style="font-weight:800${c?`;color:${c}`:""}">${v}</span></div>`;
  const tile = (tab,icon,title,lines) => `<div class="wcard" style="cursor:pointer;padding:16px 17px" onclick="setHkTab('${tab}')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="display:flex;align-items:center;gap:11px;font-weight:800;font-size:15px"><span style="font-size:26px;line-height:1">${icon}</span>${title}</span>
      <span style="font-size:11.5px;color:var(--plum);font-weight:800">otwórz ›</span></div>
    <div style="margin-top:11px">${lines}</div></div>`;

  const tiles = [
    tile("kasa","💰","Kasa", line("Kasetka", kasaTxt, kasaLive==null?"var(--muted)":"") + line("KW (zamknięcie dnia)", kwTxt, kwMissing?"var(--bad)":"var(--ok)") + line("Korekty oczekujące", pendCorr, pendCorr?"var(--gold)":"")),
    tile("zadania","✅","Zadania", line("Otwarte", openTasks.length) + line("Pilne", pilne, pilne?"var(--bad)":"")),
    hasSla ? tile("sla","🛠️","Usterki / SLA", line("Otwarte", faults.length) + line("Po terminie", overdueFaults.length, overdueFaults.length?"var(--bad)":"var(--ok)") + line("Zgłoszone dziś", faultsToday)) : "",
    tile("wyjazdy","🚪","Wyjazdy", line("Wyjazdy (W/WP)", fmtWP(types.w.reg, types.w.apt)) + line("Pobyty PG", types.pg) + line("Pobyty PGZ", types.pgz)),
    tile("live","👥","Obsada / na żywo", line("Housekeeping", hkCount) + line("Recepcja", recCount) + (shiftSet.size ? line("Zmiany dziś", covTxt) : "")),
  ].join("");

  const remHtml = rems.length
    ? `<div class="soon">Ogłoszenia i przypomnienia</div>` + rems.slice(0,5).map(r => `<div class="statrow" style="cursor:pointer" onclick="setHkTab('tablica')"><span class="k" style="display:flex;align-items:center;gap:9px"><span style="font-size:18px">📌</span>${esc(r.title||"")}</span></div>`).join("")
    : "";

  body(`<div class="note fullspan" style="margin-top:0;margin-bottom:12px">Pulpit dnia — ${d.dow}, ${d.txt}. Kliknij kafelek, aby przejść do sekcji.</div>`
    + banner
    + kpis
    + `<div class="fullspan" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:4px">${tiles}</div>`
    + remHtml);
}

// ── Jakość: pulpit losowych kontroli pokoi (hk_quality_checks). Telefon HK wymusza
//    zaznaczenie WSZYSTKICH punktów przed zatwierdzeniem, więc „done" = pełne zaliczenie.
//    Stąd metryki to pokrycie i wykonanie (nie % zaliczeń, który byłby zawsze 100%). ──
let qualityDays = 7;
window.toggleQualityDays = () => { qualityDays = qualityDays===7 ? 30 : 7; loadQuality(); };
async function loadQuality() {
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate() - (qualityDays-1));
  const fromKey = isoDate(from), toKey = isoDate(today);
  body('<div class="spin">Wczytywanie…</div>');
  let rows = [], settings = null;
  try {
    const [qc, st] = await Promise.all([
      sb.from("hk_quality_checks").select("date,room,cleaned_by,target_worker,items,status,created_at,acked_at")
        .eq("tenant_id",TENANT_ID).gte("date",fromKey).lte("date",toKey).order("created_at",{ascending:false}).limit(500),
      sb.from("hk_qc_settings").select("enabled,daily_limit,mode,chosen_person").eq("tenant_id",TENANT_ID).maybeSingle(),
    ]);
    rows = (qc && qc.data) || []; settings = (st && st.data) || null;
  } catch { return body('<div class="empty">Nie udało się pobrać kontroli jakości.</div>'); }

  const toggle = `<button class="rost-addbtn fullspan" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px" onclick="toggleQualityDays()">${qualityDays===7?"Pokaż 30 dni":"Pokaż 7 dni"}</button>`;

  if (!rows.length) {
    const off = settings && settings.enabled===false;
    return body(toggle + `<div class="empty">Brak kontroli w okresie (${qualityDays} dni).${off?" Kontrole są wyłączone — włącz w ustawieniach (Na żywo › Przypomnienia).":""}</div>`);
  }

  const done = rows.filter(r => r.status==="done");
  const pending = rows.filter(r => r.status!=="done");
  // Per sprzątaczka (cleaned_by) — czyje pokoje kontrolowano i ile zatwierdzono.
  const byCleaner = {}; rows.forEach(r => { const k=r.cleaned_by||"—"; (byCleaner[k]=byCleaner[k]||{total:0,done:0}); byCleaner[k].total++; if(r.status==="done") byCleaner[k].done++; });
  // Per kontroler (target_worker) — kto realnie wykonuje przydzielone kontrole.
  const byChecker = {}; rows.forEach(r => { const k=r.target_worker||"—"; (byChecker[k]=byChecker[k]||{total:0,done:0}); byChecker[k].total++; if(r.status==="done") byChecker[k].done++; });

  const kpis = `<div class="kpis">
    <div class="kpi"><div class="l">Kontrole</div><div class="v">${rows.length}</div></div>
    <div class="kpi"><div class="l">Wykonane</div><div class="v ok">${done.length}</div></div>
    <div class="kpi"><div class="l">Oczekujące</div><div class="v${pending.length?' bad':''}">${pending.length}</div></div>
    <div class="kpi"><div class="l">Sprawdzeni</div><div class="v">${Object.keys(byCleaner).filter(k=>k!=="—").length}</div></div>
  </div>`;

  const rowsHtml = (obj) => Object.entries(obj).sort((a,b)=>b[1].total-a[1].total).map(([n,s]) =>
    `<div class="statrow"><span class="k">${esc(n)}</span><span class="v">${s.done}/${s.total}<span style="font-size:11px;color:var(--muted);font-weight:600"> wyk.</span></span></div>`).join("");

  const cleanerHtml = `<div class="soon">Sprawdzane sprzątaczki (czyje pokoje kontrolowano)</div>` + rowsHtml(byCleaner);
  const checkerHtml = `<div class="soon">Aktywność kontrolerów (kto klika kontrole)</div>` + rowsHtml(byChecker);

  const pendHtml = pending.length ? `<div class="soon">Oczekujące kontrole (${pending.length})</div>` +
    pending.slice(0,20).map(r => { const d=fmtDate(r.date);
      return `<div class="statrow"><span class="k">Pokój ${esc(r.room)} <span style="font-size:11px;color:var(--muted);font-weight:600">· ${esc(r.cleaned_by||"—")} → ${esc(r.target_worker||"—")}</span></span><span class="chip" style="color:var(--gold);border-color:rgba(176,134,58,.4)">${d.txt}</span></div>`; }).join("") : "";

  const recentHtml = `<div class="soon">Ostatnie kontrole</div>` +
    rows.slice(0,25).map(r => { const d=fmtDate(r.date); const t=r.acked_at?new Date(r.acked_at).toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}):"";
      const ok = r.status==="done";
      const chip = ok
        ? `<span class="chip" style="color:var(--ok);border-color:rgba(15,122,74,.35);background:rgba(15,122,74,.07)">✓ ${esc(d.txt)}${t?` · ${t}`:""}</span>`
        : `<span class="chip" style="color:var(--gold);border-color:rgba(176,134,58,.4)">oczekuje · ${esc(d.txt)}</span>`;
      return `<div class="statrow"><span class="k">Pokój ${esc(r.room)} <span style="font-size:11px;color:var(--muted);font-weight:600">· ${esc(r.cleaned_by||"—")}</span></span>${chip}</div>`; }).join("");

  body(toggle + `<div class="note fullspan" style="margin-top:0;margin-bottom:10px">Losowe kontrole pokoi — ostatnie ${qualityDays} dni. Kontroler potwierdza na telefonie każdy punkt checklisty (zatwierdza dopiero po zaznaczeniu wszystkich).</div>` + kpis + cleanerHtml + checkerHtml + pendHtml + recentHtml);
}

// ── Grafik: wysyłka linków per osoba (token) + podgląd zebranych odpowiedzi ──
const GRAFIK_BASE = "https://grzankatoster-sketch.github.io/hk-phone/grafik.html?t=";
const CHOICE_ABBR = { dzien:["R","#5a1d4a"], popoludnie:["P","#a07820"], off:["—","#8a6a7e"],
                      poranna:["R","#1D4ED8"], oba:["RP","#1f7a52"], popoludniowa:["Po","#C2410C"], nocna:["N","#0F172A"],
                      dzienna:["D","#15803D"], godziny:["G","#1f7a52"] };
// Skrót do komórki grafiku — obsługuje też kilka zmian na jeden dzień (np. "poranna,nocna" → "R+N").
function choiceAbbr(c){
  if(!c) return null;
  const m = String(c).split(",").map(s=>CHOICE_ABBR[s.trim()]).filter(Boolean);
  if(!m.length) return null;
  return m.length===1 ? m[0] : [m.map(x=>x[0]).join("+"), m[m.length-1][1]];
}
let hkWorkersCache = null;
const nextMonday = () => { const d=new Date(); d.setHours(0,0,0,0); const a=(8-d.getDay())%7||7; d.setDate(d.getDate()+a); return isoDate(d); };
const firstNextMonth = () => { const d=new Date(); return isoDate(new Date(d.getFullYear(), d.getMonth()+1, 1)); };

// Status okna czasu linku: „aktywny jeszcze …" / „zamknięte" / „bez limitu".
function grafikExpiry(expires_at){
  if (!expires_at) return { txt:"bez limitu", closed:false, warn:false };
  const ms = new Date(expires_at).getTime() - Date.now();
  if (isNaN(ms)) return { txt:"", closed:false, warn:false };
  if (ms <= 0) return { txt:"zamknięte", closed:true, warn:false };
  const h = Math.floor(ms/3600000), m = Math.floor(ms%3600000/60000), d = Math.floor(h/24);
  const txt = d >= 1 ? `aktywny jeszcze ${d}d ${h%24}h`
            : h >= 1 ? `aktywny jeszcze ${h}h ${m}m`
            : `aktywny jeszcze ${m}m`;
  return { txt, closed:false, warn: ms < 3600000 };
}

async function loadGrafik() {
  body('<div class="spin">Wczytywanie…</div>');
  // Dział wg roli: HK menedżer → pracownicy HK; recepcja/koordynator → pracownicy recepcji; admin → oba.
  const dept = CURRENT.role === "mgr_hk" ? "hk" : (CURRENT.role === "admin" ? "both" : "recepcja");
  let workers = [], reqs = [];
  try {
    const [w, rec, roster, r] = await Promise.all([
      (dept !== "recepcja") ? (hkWorkersCache ? Promise.resolve({ data: hkWorkersCache }) : sb.from("hk_workers").select("name,active")) : Promise.resolve({ data: [] }),
      (dept !== "hk") ? sb.from("shift_reports").select("employee").eq("tenant_id", TENANT_ID).order("saved_at", { ascending:false }).limit(200) : Promise.resolve({ data: [] }),
      (dept !== "hk") ? getMirror("employees") : Promise.resolve(null),  // kanoniczny rejestr recepcji z aplikacji
      sb.rpc("list_availability_requests"),
    ]);
    if (dept !== "recepcja") hkWorkersCache = w.data || [];
    const hk = (w.data || []).filter(x => x.active !== false).map(x => x.name).filter(Boolean);
    // recepcja: najpierw pełna lista z rejestru, potem uzupełnienie o osoby z zamkniętych zmian
    const recep = [...new Set([...(Array.isArray(roster) ? roster : []), ...(rec.data || []).map(x => x.employee)].filter(Boolean))];
    workers = [...new Set([...(dept === "recepcja" ? [] : hk), ...(dept === "hk" ? [] : recep)])].sort((a,b)=>a.localeCompare(b,"pl"));
    // Korelacja działu: cały dział widzi wspólną pulę grafików (koordynator i
    // menedżer recepcji widzą się nawzajem). Admin — wszystkie; menedżer HK — HK;
    // role recepcyjne — recepcja. Stare prośby bez tokenów (kind=null) tylko admin.
    reqs = (r.data || []).filter(x => {
      if (CURRENT.role === "admin") return true;
      return dept === "hk" ? x.kind === "hk" : x.kind === "recepcja";
    });
    reqs.forEach(x => { REQ_META[x.id] = { period_type: x.period_type, period_start: String(x.period_start) }; });
  } catch {}
  const defKind = dept === "hk" ? "hk" : "recepcja";
  const wchecks = workers.length
    ? workers.map(n => `<label class="chip" style="cursor:pointer;display:inline-flex;gap:6px;align-items:center">
        <input type="checkbox" class="gw" value="${esc(n)}" checked/> ${esc(n)}</label>`).join("")
    : '<div class="note" style="margin:0">Brak gotowej listy — wpisz imiona ręcznie poniżej.</div>';
  const reqList = reqs.length ? reqs.map(r => {
    const d = fmtDate(String(r.period_start));
    const lbl = r.period_type === "week" ? "tydzień" : "miesiąc";
    const ex = grafikExpiry(r.expires_at);
    const exHtml = ex.txt ? ` · <span style="color:${ex.closed||ex.warn?'var(--bad)':'var(--ok)'};font-weight:800">${ex.closed?'🔒 '+ex.txt:'🟢 '+ex.txt}</span>` : "";
    // Usuwać może tylko właściciel grafiku (lub admin) — wg RPC; cudze są tylko do wglądu.
    const canDel = CURRENT.role === "admin" || r.created_by === CURRENT.name;
    const delBtn = canDel ? `<button class="rost-addbtn" style="padding:7px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--bad);font-weight:800;font-size:11.5px;cursor:pointer" onclick="delGrafik('${r.id}', this)">Usuń</button>` : "";
    return `<div class="statrow" style="cursor:pointer;gap:8px">
      <div class="k" onclick="openGrid('${r.id}')" style="flex:1"><div>${lbl} od ${d.txt}</div>
        <div style="font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px">${r.answered}/${r.persons} odpowiedziało${r.created_by?" · "+esc(r.created_by):""}${exHtml}</div></div>
      ${delBtn}
      <span class="v" style="font-size:13px" onclick="openGrid('${r.id}')">›</span>
    </div>`;
  }).join("") : '<div class="empty">Brak wysłanych grafików.</div>';
  body(`
    <div class="card" style="margin-bottom:12px">
      <div class="soon" style="margin-top:0">Wyślij grafik (zbiórka dyspozycyjności)</div>
      <div class="field"><label>Okres</label>
        <select id="gPeriod" class="inp" onchange="gPeriodChanged()">
          <option value="week">Tydzień</option><option value="month">Miesiąc</option></select></div>
      <div class="field"><label>Początek okresu</label>
        <input id="gStart" class="inp" type="date" value="${nextMonday()}"/></div>
      <div class="field"><label>Link aktywny przez (potem grafik się zamyka)</label>
        <select id="gTtl" class="inp">
          <option value="24">24 godziny</option>
          <option value="48">48 godzin</option>
          <option value="168">7 dni</option></select></div>
      ${dept==="both" ? `<div class="field"><label>Rodzaj zmian</label>
        <select id="gKind" class="inp">
          <option value="hk">HK (rano / popołudnie)</option>
          <option value="recepcja">Recepcja (zmiany)</option></select></div>`
       : `<input id="gKind" type="hidden" value="${defKind}"/>
          <div class="field" style="margin-bottom:0"><label>Dział</label>
            <div class="chip" style="display:inline-block">${defKind==="hk"?"Housekeeping (rano / popołudnie)":"Recepcja (zmiany)"}</div></div>`}
      <div class="field"><label>Pracownicy ${defKind==="hk"?"HK":"recepcji"}</label><div class="chips">${wchecks}</div></div>
      <div class="field"><label>Dodaj ręcznie (imiona po przecinku)</label>
        <input id="gManual" class="inp" placeholder="np. Artur, Gabrysia"/></div>
      <button id="gBtn" class="btn" onclick="genGrafik()">Generuj linki</button>
      <div id="gMsg" class="msg"></div>
      <div id="gLinks"></div>
    </div>
    <div class="soon">Wysłane grafiki — kliknij, by zobaczyć odpowiedzi</div>
    ${reqList}`);
}
window.gPeriodChanged = () => {
  const p = (document.getElementById("gPeriod")||{}).value;
  const s = document.getElementById("gStart");
  if (s) s.value = p === "month" ? firstNextMonth() : nextMonday();
};
window.genGrafik = async () => {
  const period = (document.getElementById("gPeriod")||{}).value || "week";
  const start  = (document.getElementById("gStart")||{}).value || nextMonday();
  const kind   = (document.getElementById("gKind")||{}).value || "hk";
  const ttl    = parseInt((document.getElementById("gTtl")||{}).value, 10) || 24;
  const checked = Array.from(document.querySelectorAll(".gw:checked")).map(c => c.value);
  const manual  = ((document.getElementById("gManual")||{}).value || "").split(",").map(s=>s.trim()).filter(Boolean);
  const persons = [...new Set([...checked, ...manual])];
  const msg = document.getElementById("gMsg"); const btn = document.getElementById("gBtn");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!persons.length) return setM("Zaznacz lub wpisz przynajmniej jedną osobę.", "err");
  if (btn){ btn.disabled=true; btn.textContent="Generuję…"; }
  try {
    const { data, error } = await sb.rpc("create_availability_request",
      { p_period_type: period, p_period_start: start, p_persons: persons, p_kind: kind, p_ttl_hours: ttl });
    if (error) throw error;
    const links = (data||[]).map(row => `
      <div class="statrow" style="gap:8px">
        <div class="k"><div>${esc(row.person)}</div>
          <div style="font-size:14px;font-weight:900;color:var(--plum);letter-spacing:.12em;margin-top:2px">kod: ${esc(row.token)}</div></div>
        <button class="rost-addbtn" style="padding:7px 11px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:12px;cursor:pointer"
          onclick="copyLink('${row.token}', this)">Kopiuj link</button>
      </div>`).join("");
    const el = document.getElementById("gLinks");
    if (el) el.innerHTML = `<div class="soon">Linki gotowe — wyślij każdej osobie jej własny:</div>${links}`;
    setM(`Wygenerowano ${data.length} link(ów).`, "info");
    if (btn){ btn.disabled=false; btn.textContent="Generuj linki"; }
  } catch (e) {
    setM((e&&e.message)||"Nie udało się wygenerować.", "err");
    if (btn){ btn.disabled=false; btn.textContent="Generuj linki"; }
  }
};
window.copyLink = (token, el) => {
  const url = GRAFIK_BASE + token;
  navigator.clipboard?.writeText(url).then(()=>{ if(el){ const o=el.textContent; el.textContent="Skopiowano ✓"; setTimeout(()=>el.textContent=o,1500); } }, ()=>{});
};
window.regenLink = async (token, reqId) => {
  if (!confirm("Odświeżyć link? Stary przestanie działać, dostaniesz nowy kod.")) return;
  try { const { error } = await sb.rpc("regenerate_token", { p_token: token }); if (error) throw error; openGrid(reqId); }
  catch (e) { alert((e&&e.message)||"Nie udało się odświeżyć."); }
};
window.delGrafik = async (reqId, btn) => {
  if (!confirm("Usunąć ten grafik wraz z odpowiedziami pracowników? Tej operacji nie można cofnąć.")) return;
  if (btn){ btn.disabled=true; btn.textContent="Usuwanie…"; }
  try {
    const { error } = await sb.rpc("delete_availability_request", { p_request_id: reqId });
    if (error) throw error;
    loadGrafik();
  } catch (e) { if(btn){ btn.disabled=false; btn.textContent="Usuń"; } alert((e&&e.message)||"Nie udało się usunąć grafiku."); }
};
let GRID_ROWS = [], GRID_REQ = null, gridView = "grid";
let REQ_META = {};            // { reqId: { period_type, period_start } } — do wyliczenia dni grafiku
window.openGrid = async (reqId) => {
  body('<div class="spin">Wczytywanie odpowiedzi…</div>');
  try { const { data } = await sb.rpc("get_request_grid", { p_request_id: reqId }); GRID_ROWS = data || []; GRID_REQ = reqId; }
  catch { return body('<div class="empty">Nie udało się pobrać odpowiedzi.</div>'); }
  gridView = "grid"; renderGrid();
};
window.setGridView = (v) => { gridView = v; renderGrid(); };
function renderGrid() {
  const rows = GRID_ROWS, reqId = GRID_REQ;
  const persons = [...new Set(rows.map(r => r.person))].sort((a,b)=>a.localeCompare(b,"pl"));
  const dates = [...new Set(rows.filter(r=>r.date).map(r => r.date))].sort();
  const byPD = {}; rows.forEach(r => { if(r.date) byPD[r.person+"|"+r.date] = r.choice; });
  const tokenOf = {}; rows.forEach(r => { if(r.token && !tokenOf[r.person]) tokenOf[r.person] = r.token; });
  // Preferowana liczba godzin na okres (jedna wartość per osoba — z availability_tokens.pref_hours).
  const prefOf = {}; rows.forEach(r => { if(r.pref_hours!=null && prefOf[r.person]==null) prefOf[r.person] = r.pref_hours; });
  const prefBadge = p => prefOf[p]!=null ? `<span style="display:inline-block;font-size:11px;font-weight:800;color:var(--plum);background:rgba(90,29,74,.08);border:1px solid var(--line-strong);border-radius:7px;padding:2px 7px;white-space:nowrap">chce ${prefOf[p]} godz.</span>` : "";
  const av = (p,d) => { const c = byPD[p+"|"+d]; return c && c !== "off" ? c : null; };
  // Realne godziny (od–do) dla wpisów „godziny" — recepcja wpisuje je z telefonu.
  const hoursOf = {}; rows.forEach(r => { if(r.date && ((r.start_h!=null&&r.start_h!=="")||(r.end_h!=null&&r.end_h!=="")) ) hoursOf[r.person+"|"+r.date] = {start:r.start_h, end:r.end_h}; });
  // Etykieta komórki: dla „godziny" pokazuje faktyczne godziny (np. 8–16), inaczej skrót zmiany.
  const cellLabel = (p,d) => {
    const c = byPD[p+"|"+d];
    if (c === "godziny"){ const h = hoursOf[p+"|"+d]; if (h){ const s=(h.start??""), e=(h.end??""); if (s!==""||e!=="") return [`${s}–${e}`, "#1f7a52"]; } }
    return choiceAbbr(c);
  };
  let html = `<button class="link" onclick="setHkTab('grafik')">‹ Wróć do grafików</button>`;
  html += `<div class="soon">Linki indywidualne</div>` + persons.map(pn => {
    const tok = tokenOf[pn] || "";
    return `<div class="statrow" style="gap:8px">
      <div class="k"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">${esc(pn)} ${prefBadge(pn)}</div><div style="font-size:13px;font-weight:900;color:var(--plum);letter-spacing:.1em;margin-top:2px">kod: ${esc(tok)}</div></div>
      <button class="rost-addbtn" style="padding:7px 10px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:11.5px;cursor:pointer" onclick="copyLink('${esc(tok)}', this)">Kopiuj</button>
      <button class="rost-addbtn" style="padding:7px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:11.5px;cursor:pointer" onclick="regenLink('${esc(tok)}','${esc(reqId)}')">Odśwież</button>
    </div>`;
  }).join("");
  if (!dates.length) { html += '<div class="empty">Nikt jeszcze nie odpowiedział.</div>'; return body(html); }
  html += `<button class="btn fullspan" style="width:100%;margin-top:14px;background:#0f7a4a" onclick="openSchedule('${esc(reqId)}')">📋 Ułóż grafik z tych danych →</button>`;
  const vbtn = (v,l)=>`<button class="tab ${gridView===v?"on":""}" style="flex:0 0 auto" onclick="setGridView('${v}')">${l}</button>`;
  html += `<div class="tabs" style="margin:14px 0 8px">${vbtn("grid","Siatka")}${vbtn("summary","Podsumowanie dni")}${vbtn("person","Per osoba")}</div>`;
  const legend = Object.entries(CHOICE_ABBR).filter(([k])=>k!=="godziny").map(([k,a])=>`<span style="color:${a[1]};font-weight:800">${a[0]}</span> ${k}`).join(" · ")
    + ` · <span style="color:#1f7a52;font-weight:800">8–16</span> godziny (od–do)`;
  if (gridView === "grid") {
    const head = `<th style="text-align:left;padding:6px 8px;position:sticky;left:0;background:var(--cream)">Osoba</th>` +
      dates.map(d => { const [,m,dd]=d.split("-"); return `<th style="padding:6px 6px;font-size:11px;color:var(--muted)">${dd}.${m}</th>`; }).join("");
    const bodyRows = persons.map(p => {
      const cells = dates.map(d => { const a = cellLabel(p,d);
        return `<td style="text-align:center;padding:5px 6px">${a?`<span style="display:inline-block;min-width:22px;font-weight:900;font-size:${a[0].length>3?"10.5px":"12px"};color:${a[1]};white-space:nowrap">${esc(a[0])}</span>`:`<span style="color:var(--line-strong)">·</span>`}</td>`; }).join("");
      return `<tr><td style="padding:6px 8px;font-weight:700;font-size:13px;position:sticky;left:0;background:var(--paper);border-right:1px solid var(--line)">${esc(p)}</td>${cells}</tr>`;
    }).join("");
    html += `<div class="note" style="margin-top:0">Legenda: ${legend}</div>
      <div class="fullspan" style="overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--paper);margin-top:8px">
        <table style="border-collapse:collapse;min-width:100%"><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
  } else if (gridView === "summary") {
    html += dates.map(d => {
      const avail = persons.filter(p => av(p,d)); const [,m,dd]=d.split("-");
      return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;width:100%;align-items:center;gap:8px"><span class="k" style="flex:1">${dd}.${m}</span><span class="v">${avail.length}</span></div>
        ${avail.length?`<div class="chips">${avail.map(p=>{const a=cellLabel(p,d);return `<span class="chip">${esc(p)} <b style="color:${a?a[1]:"inherit"}">${a?esc(a[0]):""}</b></span>`;}).join("")}</div>`:`<div style="font-size:12px;color:var(--muted)">nikt nie może</div>`}
      </div>`;
    }).join("");
  } else {
    html += persons.map(p => {
      const days = dates.filter(d => av(p,d));
      return `<div class="wcard" style="cursor:default"><div class="wtop"><span class="av">${esc(initials(p))}</span><span class="nm">${esc(p)}</span>${prefOf[p]!=null?`<span style="font-size:11.5px;font-weight:800;color:var(--plum);margin-left:auto;margin-right:8px">chce ${prefOf[p]} godz.</span>`:""}<span class="prog">${days.length}</span></div>
        <div class="chips">${days.length?days.map(d=>{const [,m,dd]=d.split("-");const a=cellLabel(p,d);return `<span class="chip">${dd}.${m} <b style="color:${a?a[1]:"inherit"}">${a?esc(a[0]):""}</b></span>`;}).join(""):'<span style="font-size:12px;color:var(--muted)">brak dyspozycyjności</span>'}</div></div>`;
    }).join("");
  }
  body(html);
}

// ══ UŁÓŻ GRAFIK: edytowalna tabela (dni × osoby) z zebranej dyspozycyjności ══
let SCHED = null;  // { reqId, persons, days, prefOf, decl, cells, status, dirty }

// Dni całego okresu zbiórki (z REQ_META); fallback: dni z odpowiedzi.
function schedDays(reqId){
  const meta = REQ_META[reqId];
  if (meta && meta.period_start && /^\d{4}-\d{2}-\d{2}$/.test(meta.period_start)){
    const [y,m,d] = meta.period_start.split("-").map(Number); const out=[];
    if (meta.period_type === "week"){ const st=new Date(y,m-1,d); for(let i=0;i<7;i++) out.push(isoDate(new Date(st.getTime()+i*86400000))); }
    else { const last=new Date(y,m,0).getDate(); for(let i=1;i<=last;i++) out.push(isoDate(new Date(y,m-1,i))); }
    return out;
  }
  return [...new Set(GRID_ROWS.filter(r=>r.date).map(r=>r.date))].sort();
}
// „8–16" → 8 (liczba godzin). Zawijanie przez północ (22–6 = 8). Pojedyncza liczba = tyle godzin.
function schedHours(v){
  if (!v) return 0;
  const s = String(v).replace(/[–—]/g,"-");
  const m = s.match(/(\d{1,2})\s*-\s*(\d{1,2})/);
  if (m){ let a=+m[1], b=+m[2], diff=b-a; if(diff<0) diff+=24; return diff; }
  const n = parseFloat(s.replace(",",".")); return isFinite(n) ? n : 0;
}
function schedDayCount(di){ const S=SCHED, d=S.days[di]; let n=0; S.persons.forEach(p=>{ const v=S.cells[p+"|"+d]; if(v&&String(v).trim()) n++; }); return n||""; }
function schedSum(pi){ const S=SCHED, p=S.persons[pi]; let h=0,days=0; S.days.forEach(d=>{ const v=S.cells[p+"|"+d]; if(v&&String(v).trim()){ days++; h+=schedHours(v); } }); return {h:Math.round(h),days}; }
function schedSumHtml(pi){ const S=SCHED, p=S.persons[pi]; const {h,days}=schedSum(pi); const pref=S.prefOf[p];
  let col="var(--ink)", mark="";
  if (pref!=null){ if(h===pref){col="var(--ok)";mark=" ✓";} else if(Math.abs(h-pref)<=4){col="#a07820";} else {col="var(--bad)";mark=" ⚠";} }
  return `<span style="color:${col}">${h}h<span style="font-weight:600;color:var(--muted);font-size:10px"> · ${days}d</span>${mark}</span>`;
}

window.openSchedule = async (reqId) => {
  body('<div class="spin">Wczytywanie…</div>');
  if (GRID_REQ !== reqId || !GRID_ROWS.length){
    try { const { data } = await sb.rpc("get_request_grid", { p_request_id: reqId }); GRID_ROWS = data||[]; GRID_REQ = reqId; }
    catch { return body('<div class="empty">Nie udało się pobrać danych.</div>'); }
  }
  let saved = null;
  try { const { data } = await sb.rpc("get_schedule", { p_request_id: reqId }); saved = data; } catch {}
  const rows = GRID_ROWS;
  const persons = [...new Set(rows.map(r=>r.person))].sort((a,b)=>a.localeCompare(b,"pl"));
  const days = schedDays(reqId);
  const prefOf = {}; rows.forEach(r=>{ if(r.pref_hours!=null && prefOf[r.person]==null) prefOf[r.person]=r.pref_hours; });
  // Deklaracje pracownika per komórka (placeholder/podświetlenie).
  const decl = {};
  rows.forEach(r=>{ if(!r.date) return; const key=r.person+"|"+r.date;
    if (r.choice==="off") decl[key]={off:true,txt:"nie może"};
    else if (r.choice==="godziny"){ const t=`${r.start_h??""}–${r.end_h??""}`; decl[key]={off:false,txt:(t==="–"?"godziny":t)}; }
    else if (r.choice) decl[key]={off:false,txt:r.choice};
  });
  const cells = (saved && saved.cells && typeof saved.cells==="object") ? {...saved.cells} : {};
  // Kolumny = UNIA: respondenci zbiórki + osoby już obecne w zapisanym grafiku (np. menedżer
  // dopisany ręcznie, który sam dobiera sobie wolne dni i nie dostał linku). Dzięki temu
  // ręcznie dodana osoba NIE znika po zapisaniu i ponownym wejściu — jej komórki są w cells.
  const fromCells = Object.keys(cells).map(k=>k.split("|")[0]).filter(Boolean);
  const seenP=new Set(); const allPersons=[];
  [...persons, ...fromCells].forEach(p=>{ const n=zmNorm(p); if(n && !seenP.has(n)){ seenP.add(n); allPersons.push(p); } });
  allPersons.sort((a,b)=>a.localeCompare(b,"pl"));
  SCHED = { reqId, persons:allPersons, days, prefOf, decl, cells, status:(saved&&saved.status)||"draft", dirty:false };
  renderSchedule();
};

function renderSchedule(){
  const S = SCHED; if(!S) return;
  const meta = REQ_META[S.reqId]||{};
  const periodLbl = meta.period_type==="month" ? "miesiąc" : "tydzień";
  const head = `<th class="dcol" style="text-align:left">Dzień</th>` +
    S.persons.map(p=>`<th>${esc(p)}${S.prefOf[p]!=null?`<div style="font-size:9px;color:var(--plum);font-weight:700">chce ${S.prefOf[p]}h</div>`:""}</th>`).join("") +
    `<th>Obsada</th>`;
  const bodyRows = S.days.map((d,di)=>{
    const [y,m,dd]=d.split("-"); const dt=new Date(+y,+m-1,+dd); const dow=DOW[dt.getDay()];

    <div class="fullspan" style="overflow:auto;max-height:64vh;border:1px solid var(--line);border-radius:11px;background:var(--paper)">

    <div class="fullspan" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="rost-addbtn" style="flex:1;min-width:120px;padding:11px;border-radius:10px;border:1px solid var(--plum);background:var(--paper);color:var(--plum);font-weight:800;cursor:pointer" onclick="schedAddPerson()" title="Dodaj osobę do grafiku, np. siebie">+ Osoba</button>
      <button class="rost-addbtn" style="flex:1;min-width:120px;padding:11px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;cursor:pointer" onclick="schedFill()">Wstaw deklaracje</button>
      <button class="rost-addbtn" style="flex:1;min-width:120px;padding:11px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--bad);font-weight:800;cursor:pointer" onclick="schedClear()">Wyczyść</button>

    </div>

}

// Zapis = ZAWSZE także wysyłka do Zmian/recepcji (most). Jeden przycisk: zapisuje ułożony grafik
// w `schedules` (published) i od razu wypycha do panel_mirror przez schedule_merge.
window.schedSave = async (btn)=>{
  const S=SCHED; if(!S) return;
  if(btn){ btn.disabled=true; btn.textContent="Zapisywanie…"; }
  const msg=document.getElementById("schedMsg");
  try {
    // 1) zapisz/opublikuj ułożony grafik (źródło prawdy do druku/odczytu)
    const { error } = await sb.rpc("save_schedule", { p_request_id:S.reqId, p_cells:S.cells, p_status:"published" });
    if(error) throw error;
    S.dirty=false; S.status="published";
    // 2) most → Zmiany + recepcja: mapowanie imion na rejestr recepcji i wypchnięcie przez schedule_merge
    let reg=[]; try{ reg = await getMirror("employees"); }catch{}
    const regMap={}; (Array.isArray(reg)?reg:[]).forEach(e=>{ if(typeof e==="string"&&e.trim()) regMap[zmNorm(e)]=e.trim(); });
    const { patch, mapped, skipped } = schedToZmPatch(S, regMap);
    let pushed=false;
    if(Object.keys(patch).length){
      const { error:e2 } = await sb.rpc("schedule_merge",{ p_cells:patch, p_device:hkStateDeviceId(), p_tenant:TENANT_ID });
      if(e2) throw e2;
      pushed=true;
      try{ await sb.rpc("log_action",{ p_action:"grafik_opublikowany", p_detail:`Zapis+wysyłka do Zmian/recepcji — ${mapped} zmian${skipped.length?`, pominięto ${skipped.length}`:""}` }); }catch{}
    }
    if(msg){ msg.className="msg ok";
      msg.innerHTML = pushed
        ? `✓ Zapisano i wysłano do Zmian i recepcji — <b>${mapped}</b> ${mapped===1?"zmiana":"zmian"}.`
          + (skipped.length?`<br><span style="color:var(--bad)">Pominięto ${skipped.length} pól bez czytelnych godzin: ${skipped.slice(0,6).map(esc).join("; ")}${skipped.length>6?"…":""}</span>`:"")
        : `✓ Zapisano grafik (brak wypełnionych komórek do wysłania).`; }
    const nb=document.getElementById("schedNote"); if(nb) nb.innerHTML=`<span style="color:var(--ok)">✓ Zapisany — w Zmianach i na recepcji</span>`;
  } catch(e){ if(msg){ msg.className="msg err"; msg.textContent=(e&&e.message)||"Nie udało się zapisać."; } }
  if(btn){ btn.disabled=false; btn.textContent="Zapisz grafik"; }
};

// ── MOST: ułożony grafik (tabela schedules) → Zmiany + recepcja (panel_mirror/schedule_merge) ──
// Sekcja „Grafik" trzyma komórki jako { "Osoba|YYYY-MM-DD": "8–16" }. Zakładka „Zmiany" i
// recepcja czytają inny dokument: { "YYYY-MM-DD": { "Imię": {start,end,shift}|null } }. Te dwa
// systemy NIE były połączone — ten most konwertuje i wypycha grafik przez schedule_merge.
const SCHED_WORD2SHIFT = { rano:"poranna", poranek:"poranna", poranna:"poranna", przedpoludnie:"poranna",
  popoludnie:"popoludniowa", popoludniowa:"popoludniowa", wieczor:"wieczorowa", wieczorowa:"wieczorowa",
  noc:"nocna", nocka:"nocna", nocna:"nocna", dzien:"dzienna", dzienna:"dzienna", dyzur:"dzienna" };
// Jeśli okno godzin dokładnie pasuje do znanej zmiany → ustaw kod zmiany (ładniejsze badge'y na recepcji).
function schedInferShift(start,end){
  const w = shiftWindow({start,end}); if(!w) return null;
  for(const k of ["poranna","popoludniowa","wieczorowa","dzienna","nocna"]){
    const ww=SHIFT_WIN[k]; if(ww && ww[0]===w[0] && ww[1]===w[1]) return k;
  }
  return null;
}
// „8–16" → {start:"8",end:"16",shift}; pojedyncza liczba → {start,end:""}; słowo (np. „nocka") → {shift}.
// Zwraca null, gdy nic się nie da odczytać (komórka pominięta przy wysyłce).
function schedParseCell(v){
  const norm = String(v==null?"":v).replace(/[–—]/g,"-").trim();
  if(!norm) return null;
  const rng = norm.match(/^(\d{1,2}(?::\d{2})?)\s*-\s*(\d{1,2}(?::\d{2})?)$/);
  if(rng) return { start:rng[1], end:rng[2], shift:schedInferShift(rng[1],rng[2]) };
  if(/^\d{1,2}(?::\d{2})?$/.test(norm)) return { start:norm, end:"", shift:null };
  const sh = SCHED_WORD2SHIFT[zmNorm(norm)]; if(sh) return { start:"", end:"", shift:sh };
  return null;
}
// Patch dla schedule_merge z całej siatki grafiku (osoby × dni). Puste pole = null (czyści tę
// zmianę), więc opublikowany grafik jest autorytatywny dla SWOICH osób i dni — bez ruszania
// reszty. Imiona mapujemy na pisownię z rejestru recepcji (regMap), by nie tworzyć duplikatów.
function schedToZmPatch(S, regMap){
  regMap = regMap||{};
  const patch = {}; let mapped=0; const skipped=[];
  S.days.forEach(date=>{
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
    S.persons.forEach(person=>{
      const name = regMap[zmNorm(person)] || person;
      const v = String(S.cells[person+"|"+date]||"").trim();
      if(!patch[date]) patch[date]={};
      if(!v){ patch[date][name]=null; return; }
      const cell = schedParseCell(v);
      if(!cell){ skipped.push(`${person} ${date.slice(5)}: „${v}"`); patch[date][name]=null; return; }
      patch[date][name]=cell; mapped++;
    });
  });
  return { patch, mapped, skipped };
}

// ── Usterki SLA: czas reakcji/zamknięcia, zaległości, przekroczone terminy (faults).
//    Czasy z reported_at → started_at (reakcja) → completed_at (zamknięcie); due_at = termin (SLA). ──
let slaDays = 7;
window.toggleSlaDays = () => { slaDays = slaDays===7 ? 30 : 7; loadSLA(); };
const fmtH = h => h==null||isNaN(h) ? "—" : (h<1 ? Math.round(h*60)+" min" : (h<24 ? h.toFixed(1)+" h" : (h/24).toFixed(1)+" dni"));
const SRC_LBL = { reception:"Recepcja", hk:"Housekeeping" };
async function loadSLA() {
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate() - (slaDays-1));
  const fromKey = isoDate(from);
  const fromIso = new Date(fromKey+"T00:00:00").toISOString();
  const now = Date.now();
  body('<div class="spin">Wczytywanie…</div>');
  let open = [], reported = [], closed = [];
  try {
    const [bo, rp, cl] = await Promise.all([
      sb.from("faults").select("id,description,assigned_to,status,priority,room,space_id,source,reported_at,due_at,started_at")
        .eq("tenant_id",TENANT_ID).in("status",["open","in_progress"]).order("reported_at",{ascending:true}).limit(300),
      sb.from("faults").select("status,source,reported_at").eq("tenant_id",TENANT_ID).gte("reported_at",fromIso).limit(800),
      sb.from("faults").select("priority,source,assigned_to,reported_at,started_at,completed_at,due_at").eq("tenant_id",TENANT_ID).eq("status","done").gte("completed_at",fromIso).limit(800),
    ]);
    open = (bo&&bo.data)||[]; reported = (rp&&rp.data)||[]; closed = (cl&&cl.data)||[];
  } catch { return body('<div class="empty">Nie udało się pobrać danych usterek.</div>'); }

  const toggle = `<button class="rost-addbtn fullspan" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px" onclick="toggleSlaDays()">${slaDays===7?"Pokaż 30 dni":"Pokaż 7 dni"}</button>`;

  const hrsBetween = (a,b) => (a&&b) ? (new Date(b).getTime()-new Date(a).getTime())/3600000 : null;
  const ageH = r => (now - new Date(r.reported_at).getTime())/3600000;
  // Czasy zamknięcia / reakcji w okresie.
  const resol = closed.map(r=>hrsBetween(r.reported_at,r.completed_at)).filter(v=>v!=null&&v>=0);
  const react = closed.map(r=>hrsBetween(r.reported_at,r.started_at)).filter(v=>v!=null&&v>=0);
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
  const median = a => { if(!a.length) return null; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; };
  const closedLate = closed.filter(r=>r.due_at&&r.completed_at&&new Date(r.completed_at)>new Date(r.due_at)).length;
  // Zaległości: po terminie (due_at minęło) i długo otwarte (>24h).
  const overdue = open.filter(r=>r.due_at&&new Date(r.due_at).getTime()<now);
  const old24 = open.filter(r=>ageH(r)>24);
  const oldest = open[0]; // posortowane rosnąco po reported_at

  const kpis = `<div class="kpis">
    <div class="kpi"><div class="l">Otwarte</div><div class="v${open.length?'':' ok'}">${open.length}</div></div>
    <div class="kpi"><div class="l">Po terminie</div><div class="v${overdue.length?' bad':' ok'}">${overdue.length}</div></div>
    <div class="kpi"><div class="l">Śr. zamknięcie</div><div class="v gold">${fmtH(avg(resol))}</div></div>
    <div class="kpi"><div class="l">Zamknięte</div><div class="v ok">${closed.length}</div></div>
  </div>`;

  const line = (l,v,c) => `<div class="statrow"><span class="k">${l}</span><span class="v"${c?` style="color:${c}"`:""}>${v}</span></div>`;
  const timesHtml = `<div class="soon">Czasy i przepływ (ostatnie ${slaDays} dni)</div>`
    + line("Śr. czas reakcji (zgłoszenie → start)", fmtH(avg(react)))
    + line("Śr. czas zamknięcia (zgłoszenie → koniec)", fmtH(avg(resol)))
    + line("Mediana czasu zamknięcia", fmtH(median(resol)))
    + line("Zgłoszone w okresie", reported.length)
    + line("Zamknięte w okresie", closed.length)
    + line("Zamknięte po terminie", closedLate, closedLate?"var(--bad)":"var(--ok)");

  // Wg źródła (zgłoszone w okresie).
  const bySrc = {}; reported.forEach(r=>{ const k=r.source||"reception"; bySrc[k]=(bySrc[k]||0)+1; });
  const srcHtml = Object.keys(bySrc).length ? `<div class="soon">Zgłoszenia wg źródła</div>`
    + Object.entries(bySrc).sort((a,b)=>b[1]-a[1]).map(([k,n])=>line(esc(SRC_LBL[k]||k), n)).join("") : "";

  // Zaległości — najpierw po terminie, potem najstarsze. Wiek + przypisanie.
  const backlog = [...open].sort((a,b)=>{
    const ao=a.due_at&&new Date(a.due_at).getTime()<now, bo=b.due_at&&new Date(b.due_at).getTime()<now;
    if (ao!==bo) return ao?-1:1;          // po terminie na górze
    return new Date(a.reported_at)-new Date(b.reported_at); // potem najstarsze
  }).slice(0,20);
  const backHtml = backlog.length ? `<div class="soon">Zaległości (otwarte: ${open.length}, w tym >24h: ${old24.length})</div>`
    + backlog.map(r=>{
      const p = PRIO[r.priority]||PRIO.normal;
      const od = r.due_at && new Date(r.due_at).getTime()<now;
      const age = ageH(r);
      const where = r.room ? `pok. ${esc(r.room)}` : esc(r.space_id||r.source||"");
      return `<div class="statrow" style="flex-direction:column;align-items:stretch;gap:3px">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="chip" style="color:${p.c};border-color:${p.c}55">${p.l}</span>
          <span class="k" style="flex:1">${esc(r.description||"—")}</span>
          <span class="chip" style="color:${od?'var(--bad)':'var(--muted)'};border-color:${od?'rgba(194,65,90,.4)':'var(--line)'}">${od?'po terminie':fmtH(age)}</span></div>
        <div style="font-size:11px;color:var(--muted);font-weight:600">${where}${r.assigned_to?` · ${esc(r.assigned_to)}`:" · nieprzypisana"}${r.status==="in_progress"?" · w toku":""}</div>
      </div>`; }).join("") : `<div class="empty">Brak otwartych usterek 🎉</div>`;

  body(toggle + `<div class="note fullspan" style="margin-top:0;margin-bottom:10px">SLA usterek — czasy z okresu ${slaDays} dni, zaległości liczone na teraz. „Po terminie" = minął termin (due_at).</div>`
    + kpis + timesHtml + srcHtml + backHtml);
}

// ── Konserwatorzy: obciążenie (usterki) + dodawanie zadań (insert faults → push przez webhook) ──

// ── Plan: lista aktywnych planów konserwacji → zadania (z datą lub bez) ──
// Model: maintenance_plans (nazwa + przypisani konserwatorzy) → panel_plan (zadania, plan_id).
// Konserwator na każde zadanie może odpowiedzieć i dołączyć zdjęcie zmian.
let PLAN_OPEN_ID = null;   // null = lista planów; id = otwarty plan
let PLAN_SHOW_DONE = false; // czy pokazywać zakończone plany na liście
async function loadPlan() {
  let plans = [], tasks = [];
  try {
    const [{ data:pl }, { data:tk }] = await Promise.all([
      sb.from("maintenance_plans").select("*").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }),
      sb.from("panel_plan").select("id,plan_id,plan,date,task,response,status,photos").eq("tenant_id", TENANT_ID).not("plan_id","is",null),
    ]);
    plans = pl || []; tasks = tk || [];
  } catch { return body('<div class="empty">Nie udało się pobrać planów.</div>'); }

  // Widok szczegółów wybranego planu
  if (PLAN_OPEN_ID) {
    const p = plans.find(x => x.id === PLAN_OPEN_ID);
    if (!p) { PLAN_OPEN_ID = null; return loadPlan(); }
    return renderPlanDetail(p, tasks.filter(t => t.plan_id === p.id));
  }

  // Lista aktywnych planów + tworzenie nowego
  const create = `<div class="card" style="margin-bottom:12px">
    <div class="soon" style="margin-top:0">Nowy plan</div>
    <div class="field"><label>Nazwa planu</label><input id="npName" class="inp" placeholder="np. Przygotowanie hotelu do sezonu"/></div>
    <button id="npBtn" class="btn" onclick="createPlan()">Utwórz plan</button>
    <div id="npMsg" class="msg"></div>
  </div>`;
  const active = plans.filter(p => p.status !== "done");
  const done   = plans.filter(p => p.status === "done");
  const list   = PLAN_SHOW_DONE ? plans : active;
  const counts = id => { const t = tasks.filter(x => x.plan_id === id); return { total:t.length, done:t.filter(x => x.status === "done").length }; };
  const card = p => {
    const c = counts(p.id);
    const who = (p.assigned_to || "").trim();
    const whoChips = who
      ? who.split(/\s*,\s*/).filter(Boolean).map(n => `<span class="chip">${esc(n)}</span>`).join("")
      : `<span class="chip" style="color:var(--muted)">nieprzypisany</span>`;
    const isDone = p.status === "done";
    return `<div class="card" style="margin-bottom:10px;cursor:pointer;${isDone?"opacity:.7":""}" onclick="openPlan('${p.id}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:15px;font-weight:800;flex:1">📋 ${esc(p.name)}</span>
        <span class="chip" style="color:${c.total&&c.done===c.total?"var(--ok)":"var(--muted)"}">${c.done}/${c.total}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">${whoChips}${isDone?`<span class="chip" style="color:var(--ok)">zakończony</span>`:""}</div>
    </div>`;
  };
  const listHtml = list.length ? list.map(card).join("") : '<div class="empty">Brak aktywnych planów — utwórz pierwszy powyżej.</div>';
  const toggle = done.length
    ? `<button class="rost-addbtn" style="margin:2px 0 10px;padding:6px 12px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12px;cursor:pointer" onclick="togglePlanDone()">${PLAN_SHOW_DONE?"Ukryj zakończone":`Pokaż zakończone (${done.length})`}</button>`
    : "";
  body(create + `<div class="soon">Aktywne plany</div>` + toggle + listHtml);
}
window.openPlan      = (id) => { PLAN_OPEN_ID = id; loadPlan(); };
window.backToPlans   = ()   => { PLAN_OPEN_ID = null; loadPlan(); };
window.togglePlanDone= ()   => { PLAN_SHOW_DONE = !PLAN_SHOW_DONE; loadPlan(); };
