// ── Zmiany: grafik EDYTOWALNY z dwukierunkowym sync NA ŻYWO do recepcji ──
// Zapis idzie przez schedule_merge (migracja 0034) — per komórka, nie kasuje
// cudzych wpisów. Realtime: zmiany z recepcji/innych urządzeń wchodzą same.
const DOW_SH = ["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
const SHIFT_CODE2 = { poranna:"P", popoludniowa:"PP", wieczorowa:"W", dzienna:"D", nocna:"N" };
const ZM_SHIFT_OPTS = [["","— zmiana —"],["poranna","P · poranna"],["popoludniowa","PP · popołudniowa"],
                       ["wieczorowa","W · wieczorowa"],["dzienna","D · dzienna"],["nocna","N · nocna"]];
let ZM_MONDAY=null, ZM_SCHED={}, ZM_EMP_REG=[], ZM_EMPS=[], ZM_ORPHANS=[], ZM_EXTRA=[], ZM_DAYS=[], ZM_DAYIDX=null, ZM_REV=0, ZM_UNSUB=null, ZM_RESIZE=null;

const zmMonday = d => { const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; };
const zmHours  = c => c ? `${c.start||""}${c.end?"-"+c.end:""}` : "";
function zmShiftSel(id,sel){ return `<select id="${id}" class="zm-s" onchange="zmEdit(this)">${ZM_SHIFT_OPTS.map(([v,l])=>`<option value="${v}"${v===sel?" selected":""}>${l}</option>`).join("")}</select>`; }

async function zmFetchDoc(){
  try{ const { data } = await sb.from("panel_mirror").select("data,rev,updated_device").eq("tenant_id",TENANT_ID).eq("kind","schedule").maybeSingle(); return data||null; }
  catch{ return null; }
}
function zmSubscribe(cb){
  try{
    const ch = sb.channel("panel-zmiany")
      .on("postgres_changes",{event:"*",schema:"public",table:"panel_mirror",filter:`tenant_id=eq.${TENANT_ID}`},
          p=>{ if(p&&p.new&&p.new.kind==="schedule") cb(p.new); })
      .subscribe();
    return ()=>{ try{ sb.removeChannel(ch); }catch{} };
  }catch{ return ()=>{}; }
}
function zmOnRealtime(row){
  if(!row) return;
  const me = hkStateDeviceId();
  if(row.updated_device===me){ if(typeof row.rev==="number") ZM_REV=Math.max(ZM_REV,row.rev); return; } // własne echo
  if(typeof row.rev==="number" && row.rev<=ZM_REV) return;                                              // starsze/zastosowane
  ZM_REV = row.rev||ZM_REV;
  if(row.data && typeof row.data==="object") ZM_SCHED = row.data;
  const root = document.getElementById("zmRoot"); if(!root) return;                                     // nie jesteśmy w zakładce
  const ae = document.activeElement;
  if(ae && root.contains(ae) && /INPUT|SELECT/.test(ae.tagName||"")) return;                            // nie przerywaj edycji
  zmRender();
}

async function loadZmiany() {
  if(!ZM_MONDAY) ZM_MONDAY = zmMonday(new Date());
  body('<div class="empty">Ładuję grafik…</div>');
  const [doc, emps] = await Promise.all([ zmFetchDoc(), getMirror("employees") ]);
  ZM_SCHED = (doc && doc.data && typeof doc.data==="object") ? doc.data : {};
  ZM_REV   = (doc && typeof doc.rev==="number") ? doc.rev : 0;
  ZM_EMP_REG = Array.isArray(emps) ? emps.filter(e=>typeof e==="string" && e.trim()) : [];
  if(!ZM_UNSUB) ZM_UNSUB = zmSubscribe(zmOnRealtime);
  if(!ZM_RESIZE){ let t; ZM_RESIZE=()=>{ clearTimeout(t); t=setTimeout(()=>{ if(document.getElementById("zmRoot")) zmRender(); },180); }; window.addEventListener("resize",ZM_RESIZE); }
  zmRender();
}

function zmRender(){
  const mon = ZM_MONDAY;
  ZM_DAYS = [...Array(7)].map((_,i)=> isoDate(new Date(mon.getTime()+i*86400000)));
  const reg = [...new Set((ZM_EMP_REG||[]).filter(e=>typeof e==="string" && e.trim()))];
  const schedEmps = new Set();
  Object.values(ZM_SCHED).forEach(day=>{ if(day&&typeof day==="object") Object.keys(day).forEach(e=>{ if(day[e]) schedEmps.add(e); }); });
  // Wiersze = UNIA: rejestr recepcji (źródło prawdy) + osoby z grafiku + ręcznie dodane
  // (np. menedżer, który sam dobiera sobie wolne dni i nie jest w rejestrze). Dzięki temu
  // każdy, kto ma wpis lub został dodany, dostaje wiersz do edycji. Dopasowanie odporne na
  // ogonki/wielkość liter (np. „Paweł"→„Pawel"); duplikaty scalamy po normalizacji, zachowując
  // pierwszy wariant pisowni (rejestr ma pierwszeństwo). Zapis per-komórka (schedule_merge)
  // nigdy nie kasuje istniejącego grafiku — dodanie osoby jest bezpieczne.
  const extra = (ZM_EXTRA||[]).filter(e=>typeof e==="string" && e.trim());
  const seen = new Set(); ZM_EMPS = [];
  [...reg, ...schedEmps, ...extra].forEach(e=>{ const n=zmNorm(e); if(n && !seen.has(n)){ seen.add(n); ZM_EMPS.push(e); } });
  ZM_EMPS.sort((a,b)=>a.localeCompare(b,"pl"));
  const regNorm = new Set(reg.map(zmNorm));
  ZM_ORPHANS = reg.length ? [...schedEmps].filter(e=>!regNorm.has(zmNorm(e))).sort((a,b)=>a.localeCompare(b,"pl")) : [];
  const todayIso = isoDate(new Date());
  const label = `${ZM_DAYS[0].slice(8)}–${ZM_DAYS[6].slice(8)}.${ZM_DAYS[0].slice(5,7)}`;
  const nav = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
    <div class="note" style="margin:0;flex:1 1 220px">Grafik — edytuj tu, recepcja widzi zmiany na żywo.</div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="zm-nav" onclick="zmNav(-1)" aria-label="Poprzedni tydzień">‹</button>
      <span style="font-weight:800;font-size:13px;min-width:96px;text-align:center">${esc(label)}</span>
      <button class="zm-nav" onclick="zmNav(1)" aria-label="Następny tydzień">›</button>
      <button class="zm-nav" onclick="zmNav(0)" style="width:auto;padding:0 12px;font-size:12px">Dziś</button>

    </div></div>`;

  if(!ZM_EMPS.length){ body(`<div id="zmRoot">${top}${nav}<div class="empty">Brak pracowników. Dodaj osobę przyciskiem „+ Osoba", dodaj zmianę przez aplikację recepcji albo poczekaj na rejestr.</div></div>`); return; }
  body(`<div id="zmRoot">${top}${nav}<div class="zm-wrap">${grid}${zmSidebar()}</div>${zmLegend()}</div>`);
}

// Normalizacja imienia: bez ogonków, bez wielkości liter ("Paweł" → "pawel").
function zmNorm(s){ return String(s==null?"":s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase(); }
// Komórka grafiku dla osoby z rejestru — exact, a w razie braku dopasowanie po normalizacji
// (dane zapisane pod wariantem pisowni, np. „Paweł", trafiają do wiersza rejestru „Pawel").
function zmCellOf(dk, emp){
  const day = ZM_SCHED[dk]; if(!day || typeof day!=="object") return null;
  if(day[emp]) return day[emp];
  const n = zmNorm(emp);
  for(const k in day){ if(day[k] && zmNorm(k)===n) return day[k]; }
  return null;
}
// Klucz w danym dniu zapisany pod inną pisownią niż imię z rejestru (do scalenia przy edycji).
function zmVariantKey(dk, emp){
  const day = ZM_SCHED[dk]; if(!day) return null;
  const n = zmNorm(emp);
  for(const k in day){ if(k!==emp && zmNorm(k)===n) return k; }
  return null;
}

// Godziny komórki grafiku — z okna zmiany (obsługuje nockę i brak start/end). Zwraca liczbę godzin.
function zmCellHours(c){ const w = shiftWindow(c||{}); return w ? Math.round((w[1]-w[0])*10)/10 : 0; }

// Podsumowanie tygodnia z boku: ile zmian i ile godzin na osobę (imiona z rejestru recepcji).
function zmSidebar(){
  const rows = ZM_EMPS.map(emp=>{
    let sh=0, hrs=0;
    ZM_DAYS.forEach(dk=>{ const c=zmCellOf(dk,emp); if(c){ sh++; hrs+=zmCellHours(c); } });
    return { emp, sh, hrs };
  });
  const tSh = rows.reduce((a,r)=>a+r.sh,0), tHrs = rows.reduce((a,r)=>a+r.hrs,0);
  const fmt = h => (Math.round(h*10)/10).toString().replace(".",",");
  const list = rows.map(r=>`<div class="zm-side-row">
      <span class="zm-side-nm">${esc(r.emp)}</span>
      <span class="zm-side-st">${r.sh}<small> zm</small> · ${fmt(r.hrs)}<small> h</small></span></div>`).join("");
  const orph = ZM_ORPHANS.length ? `<div class="zm-side-orph">
      <b>Spoza rejestru (${ZM_ORPHANS.length})</b>: ${ZM_ORPHANS.map(esc).join(", ")}
      <i>Byli pracownicy w grafiku — dodaj do rejestru recepcji albo wyczyść ich wpisy.</i></div>` : "";
  return `<aside class="zm-side">
    <div class="zm-side-hd">Podsumowanie · ${esc(`${ZM_DAYS[0].slice(8)}–${ZM_DAYS[6].slice(8)}`)}</div>
    ${list}
    <div class="zm-side-row zm-side-tot"><span class="zm-side-nm">Razem</span><span class="zm-side-st">${tSh}<small> zm</small> · ${fmt(tHrs)}<small> h</small></span></div>
    ${orph}</aside>`;
}

function zmDesktop(todayIso){
  const head = `<th style="text-align:left;padding:7px 9px;position:sticky;left:0;background:var(--cream);z-index:1">Pracownik</th>` +
    ZM_DAYS.map((d,i)=>`<th style="padding:7px 6px;font-size:11px;color:${d===todayIso?"var(--plum)":"var(--muted)"}">${DOW_SH[i]}<br><span style="font-weight:400">${d.slice(8)}</span></th>`).join("");
  const rows = ZM_EMPS.map((emp,ei)=>{
    const cells = ZM_DAYS.map((dk,di)=>{
      const c = zmCellOf(dk, emp);
      const hid=`zm_h_${di}_${ei}`, sid=`zm_s_${di}_${ei}`;
      return `<td style="padding:4px 5px;${dk===todayIso?"background:var(--cream)":""}">
        <input id="${hid}" class="zm-h" value="${esc(zmHours(c))}" placeholder="7-15" inputmode="numeric"
               onkeydown="if(event.key==='Enter')this.blur()" onblur="zmEdit(this)"/>
        ${zmShiftSel(sid, c&&c.shift?c.shift:"")}</td>`;
    }).join("");
    return `<tr><td style="padding:6px 9px;font-weight:700;font-size:13px;position:sticky;left:0;background:var(--paper);border-right:1px solid var(--line);z-index:1">${esc(emp)}</td>${cells}</tr>`;
  }).join("");
  return `<div class="zm-grid zm-scroll">
    <table style="border-collapse:collapse;min-width:100%"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function zmMobile(todayIso){
  let di = ZM_DAYIDX;
  if(di==null){ const t=ZM_DAYS.indexOf(todayIso); di = t>=0?t:0; }
  ZM_DAYIDX = di;
  const dk = ZM_DAYS[di];
  const chips = ZM_DAYS.map((d,i)=>`<button class="zm-day${i===di?" on":""}" onclick="zmSetDay(${i})">${DOW_SH[i]}<br><span style="font-weight:400;font-size:10px">${d.slice(8)}</span></button>`).join("");
  const list = ZM_EMPS.map((emp,ei)=>{
    const c = zmCellOf(dk, emp);
    const hid=`zm_h_${di}_${ei}`, sid=`zm_s_${di}_${ei}`;
    return `<div class="zm-row">
      <div class="zm-name">${esc(emp)}</div>
      <input id="${hid}" class="zm-h" value="${esc(zmHours(c))}" placeholder="7-15" inputmode="numeric"
             onkeydown="if(event.key==='Enter')this.blur()" onblur="zmEdit(this)"/>
      ${zmShiftSel(sid, c&&c.shift?c.shift:"")}</div>`;
  }).join("");
  return `<div class="zm-grid"><div class="zm-days">${chips}</div><div class="zm-list">${list}</div></div>`;
}

function zmLegend(){

window.zmNav = (d)=>{ ZM_MONDAY = d===0 ? zmMonday(new Date()) : new Date(ZM_MONDAY.getTime()+d*7*86400000); ZM_DAYIDX=null; zmRender(); };
window.zmSetDay = (i)=>{ ZM_DAYIDX=i; zmRender(); };
// Dodaje wiersz osoby do grafiku (np. menedżera, który sam wpisuje sobie wolne dni i nie ma go
// w rejestrze recepcji). To tylko dodaje pusty wiersz — nic nie zapisuje i nie kasuje. Dopiero
// wpisanie godzin/zmiany trafia do bazy przez schedule_merge (per-komórka, bez nadpisywania).
window.zmAddPerson = ()=>{
  const name = (prompt("Imię osoby do dodania do grafiku (np. Twoje):")||"").trim();
  if(!name) return;
  const n = zmNorm(name);
  if(ZM_EMPS.some(e=>zmNorm(e)===n)){ alert("Ta osoba jest już w grafiku."); return; }
  if(!ZM_EXTRA) ZM_EXTRA=[];
  ZM_EXTRA.push(name);
  zmRender();
};
window.zmEdit = async (el)=>{
  const m = String(el.id||"").match(/^zm_[hs]_(\d+)_(\d+)$/); if(!m) return;
  const di=+m[1], ei=+m[2], dk=ZM_DAYS[di], emp=ZM_EMPS[ei];
  if(dk==null||emp==null) return;
  const hEl=document.getElementById(`zm_h_${di}_${ei}`), sEl=document.getElementById(`zm_s_${di}_${ei}`);
  if(!hEl||!sEl) return;
  const h=(hEl.value||"").trim(), shift=sEl.value||"";
  const prev = zmCellOf(dk, emp);
  let cell;
  if(!h && !shift){ cell=null; }
  else { const parts=h.split(/\s*[-–—]\s*/); cell={ start:parts[0]||"", end:parts[1]||"", shift:shift||null }; }
  if(JSON.stringify(cell)===JSON.stringify(prev||null)) return; // bez zmiany
  if(!ZM_SCHED[dk]) ZM_SCHED[dk]={};
  // Zapis zawsze pod imieniem z rejestru recepcji; ewentualny wariant pisowni (np. „Paweł"
  // przy rejestrze „Pawel") czyścimy, żeby nie zostawał duplikat w grafiku.
  const variant = zmVariantKey(dk, emp);
  ZM_SCHED[dk][emp]=cell; // optymistycznie lokalnie
  const cells = { [emp]: cell };
  if(variant){ delete ZM_SCHED[dk][variant]; cells[variant]=null; }
  const ok = await zmMerge({ [dk]: cells });
  if(ok){ try{ await sb.rpc("log_action",{ p_action:"grafik_edycja", p_detail:`${emp} ${dk}: ${cell?`${cell.start||""}${cell.end?"-"+cell.end:""}${cell.shift?" "+cell.shift:""}`:"—"}` }); }catch{} }
};
async function zmMerge(cells){
  try{
    const { data, error } = await sb.rpc("schedule_merge",{ p_cells:cells, p_device:hkStateDeviceId(), p_tenant:TENANT_ID });
    if(error) throw error;
    if(data && typeof data.rev==="number") ZM_REV=Math.max(ZM_REV,data.rev);
    return true;
  }catch(e){ console.error("[zmiany] merge:", e&&e.message); return false; }
}

// ── Tablica: stałe przypomnienia (standing_reminders) + pilne (manager_alerts) + Wiki (wiki_entries) ──
async function loadTablica() {
  let rem = [], alr = [], wik = [];
  try {
    const [r1, r2, r3] = await Promise.all([
      sb.from("standing_reminders").select("id,title,body,active,created_by,created_at").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(60),
      sb.from("manager_alerts").select("title,body,priority,created_by,created_at,done").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(30),
      sb.from("wiki_entries").select("id,topic,content,updated_at,created_by").eq("tenant_id", TENANT_ID).order("updated_at", { ascending:false }).limit(10),
    ]);
    rem = (r1.data || []).filter(r => r.active !== false);
    alr = (r2.data || []).filter(a => !a.done);
    wik = r3.data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać tablicy.</div>'); }
  // Jeden formularz z wyborem rodzaju wpisu: Stałe / Pilne / Wiki.
  const form = `<div class="card" style="margin-bottom:12px">

      <select id="tbKind" class="inp" onchange="tbKindChange()">
        <option value="standing">📌 Stałe przypomnienie</option>
        <option value="urgent">🔴 Pilne przypomnienie (alert na recepcji)</option>
        <option value="wiki">📖 Wpis do Wiki recepcji</option>
      </select>
    </div>
    <div class="field" id="tbTopicWrap" style="display:none"><label>Temat</label><input id="tbTopic" class="inp" placeholder="np. Schemat zamków"/></div>
    <div class="field" id="tbTitleWrap"><label id="tbTitleLbl">Treść</label><input id="tbTitle" class="inp" placeholder="np. Zawsze sprawdzaj depozyt przy check-in" onkeydown="if(event.key==='Enter')tbAdd()"/></div>
    <div class="field" id="tbBodyWrap" style="display:none"><label id="tbBodyLbl">Szczegóły (opcjonalnie)</label><textarea id="tbBody" class="inp" rows="4" placeholder="Dodatkowe informacje…"></textarea></div>
    <button id="tbBtn" class="btn" onclick="tbAdd()">Dodaj przypomnienie</button>
    <div id="tbMsg" class="msg"></div>
  </div>`;
  const remList = rem.length ? rem.map(r => `<div class="statrow">
      <span class="k">📌 ${esc(r.title||"")}${r.body?` — <span style="color:var(--muted);font-weight:600">${esc(r.body)}</span>`:""}</span>
      <button class="rost-addbtn" style="padding:6px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--bad);font-weight:800;font-size:11.5px;cursor:pointer" onclick="removeReminder('${r.id}')">Usuń</button>
    </div>`).join("") : '<div class="empty">Brak stałych przypomnień.</div>';
  const alrList = alr.length ? alr.map(a => {
    const when = a.created_at ? new Date(a.created_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    const p = PRIO[a.priority] || PRIO.normal;
    return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:3px">
      <div style="display:flex;gap:8px;width:100%;align-items:center"><span class="chip" style="color:${p.c};border-color:${p.c}55">${p.l}</span><span class="k" style="flex:1">${esc(a.title||"")}</span><span class="tm" style="font-size:11px;color:var(--muted)">${esc(when)}</span></div>
      ${a.body?`<div style="font-size:12.5px;color:var(--muted)">${esc(a.body)}</div>`:""}
    </div>`; }).join("") : '<div class="empty">Brak ogłoszeń.</div>';
  const wikList = wik.length ? wik.map(w => {
    const when = w.updated_at ? new Date(w.updated_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:3px">
      <div style="display:flex;gap:8px;width:100%;align-items:center"><span class="k" style="flex:1">📖 ${esc(w.topic||"")}</span><span class="tm" style="font-size:11px;color:var(--muted)">${esc(when)}</span></div>
      ${w.content?`<div style="font-size:12.5px;color:var(--muted);max-height:46px;overflow:hidden">${esc(w.content)}</div>`:""}

// Przełączanie pól w zależności od rodzaju wpisu.
window.tbKindChange = () => {
  const kind = (document.getElementById("tbKind")||{}).value || "standing";
  const show = (id, on) => { const el = document.getElementById(id); if (el) el.style.display = on ? "" : "none"; };
  const setTxt = (id, t) => { const el = document.getElementById(id); if (el) el.textContent = t; };
  show("tbTopicWrap", kind === "wiki");
  show("tbTitleWrap", kind !== "wiki");
  show("tbBodyWrap", kind !== "standing");
  if (kind === "standing") setTxt("tbTitleLbl","Treść");
  if (kind === "urgent")  { setTxt("tbTitleLbl","Treść pilnego przypomnienia"); setTxt("tbBodyLbl","Szczegóły (opcjonalnie)"); }
  if (kind === "wiki")     setTxt("tbBodyLbl","Treść");
  const btn = document.getElementById("tbBtn");
  if (btn) btn.textContent = kind === "wiki" ? "Dodaj do Wiki" : (kind === "urgent" ? "Wyślij pilne" : "Dodaj przypomnienie");
};
window.tbAdd = async () => {
  const kind = (document.getElementById("tbKind")||{}).value || "standing";
  const val  = (id) => ((document.getElementById(id)||{}).value || "").trim();
  const msg = document.getElementById("tbMsg"), btn = document.getElementById("tbBtn");
  const setM = (x,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=x||""; } };
  const busy = (on, t) => { if (btn){ btn.disabled=on; if(t) btn.textContent=t; } };
  try {
    if (kind === "wiki") {
      const topic = val("tbTopic"), content = val("tbBody");
      if (!topic) return setM("Wpisz temat.", "err");
      if (!content) return setM("Wpisz treść.", "err");
      busy(true, "Dodaję…");
      const id = (crypto.randomUUID && crypto.randomUUID()) || ("w" + Date.now());
      const { error } = await sb.from("wiki_entries").insert({
        id, tenant_id:TENANT_ID, topic, content, images:[],
        created_by:CURRENT.name||"Panel", updated_at:new Date().toISOString(),
      });
      if (error) throw error;
      try { await sb.rpc("log_action", { p_action:"wiki_dodane", p_detail:topic }); } catch {}
    } else if (kind === "urgent") {
      const title = val("tbTitle"), bodyv = val("tbBody");
      if (!title) return setM("Wpisz treść.", "err");
      busy(true, "Wysyłam…");
      const { error } = await sb.from("manager_alerts").insert({
        tenant_id:TENANT_ID, title, body:bodyv||title, priority:"high",
        kind:"alert", created_by:CURRENT.name||"Panel",
      });
      if (error) throw error;
      try { await sb.rpc("log_action", { p_action:"alert_dodany", p_detail:title }); } catch {}
    } else {
      const title = val("tbTitle");
      if (!title) return setM("Wpisz treść.", "err");
      busy(true, "Dodaję…");
      const { error } = await sb.from("standing_reminders").insert({ tenant_id:TENANT_ID, title, body:"", active:true, created_by:CURRENT.name||"Panel" });
      if (error) throw error;
      try { await sb.rpc("log_action", { p_action:"przypomnienie_dodane", p_detail:title }); } catch {}
    }
    loadTablica();
  } catch (e) { setM((e&&e.message)||"Nie udało się.", "err"); busy(false); window.tbKindChange(); }
};
window.removeReminder = async (id) => {
  try { const { error } = await sb.from("standing_reminders").update({ active:false }).eq("id", id); if (error) throw error; loadTablica(); }
  catch (e) { alert((e&&e.message)||"Błąd."); }
};

      sb.from("hk_logs").select("action,worker,room,extra,log_time,created_at,date").gte("date", from).order("created_at", { ascending:false }).limit(60),
      sb.from("faults").select("source,description,room,space_id,reported_by,reported_at").eq("source","hk").order("reported_at", { ascending:false }).limit(30),

// ── Konta (admin): dodawanie kont + role + aktywacja ──
const ROLE_OPTIONS = [["mgr_hk","Menedżer HK"],["koordynator","Koordynator"],["mgr_recepcja","Menedżer recepcji"],
  ["mgr_glowny","Menedżer główny"],["mgr_operacyjny","Menedżer operacyjny"],["mgr_gastro","Menedżer gastronomii"],["admin","Admin"]];
const roleSelect = (id, sel) => `<select id="${id}" class="inp">${ROLE_OPTIONS.map(([v,l])=>`<option value="${v}"${sel===v?" selected":""}>${l}</option>`).join("")}</select>`;
async function loadKonta() {
  let rows = [];
  try { const { data } = await sb.rpc("admin_list_accounts"); rows = data || []; }
  catch { return body('<div class="empty">Brak uprawnień lub błąd.</div>'); }
  const form = `
    <div class="card" style="margin-bottom:12px">
      <div class="soon" style="margin-top:0">Dodaj konto</div>
      <div class="field"><label>Imię (widoczne na liście logowania)</label>
        <input id="aName" class="inp" placeholder="np. Tetiana"/></div>
      <div class="field"><label>Rola</label>${roleSelect("aRole","mgr_hk")}</div>
      <div class="field"><label>Kod 1. logowania (opcjonalny)</label>
        <input id="aCode" class="inp" placeholder="np. 4821 — chroni przed przejęciem konta"/></div>
      <button id="aBtn" class="btn" onclick="addKonto()">Dodaj konto</button>
      <div id="aMsg" class="msg"></div>
      <div class="note">Hasło ustawi sama osoba przy pierwszym logowaniu. Jeśli podasz kod — przekaż go tej osobie.</div>
    </div>`;
  const list = rows.map(r => {
    const st = r.active === false ? "nieaktywne" : (r.claimed ? "aktywne · ma hasło" : "czeka na 1. logowanie");
    const stc = r.active === false ? "var(--bad)" : (r.claimed ? "var(--ok)" : "var(--muted)");
    return `<div class="wcard" style="cursor:default">
      <div class="wtop"><span class="av">${esc(initials(r.name))}</span>
        <span class="nm">${esc(r.name)}</span>
        <span style="font-size:11px;font-weight:800;color:${stc}">${st}</span></div>
      <div style="display:flex;gap:7px;margin-top:9px;align-items:center;flex-wrap:wrap">
        ${roleSelect("role_"+esc(r.email), r.role)}
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:12px;cursor:pointer"
          onclick="saveKontoRole('${esc(r.email)}')">Zapisz rolę</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:${r.active===false?"var(--ok)":"var(--bad)"};font-weight:800;font-size:12px;cursor:pointer"
          onclick="toggleKonto('${esc(r.email)}', ${r.active===false})">${r.active===false?"Aktywuj":"Dezaktywuj"}</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12px;cursor:pointer"
          onclick="resetKonto('${esc(r.email)}','${esc(r.name)}')">Reset hasła</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12px;cursor:pointer"
          onclick="renameKonto('${esc(r.email)}','${esc(r.name)}')">Zmień login</button>
      </div>
    </div>`;
  }).join("");
  body(form + `<div class="soon">Konta (${rows.length})</div>` + (list || '<div class="empty">Brak kont.</div>'));
}
window.addKonto = async () => {
  const name = (document.getElementById("aName")||{}).value || "";
  const role = (document.getElementById("aRole")||{}).value || "mgr_hk";
  const codeV = (document.getElementById("aCode")||{}).value || "";
  const msg = document.getElementById("aMsg"); const btn = document.getElementById("aBtn");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!name.trim()) return setM("Wpisz imię.", "err");
  if (btn){ btn.disabled=true; btn.textContent="Dodaję…"; }
  try { const { error } = await sb.rpc("admin_add_account", { p_name: name.trim(), p_role: role, p_code: codeV.trim() });
    if (error) throw error;
    setM(codeV.trim() ? `Konto dodane. Kod 1. logowania: ${codeV.trim()} — przekaż osobie.` : "Konto dodane.", "info");
    setTimeout(loadKonta, 1400);
  } catch (e) { setM((e&&e.message)||"Nie udało się.", "err"); if (btn){ btn.disabled=false; btn.textContent="Dodaj konto"; } }
};
window.renameKonto = async (email, name) => {
  const nn = prompt(`Nowy login (imię) dla tego konta:`, name);
  if (nn == null || !nn.trim()) return;
  try { const { error } = await sb.rpc("admin_set_name", { p_email: email, p_name: nn.trim() }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd zmiany loginu."); }
};
window.resetKonto = async (email, name) => {
  const np = prompt(`Nowe hasło dla „${name}" (min. 6 znaków) — przekaż je tej osobie:`);
  if (np == null) return;
  if (np.length < 6) return alert("Hasło musi mieć min. 6 znaków.");
  try {
    const { data, error } = await sb.rpc("admin_set_password", { p_email: email, p_password: np });
    if (error) throw error;
    if (data === false) alert(`„${name}" nie logował(a) się jeszcze ani razu — ustawi hasło sam(a) przy pierwszym wejściu.`);
    else alert(`Hasło ustawione ✓ Przekaż „${name}": ${np}`);
    loadKonta();
  } catch (e) { alert((e&&e.message)||"Błąd resetu."); }
};
window.saveKontoRole = async (email) => {
  const role = (document.getElementById("role_"+email)||{}).value;
  try { const { error } = await sb.rpc("admin_set_role", { p_email: email, p_role: role }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd zmiany roli."); }
};
window.toggleKonto = async (email, makeActive) => {
  try { const { error } = await sb.rpc("admin_set_active", { p_email: email, p_active: makeActive }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd."); }
};

// ── Logi (admin): kto się logował i czy coś realnie zrobił ──
const AUDIT_LABEL = {
  logowanie:"wejście do panelu", obsada_zapis:"zapis obsady HK", zadanie_dodane:"dodał zadanie",
  zadanie_zrobione:"oznaczył zadanie zrobione", poczta_wyslana:"wysłał pocztę", poczta_status:"zmiana statusu poczty",
  korekta_decyzja:"decyzja o korekcie kasy", zadanie_konserwator:"zlecenie dla konserwatora",
  plan_dodane:"wpis do planu", grafik_edycja:"edycja grafiku", grafik_utworzony:"utworzył grafik",
  grafik_wpis:"wpis do grafiku", przypomnienie_dodane:"dodał przypomnienie",
};
const auditLabel = a => AUDIT_LABEL[a] || a;
const fmtDT = ts => { const d=new Date(ts); return `${d.getDate()} ${MON[d.getMonth()]}, ${pad(d.getHours())}:${pad(d.getMinutes())}`; };
let LOGI_DAYS = 14;
window.setLogiDays = (n) => { LOGI_DAYS = n; loadLogi(); };
async function loadLogi() {
  let sessions = [], feed = [];
  try {
    const [{ data: s }, { data: f }] = await Promise.all([
      sb.rpc("admin_login_sessions", { p_days: LOGI_DAYS }),
      sb.rpc("admin_list_audit",     { p_days: LOGI_DAYS }),
    ]);
    sessions = s || []; feed = f || [];
  } catch { return body('<div class="empty">Brak uprawnień lub błąd wczytywania logów.</div>'); }

  // Podsumowanie per osoba: ile wejść i ile „pustych" (wszedł i nic nie zrobił).
  const byActor = {};
  sessions.forEach(s => {
    const k = s.actor || "—";
    const a = byActor[k] || (byActor[k] = { actor:k, role:s.actor_role, logins:0, empty:0, last:null });
    a.logins++; if ((s.actions||0) === 0) a.empty++;
    if (!a.last || s.login_at > a.last) a.last = s.login_at;
  });
  const summary = Object.values(byActor).sort((x,y)=> y.empty-x.empty || y.logins-x.logins);

  const dayBtn = (n,lbl) => `<button class="rost-addbtn" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line-strong);font-weight:800;font-size:12px;cursor:pointer;background:${LOGI_DAYS===n?"var(--plum)":"var(--paper)"};color:${LOGI_DAYS===n?"#fff":"var(--plum)"}" onclick="setLogiDays(${n})">${lbl}</button>`;
  const range = `<div style="display:flex;gap:7px;margin-bottom:12px">${dayBtn(7,"7 dni")}${dayBtn(14,"14 dni")}${dayBtn(30,"30 dni")}</div>`;

  const sumCards = summary.map(a => {
    const bad = a.empty > 0;
    const tag = bad
      ? `<span style="font-size:11px;font-weight:800;color:var(--bad)">${a.empty}/${a.logins} wejść bez działań</span>`
      : `<span style="font-size:11px;font-weight:800;color:var(--ok)">${a.logins} wejść — aktywny(a)</span>`;
    return `<div class="wcard" style="cursor:default;border-left:3px solid ${bad?"var(--bad)":"var(--ok)"}">
      <div class="wtop"><span class="av">${esc(initials(a.actor))}</span>
        <span class="nm">${esc(a.actor)}</span>
        <span style="font-size:11px;color:var(--muted)">${esc(ROLE_LABEL(a.role))}</span></div>
      <div style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">
        ${tag}<span style="font-size:11px;color:var(--muted)">ostatnio: ${a.last?esc(fmtDT(a.last)):"—"}</span></div>
    </div>`;
  }).join("");

  const sessRows = sessions.map(s => {
    const empty = (s.actions||0) === 0;
    return `<div class="wcard" style="cursor:default;padding:10px 12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div><b>${esc(s.actor||"—")}</b> <span style="font-size:11px;color:var(--muted)">${esc(ROLE_LABEL(s.actor_role))}</span></div>
        <span style="font-size:11px;color:var(--muted)">${esc(fmtDT(s.login_at))}</span>
      </div>
      <div style="margin-top:5px;font-size:12px;font-weight:800;color:${empty?"var(--bad)":"var(--ok)"}">
        ${empty?"⚠ wszedł i nic nie zrobił":`✓ ${s.actions} ${s.actions===1?"akcja":(s.actions<5?"akcje":"akcji")}${s.last_action_at?" · ostatnia "+esc(fmtDT(s.last_action_at)):""}`}
      </div>
    </div>`;
  }).join("");

  const feedRows = feed.map(r => `<div class="wcard" style="cursor:default;padding:9px 12px">
      <div style="display:flex;justify-content:space-between;gap:8px">
        <span style="font-size:12px"><b>${esc(r.actor||"—")}</b> — ${esc(auditLabel(r.action))}</span>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap">${esc(fmtDT(r.created_at))}</span>
      </div>
      ${r.detail?`<div style="margin-top:3px;font-size:11px;color:var(--muted)">${esc(r.detail)}</div>`:""}
    </div>`).join("");

  body(range
    + `<div class="soon" style="margin-top:0">Podsumowanie wg osoby</div>`
    + `<div class="note" style="margin-bottom:8px">Czerwone = osoba logowała się, ale nie wykonała żadnej akcji w panelu. Liczone z ostatnich ${LOGI_DAYS} dni.</div>`
    + (sumCards || '<div class="empty">Brak zarejestrowanych wejść w tym okresie.</div>')
    + `<div class="soon">Wejścia po kolei (${sessions.length})</div>`
    + (sessRows || '<div class="empty">Brak wejść.</div>')
    + `<div class="soon">Pełny dziennik akcji (${feed.length})</div>`
    + (feedRows || '<div class="empty">Brak akcji.</div>'));
}

window.doLogout = async () => {
  stopLive();
  try { if (MAIL_CH) sb.removeChannel(MAIL_CH); MAIL_CH = null; } catch {}
  MAIL_UNREAD = 0; MAIL_VIEW = "list"; MAIL_THREAD = null;
  await sb.auth.signOut();
  showLogin();
};
// Zmiana własnego hasła (zalogowany użytkownik).
window.changeMyPassword = async () => {
  const np = prompt("Podaj nowe hasło (min. 6 znaków):");
  if (np == null) return;
  if (np.length < 6) return alert("Hasło musi mieć min. 6 znaków.");
  try { const { error } = await sb.auth.updateUser({ password: np }); if (error) throw error; alert("Hasło zmienione ✓"); }
  catch (e) { alert((e&&e.message) || "Nie udało się zmienić hasła."); }
};

boot();
</script>

<script>
/* ── Interaktywna warstwa „atelier": jedwabista aurora + reflektor za kursorem/dotykiem ──
   Canvas 2D, ~4 oddychające plamy. Kap ~30 fps, DPR≤2, pauza gdy karta w tle.
   Respektuje prefers-reduced-motion (canvas wyłączony — zostaje statyczna aurora CSS). */
(function(){
  var c = document.getElementById('bgfx');
  if (!c || !c.getContext) return;
  var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)');
  if (rm && rm.matches) return;
  var ctx = c.getContext('2d');
  var W = 0, H = 0, M = 0, DPR = 1;

  // Plamy w barwach marki (plum / fiolet / złoto). r = promień bazowy, br = amplituda „oddechu".
  var blobs = [
    { col:'122,58,106', x:.18, y:.15, r:.60, br:.06, vx: .011, vy: .007, a:.30, ph:0.0 },
    { col:'150,92,152', x:.85, y:.12, r:.54, br:.07, vx:-.009, vy: .010, a:.26, ph:1.6 },
    { col:'90,29,74',   x:.20, y:.90, r:.58, br:.05, vx: .010, vy:-.009, a:.27, ph:3.1 },
    { col:'176,134,58', x:.86, y:.86, r:.50, br:.06, vx:-.008, vy:-.010, a:.19, ph:4.5 }
  ];
  // Wskaźnik (mysz/dotyk): pozycja docelowa + wygładzona; reflektor podąża z opóźnieniem.
  var p = { x:.5, y:.42, tx:.5, ty:.42, on:0 };

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = c.clientWidth; H = c.clientHeight; M = Math.max(W, H);
    c.width = Math.round(W * DPR); c.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();

  function move(e){
    var t = e.touches ? e.touches[0] : e;
    if (!t) return;
    p.tx = t.clientX / Math.max(W,1);
    p.ty = t.clientY / Math.max(H,1);
    p.on = 1;
  }
  window.addEventListener('pointermove', move, { passive:true });
  window.addEventListener('touchmove', move, { passive:true });
  window.addEventListener('pointerout', function(){ p.on = 0; }, { passive:true });

  function softCircle(x, y, r, col, a){
    var g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,    'rgba('+col+','+a+')');
    g.addColorStop(.5,   'rgba('+col+','+(a*0.42)+')');
    g.addColorStop(1,    'rgba('+col+',0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
  }

  var last = 0, t = 0;
  function frame(now){
    requestAnimationFrame(frame);
    if (document.hidden) return;
    if (now - last < 33) return;        // ~30 fps
    last = now; t += 0.012;

    p.x += (p.tx - p.x) * 0.055;
    p.y += (p.ty - p.y) * 0.055;

    ctx.clearRect(0, 0, W, H);

    // 1) jedwabista aurora — oddychające, dryfujące plamy
    ctx.globalCompositeOperation = 'source-over';
    for (var i = 0; i < blobs.length; i++){
      var b = blobs[i];
      b.x += b.vx * 0.0015; b.y += b.vy * 0.0015;
      if (b.x < -.12 || b.x > 1.12) b.vx *= -1;
      if (b.y < -.12 || b.y > 1.12) b.vy *= -1;
      var dx = p.x - b.x, dy = p.y - b.y, pull = p.on ? 0.09 : 0;
      var rr = (b.r + b.br * Math.sin(t + b.ph)) * M;   // „oddech"
      softCircle((b.x + dx*pull) * W, (b.y + dy*pull) * H, rr, b.col, b.a);
    }

    // 2) reflektor podążający za kursorem/dotykiem — światło ujawnia głębię
    if (p.on){
      var lx = p.x * W, ly = p.y * H;
      ctx.globalCompositeOperation = 'soft-light';       // głębszy plum pod światłem
      softCircle(lx, ly, 0.40 * M, '90,29,74', 0.30);
      ctx.globalCompositeOperation = 'lighter';          // ciepły rdzeń światła
      softCircle(lx, ly, 0.26 * M, '255,246,236', 0.10);
      ctx.globalCompositeOperation = 'source-over';
    }
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
