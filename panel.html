<script>
/* Auto-aktualizacja: gdy na serwerze pojawi się nowa wersja strony, aplikacja
   dodana do ekranu głównego (standalone PWA) sama się przeładuje — nie trzeba
   jej zamykać ani usuwać i dodawać ponownie. */
(function(){
  var url = location.pathname + (location.search || "");
  var baseline = null, busy = false, INTERVAL = 5 * 60 * 1000;
  function fp(s){ var h = 0; for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return s.length + ":" + h; }
  async function check(){
    if (busy || navigator.onLine === false) return;
    busy = true;
    try {
      var res = await fetch(url, { cache: "no-store" });
      if (res.ok){
        var cur = fp(await res.text());
        if (baseline === null) baseline = cur;
        else if (cur !== baseline){ location.reload(); return; }
      }
    } catch (e) { /* offline / chwilowy błąd — sprawdzimy później */ }
    busy = false;
  }
  if ("serviceWorker" in navigator)
    navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.update(); }).catch(function(){});
  check();
  setInterval(function(){ if (!document.hidden) check(); }, INTERVAL);
  document.addEventListener("visibilitychange", function(){ if (!document.hidden) check(); });
})();
</script>

.wcard{background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer}

.wtop{display:flex;align-items:center;gap:10px}

.wtop .nm{font-weight:800;font-size:14.5px;flex:1;min-width:0}

<script>
const SB_URL = "https://pjgcaujndvjvicqsdcns.supabase.co";
const SB_KEY = "sb_publishable_h_uQ7-zzck71HIWxnlwTbQ_Io9m7wfb";
const sb = (window.supabase && window.supabase.createClient)
  ? window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } })
  : null;

// Etykiety ról + placeholdery widoków (kolejne iteracje wpinają tu realne moduły).
const ROLE_INFO = {
  admin:          { label: "Admin — pełny dostęp", soon: ["Zarządzanie kontami i rolami", "Wgląd we wszystkie działy", "Ustawienia panelu"] },
  mgr_hk:         { label: "Menedżer HK", soon: ["Wyjazdy (plan dnia)", "Widok na żywo — kto robi jaki pokój", "Statystyki pracowników (klik w osobę)", "Grafik HK"] },
  koordynator:    { label: "Koordynator", soon: ["Wszystko z widoku HK", "Przekazane zadania (z telefonu na komputer)", "Stan kasy każdego dnia", "Kto robi zadania"] },
  mgr_recepcja:   { label: "Menedżer recepcji", soon: ["Wszystko z widoku HK", "Przekazane zadania", "Stan kasy każdego dnia", "Wyjazdy i status pokoi"] },
  mgr_glowny:     { label: "Menedżer główny", soon: ["Wszystko z wyżej", "Stan pracy konserwatorów", "Usterki — ile pracy / SLA", "Dodawanie zadań konserwatorom"] },
  mgr_operacyjny: { label: "Menedżer operacyjny", soon: ["Wszystko z wyżej", "Stan pracy konserwatorów", "Usterki — ile pracy / SLA", "Dodawanie zadań konserwatorom"] },
  mgr_gastro:     { label: "Menedżer gastronomii", soon: ["Grafik gastro", "Zadania gastro", "Stany / dostawy (wkrótce)"] },
};
const ROLE_LABEL = r => (ROLE_INFO[r] && ROLE_INFO[r].label) || r;

const app = document.getElementById("app");
const logoutBtn = document.getElementById("logoutBtn");
const initials = n => (String(n||"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("") || "?").toUpperCase();
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");

let accounts = [];

async function boot() {
  if (!sb) { app.innerHTML = '<div class="card"><div class="msg err" style="display:block">Brak biblioteki Supabase — odśwież stronę.</div></div>'; return; }
  // Aktywna sesja? → od razu panel.
  const { data: { session } } = await sb.auth.getSession();
  if (session) return showPanelFromSession();
  showAccountList();
}

async function showAccountList() {
  logoutBtn.style.display = "none";
  app.innerHTML = '<div class="spin">Wczytywanie kont…</div>';
  const { data, error } = await sb.from("app_accounts").select("name,email,role,claimed").order("role");
  if (error) { app.innerHTML = `<div class="card"><div class="msg err" style="display:block">Błąd wczytywania: ${esc(error.message)}</div></div>`; return; }
  accounts = data || [];
  const tiles = accounts.map((a,i) => `
    <button class="acct" onclick="pickAccount(${i})">
      <span class="av">${esc(initials(a.name))}</span>
      <span class="meta"><span class="nm">${esc(a.name)}</span><span class="rl">${esc(ROLE_LABEL(a.role))}</span></span>
      <span class="badge ${a.claimed ? "" : "new"}">${a.claimed ? "Zaloguj" : "Pierwsze logowanie"}</span>
    </button>`).join("");
  app.innerHTML = `
    <div class="h2">Wybierz swoje konto</div>
    <div class="sub">Zaloguj się, aby zobaczyć swój panel. Przy pierwszym wejściu ustawisz własne hasło.</div>
    <div class="grid">${tiles || '<div class="spin">Brak kont — uruchom seed w Supabase.</div>'}</div>`;
}

window.pickAccount = (i) => {
  const a = accounts[i];
  if (!a) return;
  const first = !a.claimed;
  app.innerHTML = `
    <button class="link" onclick="showAccountList()">‹ Wróć do listy</button>
    <div class="card">
      <div class="h2" style="margin-bottom:2px">${esc(a.name)}</div>
      <div class="sub" style="margin-bottom:0">${esc(ROLE_LABEL(a.role))}</div>
      ${first
        ? `<div class="note" style="margin-top:10px">To Twoje pierwsze logowanie — ustaw hasło, którym będziesz się logować od teraz.</div>`
        : ""}
      <div class="field">
        <label>${first ? "Nowe hasło (min. 6 znaków)" : "Hasło"}</label>
        <input id="pw" class="inp" type="password" autocomplete="${first ? "new-password" : "current-password"}"
          placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth(${i},${first})"/>
      </div>
      ${first ? `
      <div class="field">
        <label>Powtórz hasło</label>
        <input id="pw2" class="inp" type="password" autocomplete="new-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')submitAuth(${i},${first})"/>
      </div>` : ""}
      <button id="goBtn" class="btn" onclick="submitAuth(${i},${first})">${first ? "Ustaw hasło i wejdź" : "Zaloguj"}</button>
      <div id="authMsg" class="msg"></div>
    </div>`;
  setTimeout(()=>{ const el=document.getElementById("pw"); if(el) el.focus(); }, 50);
};

function setMsg(text, kind) {
  const m = document.getElementById("authMsg");
  if (!m) return;
  m.className = "msg " + (kind || "");
  m.textContent = text || "";
}

window.submitAuth = async (i, first) => {
  const a = accounts[i];
  if (!a) return;
  const pw = (document.getElementById("pw")||{}).value || "";
  const btn = document.getElementById("goBtn");
  if (first) {
    const pw2 = (document.getElementById("pw2")||{}).value || "";
    if (pw.length < 6) return setMsg("Hasło musi mieć min. 6 znaków.", "err");
    if (pw !== pw2)   return setMsg("Hasła nie są takie same.", "err");
  } else if (!pw) {
    return setMsg("Wpisz hasło.", "err");
  }
  if (btn) { btn.disabled = true; btn.textContent = "Chwila…"; }
  setMsg("", "");
  try {
    if (first) {
      // Pierwsze logowanie: utwórz konto Auth z wybranym hasłem, potem zwiąż ze spisem.
      const { error: suErr } = await sb.auth.signUp({ email: a.email, password: pw });
      if (suErr) {
        // Konto już istnieje (np. ktoś przejął) → spróbuj normalnego logowania.
        const { error: siErr } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
        if (siErr) throw new Error("To konto jest już aktywne. Jeśli to Ty — zaloguj się swoim hasłem; jeśli nie pamiętasz, poproś admina o reset.");
      } else {
        await sb.rpc("claim_account", { p_email: a.email });
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
      if (error) throw new Error("Błędne hasło.");
    }
    await showPanelFromSession();
  } catch (e) {
    setMsg((e && e.message) || "Nie udało się zalogować.", "err");
    if (btn) { btn.disabled = false; btn.textContent = first ? "Ustaw hasło i wejdź" : "Zaloguj"; }
  }
};

let CURRENT = { role: null, name: "" };

async function showPanelFromSession() {
  app.innerHTML = '<div class="spin">Wczytywanie panelu…</div>';
  let role = null, name = "";
  const { data: { user } } = await sb.auth.getUser();
  const { data: roleData } = await sb.rpc("current_app_role");
  role = roleData || null;
  if (user && user.email) {
    const { data: me } = await sb.from("app_accounts").select("name,role").eq("email", user.email).maybeSingle();
    if (me) { name = me.name; if (!role) role = me.role; }
  }
  logoutBtn.style.display = "";
  if (!role) {
    app.innerHTML = `<div class="card"><div class="msg err" style="display:block">Twoje konto nie ma jeszcze przypisanej roli. Skontaktuj się z adminem.</div></div>`;
    return;
  }
  CURRENT = { role, name };
  // Gastro i admin: na razie placeholder (ich widoki w kolejnych iteracjach).
  // Pozostałe role (HK, koordynator, recepcja, główny, operacyjny) dziedziczą widok HK.
  if (role === "mgr_gastro" || role === "admin") return renderPlaceholder(role, name);
  renderHkDashboard(role, name);
}

function renderPlaceholder(role, name) {
  const info = ROLE_INFO[role] || { label: role, soon: [] };
  const items = (info.soon||[]).map(s => `<div class="it"><span class="d">›</span><span>${esc(s)}</span></div>`).join("");
  app.innerHTML = `
    <div class="panelbox">
      <div class="role-ttl">${esc(info.label)}</div>
      <div class="role-who">Zalogowano jako: <b>${esc(name||"—")}</b></div>
      <div class="soon">Ten panel jest w budowie — wkrótce tutaj:</div>
      <div class="soonlist">${items || '<div class="it"><span>Widok w przygotowaniu.</span></div>'}</div>
    </div>`;
}

// ─────────────────────────── Dashboard HK ───────────────────────────
const TENANT_ID = "00000000-0000-0000-0000-000000000001";
const APT_ROOMS = ["106","206","218","306","318"];
const DOW = ["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];
const MON = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];
const pad = n => n<10 ? "0"+n : ""+n;
const isoDate = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const fmtDate = iso => { const [y,m,d]=iso.split("-").map(Number); const dt=new Date(y,m-1,d); return { dow:DOW[dt.getDay()], txt:d+" "+MON[m-1] }; };
const DONE_STATES = new Set(["czyste","done","gotowe"]);
let hkTab = "live";
let liveTimer = null;

function stopLive(){ if (liveTimer){ clearInterval(liveTimer); liveTimer=null; } }

// Role recepcyjne widzą dodatkowo Zadania + Kasę; grafik widzą HK + recepcyjne.
const RECEPCJA_ROLES = new Set(["koordynator","mgr_recepcja","mgr_glowny","mgr_operacyjny"]);
const GRAFIK_ROLES   = new Set(["mgr_hk","koordynator","mgr_recepcja","mgr_glowny","mgr_operacyjny"]);
function tabsFor(role){
  const t = [["live","Na żywo"],["wyjazdy","Wyjazdy"],["staty","Statystyki"]];

// ── Wyjazdy (logika 1:1 z wyjazdy.html: W/WP + PG + PGZ na 3 dni) ──
function countTypes(plan) {
  const data = plan || {};
  const pmRoomTypes = data.pm_room_types || {};
  const assigned = [];
  const a = data.assignments;
  if (a && typeof a === "object") Object.values(a).forEach(list => Array.isArray(list) && list.forEach(no => assigned.push(String(no))));
  const typedW = []; let pg=0, pgz=0;
  if (pmRoomTypes && typeof pmRoomTypes === "object") {
    Object.entries(pmRoomTypes).forEach(([no,v]) => {
      if (v==="W"||v==="WP") typedW.push(String(no)); else if (v==="PG") pg++; else if (v==="PGZ") pgz++;
    });
  }
  const allW = [...new Set([...typedW, ...assigned])];
  const apt = allW.filter(no => APT_ROOMS.includes(no)).length;
  return { w:{ total:allW.length, reg:allW.length-apt, apt }, pg, pgz };
}
const fmtWP = (reg, apt) => apt ? `${reg}+${apt} APT` : `${reg}`;

// ── Na żywo: kto robi jaki pokój (hk_rooms dzisiaj) + feed zdarzeń (hk_logs) ──
const FEED_ICON = { start:"▶", done:"✓", skip:"✕", vacate:"🔔", task_done:"☑" };
function feedText(l){
  const a = l.action;
  if (a==="start")  return `${l.worker||"?"} zaczyna pokój ${l.room||""}`;
  if (a==="done")   return `${l.worker||"?"} skończyła pokój ${l.room||""}`;
  if (a==="skip")   return `${l.worker||"?"} — goście nie chcieli (${l.room||""})`;
  if (a==="vacate") return `Recepcja: pokój ${l.room||""} pusty`;
  if (a==="task_done") return `${l.worker||"?"}: zadanie — ${l.extra||""}`;
  return l.extra || `${l.worker||"?"}: ${a||""}`;
}

async function loadLive() {
  const today = isoDate(new Date());
  const paint = async () => {
    let rooms = [], logs = [];
    try {
      const [r1, r2] = await Promise.all([
        sb.from("hk_rooms").select("room,worker,status").eq("date", today),
        sb.from("hk_logs").select("action,worker,room,extra,log_time,created_at").eq("date", today).order("created_at", { ascending:false }).limit(12),
      ]);
      rooms = r1.data || []; logs = r2.data || [];
    } catch { body('<div class="empty">Brak połączenia z danymi HK.</div>'); return; }
    // Grupuj pokoje wg pracownika; pomiń stany niesprzątane (PG/PGZ to pobyty, nie wyjazdy).
    const byWorker = {};
    rooms.forEach(r => {
      const w = r.worker || "—";
      if (!byWorker[w]) byWorker[w] = { rooms: [], done: 0 };
      const done = DONE_STATES.has(String(r.status||"").toLowerCase());
      byWorker[w].rooms.push({ room: r.room, done });
      if (done) byWorker[w].done++;
    });
    const workers = Object.entries(byWorker).filter(([w]) => w!=="—").sort((a,b)=>a[0].localeCompare(b[0],"pl"));
    let html = "";
    if (!workers.length) {
      html = '<div class="empty">Dziś nikt nie ma jeszcze przypisanych pokoi.</div>';
    } else {
      html = workers.map(([w, d]) => {
        const total = d.rooms.length, pct = total ? Math.round(d.done/total*100) : 0;
        const chips = d.rooms.sort((a,b)=>String(a.room).localeCompare(String(b.room),"pl",{numeric:true}))
          .map(r => `<span class="chip ${r.done?"done":""}">${esc(r.room)}</span>`).join("");
        return `<div class="wcard" style="cursor:default">
          <div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}</span><span class="prog">${d.done}/${total}</span></div>
          <div class="bar"><span style="width:${pct}%"></span></div>
          <div class="chips">${chips}</div>
        </div>`;
      }).join("");
    }
    const feed = logs.length ? `<div class="soon" style="margin-top:18px">Ostatnie zdarzenia</div><div class="feed">${
      logs.map(l => { const t = l.log_time || (l.created_at?new Date(l.created_at).toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}):"");
        return `<div class="fitem"><span class="ic">${FEED_ICON[l.action]||"·"}</span><span>${esc(feedText(l))}</span><span class="tm">${esc(t)}</span></div>`; }).join("")
    }</div>` : "";
    body(html + feed);
  };
  await paint();
  liveTimer = setInterval(() => { if (hkTab==="live") paint(); else stopLive(); }, 5000);
}

// ── Statystyki: ostatnie 7 dni (pokoje sprzątnięte wg osoby + usterki zgłoszone z HK) ──
async function loadStats() {
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate()-6);
  const fromKey = isoDate(from), toKey = isoDate(today);
  const fromIso = new Date(fromKey+"T00:00:00").toISOString(), toIso = new Date(toKey+"T23:59:59").toISOString();
  let rooms = [], faults = [];
  try {
    const [r1, r2] = await Promise.all([
      sb.from("hk_rooms").select("status,worker,date").gte("date",fromKey).lte("date",toKey),
      sb.from("faults").select("source,status,reported_by,reported_at").eq("source","hk").gte("reported_at",fromIso).lte("reported_at",toIso),
    ]);
    rooms = r1.data || []; faults = r2.data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać statystyk.</div>'); }
  const perWorker = {};
  rooms.forEach(r => {
    const w = r.worker; if (!w) return;
    perWorker[w] = perWorker[w] || { sprzatniete:0, zgloszone:0 };
    if (DONE_STATES.has(String(r.status||"").toLowerCase())) perWorker[w].sprzatniete++;
  });
  faults.forEach(f => { const w=f.reported_by; if(!w) return; perWorker[w]=perWorker[w]||{sprzatniete:0,zgloszone:0}; perWorker[w].zgloszone++; });
  STATS_CACHE = perWorker;
  const list = Object.entries(perWorker).sort((a,b)=>b[1].sprzatniete-a[1].sprzatniete);
  if (!list.length) return body('<div class="empty">Brak danych z ostatnich 7 dni.</div>');
  const html = list.map(([w,s]) => `
    <div class="wcard" onclick="showWorker('${esc(w).replace(/'/g,"\\'")}')">
      <div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}</span><span class="prog">${s.sprzatniete}</span></div>
      <div class="chips"><span class="chip">${s.sprzatniete} pokoi</span><span class="chip">${s.zgloszone} usterek</span></div>
    </div>`).join("");
  body(`<div class="note" style="margin-top:0;margin-bottom:10px">Ostatnie 7 dni (${fromKey} – ${toKey}). Kliknij osobę, by zobaczyć szczegóły.</div>` + html);
}

        <div class="k"><div>${esc(row.person)}</div>
          <div style="font-size:14px;font-weight:900;color:var(--plum);letter-spacing:.12em;margin-top:2px">kod: ${esc(row.token)}</div></div>
        <button class="rost-addbtn" style="padding:7px 11px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:12px;cursor:pointer"
          onclick="copyLink('${row.token}', this)">Kopiuj link</button>
      </div>`).join("");
    const el = document.getElementById("gLinks");
    if (el) el.innerHTML = `<div class="soon">Linki gotowe — wyślij każdej osobie jej własny:</div>${links}`;
    setM(`Wygenerowano ${data.length} link(ów).`, "info");
    if (btn){ btn.disabled=false; btn.textContent="Generuj linki"; }
  } catch (e) {
    setM((e&&e.message)||"Nie udało się wygenerować.", "err");
    if (btn){ btn.disabled=false; btn.textContent="Generuj linki"; }
  }
};
window.copyLink = (token, el) => {
  const url = GRAFIK_BASE + token;
  navigator.clipboard?.writeText(url).then(()=>{ if(el){ const o=el.textContent; el.textContent="Skopiowano ✓"; setTimeout(()=>el.textContent=o,1500); } }, ()=>{});
};
window.openGrid = async (reqId) => {
  body('<div class="spin">Wczytywanie odpowiedzi…</div>');
  let rows = [];
  try { const { data } = await sb.rpc("get_request_grid", { p_request_id: reqId }); rows = data || []; }
  catch { return body('<div class="empty">Nie udało się pobrać odpowiedzi.</div>'); }
  const persons = [...new Set(rows.map(r => r.person))].sort((a,b)=>a.localeCompare(b,"pl"));
  const dates = [...new Set(rows.filter(r=>r.date).map(r => r.date))].sort();
  const byPD = {}; rows.forEach(r => { if(r.date) byPD[r.person+"|"+r.date] = r.choice; });
  let html = `<button class="link" onclick="setHkTab('grafik')">‹ Wróć do grafików</button>`;
  if (!dates.length) {
    html += '<div class="empty">Nikt jeszcze nie odpowiedział.</div>';
    return body(html);
  }
  const head = `<th style="text-align:left;padding:6px 8px;position:sticky;left:0;background:var(--cream)">Osoba</th>` +
    dates.map(d => { const [,m,dd]=d.split("-"); return `<th style="padding:6px 6px;font-size:11px;color:var(--muted)">${dd}.${m}</th>`; }).join("");
  const bodyRows = persons.map(p => {
    const cells = dates.map(d => {
      const c = byPD[p+"|"+d]; const a = CHOICE_ABBR[c];
      return `<td style="text-align:center;padding:5px 6px">${a?`<span style="display:inline-block;min-width:22px;font-weight:900;font-size:12px;color:${a[1]}">${a[0]}</span>`:`<span style="color:var(--line-strong)">·</span>`}</td>`;
    }).join("");
    return `<tr><td style="padding:6px 8px;font-weight:700;font-size:13px;position:sticky;left:0;background:var(--paper);border-right:1px solid var(--line)">${esc(p)}</td>${cells}</tr>`;
  }).join("");
  const legend = Object.entries(CHOICE_ABBR).map(([k,a])=>`<span style="color:${a[1]};font-weight:800">${a[0]}</span> ${k}`).join(" · ");
  html += `<div class="note" style="margin-top:6px">Legenda: ${legend}</div>
    <div style="overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--paper);margin-top:8px">
      <table style="border-collapse:collapse;min-width:100%"><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
  body(html);
};

// ── Akcje: spis kto co zrobił / edytował (panel_audit) ──
const AUDIT_LBL = { grafik_utworzony:"Wysłał grafik", grafik_wpis:"Wpis w grafiku",
                    grafik_edycja:"Edycja grafiku", zadanie_dodane:"Dodał zadanie" };
async function loadAkcje() {
  let rows = [];
  try { const { data } = await sb.rpc("list_panel_audit"); rows = data || []; }
  catch { return body('<div class="empty">Nie udało się pobrać akcji.</div>'); }
  if (!rows.length) return body('<div class="empty">Brak zarejestrowanych akcji.</div>');
  const html = rows.map(r => {
    const when = r.created_at ? new Date(r.created_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    const lbl = AUDIT_LBL[r.action] || r.action;
    const role = r.actor_role ? ` <span style="color:var(--muted);font-weight:600">(${esc(ROLE_LABEL(r.actor_role))})</span>` : "";
    return `<div class="fitem"><span class="ic">•</span>
      <span><b>${esc(r.actor||"—")}</b>${role} — ${esc(lbl)}${r.detail?`: ${esc(r.detail)}`:""}</span>
      <span class="tm">${esc(when)}</span></div>`;
  }).join("");
  body(`<div class="note" style="margin-top:0;margin-bottom:8px">Ostatnie akcje w panelu — kto co zrobił lub edytował.</div><div class="feed">${html}</div>`);
}

window.doLogout = async () => {
  stopLive();
  await sb.auth.signOut();
  showAccountList();
};

boot();
</script>
