<script>
/* Auto-aktualizacja: gdy na serwerze pojawi się nowa wersja strony, aplikacja
   dodana do ekranu głównego (standalone PWA) sama się przeładuje — nie trzeba
   jej zamykać ani usuwać i dodawać ponownie. */
(function(){
  var url = location.pathname + (location.search || "");
  var baseline = null, busy = false, INTERVAL = 5 * 60 * 1000;
  function fp(s){ var h = 0; for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return s.length + ":" + h; }
  async function check(){
    if (busy || navigator.onLine === false) return;
    busy = true;
    try {
      var res = await fetch(url, { cache: "no-store" });
      if (res.ok){
        var cur = fp(await res.text());
        if (baseline === null) baseline = cur;
        else if (cur !== baseline){ location.reload(); return; }
      }
    } catch (e) { /* offline / chwilowy błąd — sprawdzimy później */ }
    busy = false;
  }
  if ("serviceWorker" in navigator)
    navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.update(); }).catch(function(){});
  check();
  setInterval(function(){ if (!document.hidden) check(); }, INTERVAL);
  document.addEventListener("visibilitychange", function(){ if (!document.hidden) check(); });
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --plum:#5a1d4a; --plum-soft:#7a3a6a; --cream:#fdfaf7; --paper:#ffffff;
  --ink:#2d1422; --muted:#8a6a7e; --line:rgba(90,29,74,.14); --line-strong:rgba(90,29,74,.28);
  --ok:#0f7a4a; --bad:#c2415a;
}
html,body{background:var(--cream)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overscroll-behavior:none}
/* ── Interaktywna warstwa tła (nakładka na animowaną aurorę body::before) ──
   Przezroczysta — dorzuca tylko reakcję na kursor/dotyk, nie zasłania gradientu. */
#bgfx{position:fixed;inset:0;width:100%;height:100%;z-index:-1;display:block;pointer-events:none;background:transparent}
.hdr,.wrap,.foot{position:relative;z-index:1}
@media (prefers-reduced-motion: reduce){#bgfx{display:none}}
.hdr{background:var(--plum);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .t1{font-family:'DM Serif Display',Georgia,serif;font-size:14px;letter-spacing:.18em;font-weight:400}
.logo-text .t2{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.04em}
.logout{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.wrap{max-width:560px;margin:0 auto;padding:18px 14px 40px}
.h2{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--plum);font-weight:400;margin-bottom:4px}
.sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.grid{display:flex;flex-direction:column;gap:10px}
.acct{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,#fff,#fdfbfa);border:1.5px solid var(--line);border-radius:15px;padding:13px 14px;cursor:pointer;text-align:left;font-family:inherit;width:100%;box-shadow:0 1px 2px rgba(90,29,74,.05);transition:border-color .16s,box-shadow .16s,transform .08s}
.acct:hover{border-color:var(--line-strong);box-shadow:0 6px 18px rgba(90,29,74,.1)}
.acct:active{transform:scale(.985);box-shadow:0 1px 2px rgba(90,29,74,.05)}
.acct .av{width:42px;height:42px;border-radius:13px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 5px rgba(90,29,74,.18);text-shadow:0 1px 2px rgba(0,0,0,.18)}
.acct .meta{flex:1;min-width:0}
.acct .nm{font-weight:800;font-size:15.5px;color:var(--ink);letter-spacing:-.01em}
.acct .rl{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct .badge{font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:999px;border:1px solid var(--line-strong);color:var(--plum);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.acct .badge.new{color:var(--ok);border-color:rgba(15,122,74,.4);background:rgba(15,122,74,.07)}
.acct .chev{color:var(--line-strong);font-size:22px;font-weight:700;line-height:1;flex-shrink:0;transition:transform .16s,color .16s}
.acct:hover .chev{color:var(--plum);transform:translateX(2px)}
.login-id{display:flex;align-items:center;gap:13px;margin-bottom:2px}
.login-id .av{width:46px;height:46px;border-radius:14px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 6px rgba(90,29,74,.2);text-shadow:0 1px 2px rgba(0,0,0,.18)}
.card{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:18px 16px}
.field{margin-top:12px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.03em}
.inp{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-size:15px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--plum)}
.btn{width:100%;margin-top:16px;padding:13px;border-radius:11px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.55;cursor:default}
.link{background:none;border:none;color:var(--plum);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:10px 0;margin-top:6px}
.msg{margin-top:12px;font-size:13px;font-weight:700;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;color:var(--bad);background:rgba(194,65,90,.08);border:1px solid rgba(194,65,90,.3)}
.msg.info{display:block;color:var(--plum);background:rgba(90,29,74,.06);border:1px solid var(--line)}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5}
.panelbox{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:20px 16px}
.panelbox .role-ttl{font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:var(--plum);font-weight:400}
.panelbox .role-who{font-size:12.5px;color:var(--muted);margin-top:3px}
.soon{margin-top:16px;font-size:11px;font-weight:800;color:var(--ok);letter-spacing:.06em;text-transform:uppercase}
.soonlist{margin-top:8px;display:flex;flex-direction:column;gap:7px}
.soonlist .it{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--ink);background:rgba(90,29,74,.04);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.soonlist .it .d{color:var(--plum);font-weight:900}
.foot{text-align:center;color:var(--muted);font-size:11px;padding:16px 10px}
.spin{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px}
/* ── Dashboard HK ── */
.dhdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
.dhdr .role-ttl{font-family:'DM Serif Display',Georgia,serif;font-size:21px;color:var(--plum);font-weight:400}
.dhdr .role-who{font-size:11.5px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;margin:14px 0;background:rgba(90,29,74,.06);padding:4px;border-radius:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:0 0 auto;padding:9px 13px;border:none;background:transparent;border-radius:8px;font-weight:800;font-size:12.5px;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.on{background:var(--paper);color:var(--plum);box-shadow:0 1px 3px rgba(90,29,74,.12)}
.day{background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px}
.day.today{border-color:var(--plum);background:linear-gradient(180deg,rgba(90,29,74,.05),var(--paper))}
.drow{display:flex;align-items:center;gap:12px}
.dleft{flex:1;min-width:0}
.ddow{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.ddate{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--plum);line-height:1.05;margin-top:2px}
.dlbl{font-size:10px;color:var(--plum);font-weight:800;margin-top:3px;letter-spacing:.08em}
.dright{display:flex;gap:7px;flex-shrink:0}
.pill{min-width:54px;text-align:center;border-radius:9px;padding:7px 5px;border:1.5px solid}
.pill .pl{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.pill .pv{font-size:19px;font-weight:900;line-height:1.1;margin-top:2px}
.pill.w{border-color:rgba(90,29,74,.5);background:rgba(90,29,74,.07);color:#5a1d4a}
.pill.pg{border-color:rgba(176,128,40,.55);background:rgba(176,128,40,.08);color:#a07820}
.pill.pgz{border-color:rgba(120,75,142,.55);background:rgba(120,75,142,.08);color:#784b8e}
.pill.zero{opacity:.4}
.wcard{background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer}
.wcard:hover{border-color:var(--plum)}
.wtop{display:flex;align-items:center;gap:10px}
.wtop .av{width:34px;height:34px;border-radius:50%;background:rgba(90,29,74,.08);color:var(--plum);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.wtop .nm{font-weight:800;font-size:14.5px;flex:1;min-width:0}
.wtop .prog{font-weight:900;font-size:14px;color:var(--plum);font-variant-numeric:tabular-nums}
.bar{height:7px;border-radius:99px;background:rgba(90,29,74,.1);margin-top:9px;overflow:hidden}
.bar > span{display:block;height:100%;background:var(--ok);border-radius:99px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:11.5px;font-weight:700;padding:4px 8px;border-radius:7px;border:1px solid var(--line);color:var(--ink);background:rgba(90,29,74,.03)}
.chip.done{color:var(--ok);border-color:rgba(15,122,74,.35);background:rgba(15,122,74,.07);text-decoration:line-through;opacity:.85}
.statrow{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.statrow .k{flex:1;font-size:13.5px;font-weight:700}
.statrow .v{font-weight:900;font-size:16px;color:var(--plum);font-variant-numeric:tabular-nums}
.feed{margin-top:4px}
.fitem{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line)}
.fitem .ic{font-weight:900;flex-shrink:0}
.fitem .tm{color:var(--muted);font-size:11px;margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}
.empty{font-size:12.5px;color:var(--muted);text-align:center;padding:22px 10px;background:rgba(90,29,74,.03);border:1px dashed var(--line-strong);border-radius:11px}
</style>

<style>
/* ════════ REDESIGN „cichy luksus" — telefon + komputer (sidebar) ════════ */
:root{
  --serif:'Fraunces',Georgia,serif; --ui:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --plum:#5a1d4a; --plum-2:#7a3a6a; --plum-deep:#3a1230;
  --cream:#f7f1ec; --paper:#fffdfb; --ink:#2a1320; --muted:#9a8290;
  --line:rgba(58,18,48,.12); --line-strong:rgba(58,18,48,.22);
  --gold:#b0863a; --ok:#1f7a52; --bad:#c2415a;
  --shadow:0 1px 2px rgba(58,18,48,.05), 0 14px 32px -18px rgba(58,18,48,.32);
  --r:16px;
}
body{font-family:var(--ui);background:
  radial-gradient(1100px 480px at 100% -10%, rgba(122,58,106,.10), transparent 60%),
  radial-gradient(900px 420px at -10% 0%, rgba(176,134,58,.07), transparent 55%),
  var(--cream);}
.hdr,.foot{display:none!important}
.h2,.role-ttl,.ddate,.kpi .v,.topbar h1,.brand .b1{font-family:var(--serif);font-weight:500;letter-spacing:-.01em}

/* ── Logowanie (wyśrodkowane) ── */
#app.wrap.auth{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 20px}
.wrap.auth::before{content:"CONRAD COMFORT";display:block;text-align:center;font-family:var(--serif);letter-spacing:.24em;color:var(--plum);font-size:15px}
.wrap.auth::after{content:"Panel menedżerski";display:block;text-align:center;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:3px 0 22px}
.wrap.auth .h2{font-size:23px;text-align:center}
.wrap.auth .sub{text-align:center}
.card{border-radius:var(--r);box-shadow:var(--shadow);border-color:var(--line)}
.btn{background:linear-gradient(180deg,var(--plum-2),var(--plum));box-shadow:0 8px 20px -8px rgba(90,29,74,.6);border-radius:13px;letter-spacing:.01em}
.btn:hover{filter:brightness(1.06)}
.inp{border-radius:12px}.inp:focus{box-shadow:0 0 0 3px rgba(90,29,74,.12)}
.remember{display:flex;align-items:center;gap:9px;margin:2px 0 12px;cursor:pointer;user-select:none}
.remember input{width:18px;height:18px;accent-color:var(--plum);cursor:pointer;flex-shrink:0}
.remember span{font-size:13px;color:var(--muted)}

/* ── Pulpit: powłoka ── */
#app.dash{max-width:none;margin:0;padding:0}
.shell{min-height:100vh}
.side{display:none}
.main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:13px 15px;background:rgba(255,253,251,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar h1{font-size:20px;color:var(--plum);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-out{background:rgba(90,29,74,.07);border:1px solid var(--line);color:var(--plum);border-radius:10px;padding:8px 12px;font:700 12.5px var(--ui);cursor:pointer}
.tabs.mob{display:flex;gap:6px;margin:0;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--paper)}
.tabs.mob::-webkit-scrollbar{height:0}
.content{padding:16px 13px 70px;width:100%}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:11px 13px;box-shadow:var(--shadow)}
.kpi .l{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.kpi .v{font-size:25px;color:var(--plum);margin-top:2px;line-height:1}
.kpi .v.ok{color:var(--ok)} .kpi .v.gold{color:var(--gold)}

/* ── Komponenty: szlif ── */
.wcard,.statrow,.day{box-shadow:var(--shadow);border-radius:14px}
.wcard{transition:border-color .15s,box-shadow .15s,transform .08s}
.wcard:hover{box-shadow:0 14px 30px -16px rgba(58,18,48,.4)}
.wtop .av{border-radius:11px;background:linear-gradient(135deg,var(--plum-2),var(--plum));color:#fff}
.pill{border-radius:11px}
.tab.on{box-shadow:0 2px 8px -2px rgba(90,29,74,.25)}
.soon{color:var(--gold)}

/* ════════ KOMPUTER (≥ 920px): sidebar + szeroka treść + siatka ════════ */
@media(min-width:920px){
  .shell{display:grid;grid-template-columns:264px 1fr}
  .side{display:flex;flex-direction:column;gap:16px;padding:22px 16px;color:#fff;position:sticky;top:0;height:100vh;
    background:linear-gradient(170deg,var(--plum) 0%,var(--plum-deep) 100%);box-shadow:inset -1px 0 0 rgba(255,255,255,.06)}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 6px 6px}
  .brand .b1{font-size:14px;letter-spacing:.16em;color:#fff}
  .brand .b2{font-size:9.5px;letter-spacing:.06em;color:rgba(255,255,255,.6);margin-top:2px}
  .me{display:flex;align-items:center;gap:11px;padding:11px;border-radius:13px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
  .me-av{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .me-n{font-weight:800;font-size:14px;color:#fff;line-height:1.2}
  .me-r{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .navbtn{display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;color:rgba(255,255,255,.8);
    border-radius:11px;font:700 13.5px var(--ui);cursor:pointer;text-align:left;transition:background .14s,color .14s}
  .navbtn svg{width:18px;height:18px;flex-shrink:0;opacity:.9}
  .navbtn:hover{background:rgba(255,255,255,.09);color:#fff}
  .navbtn.on{background:rgba(255,255,255,.16);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .side-out{margin-top:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;
    border-radius:11px;padding:11px;font:800 13px var(--ui);cursor:pointer}
  .side-out:hover{background:rgba(255,255,255,.16)}
  .tabs.mob,.top-out{display:none}
  .topbar{padding:18px 30px;background:rgba(247,241,236,.7)}

  .content{padding:24px 30px 70px;max-width:1080px}

}
@media(min-width:1280px){ .content{margin:0 auto} }

.bar>span{transition:width .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--ok),#28a06b)}
.chip{border-radius:8px}

.fitem{padding:9px 0}

.navbtn span{flex:1}
.auth-foot{text-align:center;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:22px;opacity:.8}

.soon::before{content:"";width:14px;height:1.5px;background:var(--gold);border-radius:2px;flex-shrink:0}

function setMsg(text, kind) {

window.submitAuth = async (i, first) => {
  const a = accounts[i];
  if (!a) return;
  const pw = (document.getElementById("pw")||{}).value || "";
  const btn = document.getElementById("goBtn");
  if (first) {
    const pw2 = (document.getElementById("pw2")||{}).value || "";
    if (pw.length < 6) return setMsg("Hasło musi mieć min. 6 znaków.", "err");
    if (pw !== pw2)   return setMsg("Hasła nie są takie same.", "err");
  } else if (!pw) {
    return setMsg("Wpisz hasło.", "err");
  }
  if (btn) { btn.disabled = true; btn.textContent = "Chwila…"; }
  setMsg("", "");
  const code = (document.getElementById("ccode")||{}).value || "";
  try {
    if (first) {
      // Kod jednorazowy (jeśli wymagany) — weryfikacja PRZED utworzeniem konta.
      if (a.requires_code) {
        const { data: ok } = await sb.rpc("precheck_claim", { p_email: a.email, p_code: code });
        if (!ok) throw new Error("Nieprawidłowy kod od administratora.");
      }
      // Pierwsze logowanie: utwórz konto Auth z wybranym hasłem, potem zwiąż ze spisem.
      const { error: suErr } = await sb.auth.signUp({ email: a.email, password: pw });
      if (suErr) {
        // Konto już istnieje (np. ktoś przejął) → spróbuj normalnego logowania.
        const { error: siErr } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
        if (siErr) throw new Error("To konto jest już aktywne. Jeśli to Ty — zaloguj się swoim hasłem; jeśli nie pamiętasz, poproś admina o reset.");
      } else {
        await sb.rpc("claim_account", { p_email: a.email, p_code: code });
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email: a.email, password: pw });
      if (error) throw new Error("Błędne hasło.");
    }
    await showPanelFromSession();
  } catch (e) {
    setMsg((e && e.message) || "Nie udało się zalogować.", "err");
    if (btn) { btn.disabled = false; btn.textContent = first ? "Ustaw hasło i wejdź" : "Zaloguj"; }
  }
};

let CURRENT = { role: null, name: "" };

async function showPanelFromSession() {
  app.innerHTML = '<div class="spin">Wczytywanie panelu…</div>';
  let role = null, name = "";
  let { data: { user } } = await sb.auth.getUser();
  // PWA z ekranu głównego: sesja bywa wczytana z localStorage z wygasłym tokenem —
  // odśwież i ponów, zanim uznamy brak roli za błąd.
  if (!user || !user.email) {
    try { await sb.auth.refreshSession(); } catch(_) {}
    ({ data: { user } } = await sb.auth.getUser());
  }
  if (!user || !user.email) {
    // Brak ważnej sesji → wróć do logowania zamiast martwego ekranu.
    try { await sb.auth.signOut(); } catch(_) {}
    logoutBtn.style.display = "none";
    return showLogin();
  }
  let { data: roleData } = await sb.rpc("current_app_role");
  role = roleData || null;
  let { data: me } = await sb.from("app_accounts").select("name,role").eq("email", user.email).maybeSingle();
  if (me) { name = me.name; if (!role) role = me.role; }
  // Jeszcze brak roli? Token mógł dopiero co dojść — odśwież sesję i spróbuj raz jeszcze.
  if (!role) {
    try { await sb.auth.refreshSession(); } catch(_) {}
    ({ data: roleData } = await sb.rpc("current_app_role"));
    role = roleData || null;
    ({ data: me } = await sb.from("app_accounts").select("name,role").eq("email", user.email).maybeSingle());
    if (me) { name = me.name || name; if (!role) role = me.role; }
  }
  logoutBtn.style.display = "";
  if (!role) {
    app.innerHTML = `<div class="card"><div class="msg err" style="display:block">Twoje konto nie ma jeszcze przypisanej roli. Skontaktuj się z adminem.</div></div>`;
    return;
  }
  CURRENT = { role, name };
  // Admin: pełny pulpit + Konta. Gastro: własny zestaw (Grafik/Zadania/Akcje).
  // Pozostałe role dziedziczą widok HK.
  renderHkDashboard(role, name);
}

// ── Wyjazdy (logika 1:1 z wyjazdy.html: W/WP + PG + PGZ na 3 dni) ──
function countTypes(plan) {
  const data = plan || {};
  const pmRoomTypes = data.pm_room_types || {};
  // Wyjazdy liczymy WYLACZNIE po statusie W/WP z pm_room_types (lustro recepcji,
  // ta sama liczba co panel HK). assignments zawiera tez pobyty PG/PGZ rozpisane
  // sprzataczkom — wrzucenie ich do licznika zawyzalo wyjazdy (14+3 zamiast 12).
  const typedW = []; let pg=0, pgz=0;
  if (pmRoomTypes && typeof pmRoomTypes === "object") {
    Object.entries(pmRoomTypes).forEach(([no,v]) => {
      if (v==="W"||v==="WP") typedW.push(String(no)); else if (v==="PG") pg++; else if (v==="PGZ") pgz++;
    });
  }
  const allW = [...new Set(typedW)];
  const apt = allW.filter(no => APT_ROOMS.includes(no)).length;
  return { w:{ total:allW.length, reg:allW.length-apt, apt }, pg, pgz };
}
const fmtWP = (reg, apt) => apt ? `${reg}+${apt} APT` : `${reg}`;

const WYJAZDY_DAYS = 7; // raport tygodniowy = 7 dziennych "Wykazow" → menedzer widzi 7 kolejnych dni
async function loadWyjazdy() {
  const range = Array.from({length:WYJAZDY_DAYS}, (_,i) => { const t=new Date(); t.setHours(0,0,0,0); return isoDate(new Date(t.getTime()+i*86400000)); });
  WYJAZDY_RANGE = range;
  const last = range[range.length-1];
  try {
    const [pl, ro] = await Promise.all([
      sb.from("hk_plan").select("date,assignments,pm_room_types").gte("date",range[0]).lte("date",last),
      sb.from("hk_roster").select("date,roster").gte("date",range[0]).lte("date",last),
    ]);
    WY_PLAN = {}; (pl.data||[]).forEach(r => { WY_PLAN[r.date] = { assignments:r.assignments||{}, pm_room_types:r.pm_room_types||{} }; });
    ROSTER  = {}; (ro.data||[]).forEach(r => { ROSTER[r.date] = Array.isArray(r.roster) ? r.roster : []; });
  } catch { return body('<div class="empty">Nie udało się pobrać planu.</div>'); }
  // Korelacja z grafikiem: kto z dyspozycyjności może w danym dniu (HK).
  AVAIL_BY_DATE = {};
  try {
    const { data: reqs } = await sb.rpc("list_availability_requests");
    if (reqs && reqs.length) {
      const { data: grid } = await sb.rpc("get_request_grid", { p_request_id: reqs[0].id });
      (grid||[]).forEach(r => {
        if (r.date && r.choice && r.choice!=="off" && (r.kind==="hk" || !r.kind))
          (AVAIL_BY_DATE[r.date] = AVAIL_BY_DATE[r.date] || {})[r.person] = r.choice;

    }
  } catch {}
  renderWyjazdy();
}

window.rosterAdd = (iso) => {
  const inp = document.getElementById("radd-"+iso); const v = (inp && inp.value || "").trim();
  if (!v) return;
  (ROSTER[iso] = ROSTER[iso] || []).push({ name:_cap(v), role: ROSTER[iso].length===0 ? "dyzur" : "poranna" });
  renderWyjazdy(); setTimeout(()=>{ const n=document.getElementById("radd-"+iso); if(n) n.focus(); }, 30);
};
window.rosterQuickAdd = (iso, name, choice) => {
  const role = choice === "popoludnie" ? "popoludnie" : (choice === "dyzur" ? "dyzur" : "poranna");
  ROSTER[iso] = ROSTER[iso] || [];
  if (!ROSTER[iso].some(w => w.name === name)) ROSTER[iso].push({ name, role });
  renderWyjazdy();
};
window.rosterRemove = (iso, idx) => { if (ROSTER[iso]) { ROSTER[iso].splice(idx,1); renderWyjazdy(); } };
window.rosterRole = (iso, idx, role) => { if (ROSTER[iso] && ROSTER[iso][idx]) ROSTER[iso][idx].role = role; };
// Ile pokoi kierownik chce rozpisać tej osobie (np. "Natalia 7 pokoi" z wiadomości HK).
window.rosterRooms = (iso, idx, val) => {
  if (!(ROSTER[iso] && ROSTER[iso][idx])) return;
  const n = parseInt(val,10);
  if (val==="" || isNaN(n) || n<0) delete ROSTER[iso][idx].rooms; else ROSTER[iso][idx].rooms = n;
  renderWyjazdy();
};
window.rosterSave = async (iso, btn) => {

  try {
    const { error } = await sb.from("hk_roster").upsert({ tenant_id:TENANT_ID, date:iso, roster:ROSTER[iso]||[], updated_at:new Date().toISOString() }, { onConflict:"tenant_id,date" });

    try { await sb.rpc("log_action", { p_action:"obsada_zapis", p_detail:`${iso} (${(ROSTER[iso]||[]).length} os.)` }); } catch {}

};

// ── Na żywo: kto robi jaki pokój (hk_rooms dzisiaj) + feed zdarzeń (hk_logs) ──
const FEED_ICON = { start:"▶", done:"✓", skip:"✕", vacate:"🔔", task_done:"☑" };
const FEED_COLOR = { start:"#2563eb", done:"#1f7a52", skip:"#b0863a", vacate:"#7a3a6a", task_done:"#1f7a52" };
function feedText(l){
  const a = l.action;
  if (a==="start")  return `${l.worker||"?"} zaczyna pokój ${l.room||""}`;
  if (a==="done")   return `${l.worker||"?"} skończyła pokój ${l.room||""}`;
  if (a==="skip")   return `${l.worker||"?"} — goście nie chcieli (${l.room||""})`;
  if (a==="vacate") return `Recepcja: pokój ${l.room||""} pusty`;
  if (a==="task_done") return `${l.worker||"?"}: zadanie — ${l.extra||""}`;
  return l.extra || `${l.worker||"?"}: ${a||""}`;
}

let LIVE_DATA = { byWorker:{}, today:"" };
async function loadLive() {
  const today = isoDate(new Date());
  const paint = async () => {
    let rooms = [], logs = [], roster = [], roomTypes = {};
    try {
      const [r1, r2, r3, r4] = await Promise.all([
        sb.from("hk_rooms").select("room,worker,status,vacated").eq("date", today),
        sb.from("hk_logs").select("action,worker,room,extra,log_time,created_at").eq("date", today).order("created_at", { ascending:false }).limit(14),
        sb.from("hk_roster").select("roster").eq("tenant_id", TENANT_ID).eq("date", today).maybeSingle(),
        sb.from("hk_plan").select("pm_room_types").eq("date", today).maybeSingle(),
      ]);
      rooms = r1.data || []; logs = r2.data || [];
      roster = (r3.data && Array.isArray(r3.data.roster)) ? r3.data.roster : [];
      roomTypes = (r4.data && r4.data.pm_room_types) || {};
    } catch { body('<div class="empty">Brak połączenia z danymi HK.</div>'); return; }
    const byWorker = {};
    // Wszyscy z obsady dnia (też bez pokoi).
    roster.forEach(p => { const w=(p && p.name) || (typeof p==="string"?p:null); if(w) byWorker[w]=byWorker[w]||{rooms:[],done:0,role:(p&&p.role)||""}; });
    // Pokoje do sprzątania z hk_rooms (przypisanie jak w programie); pomijamy POBYTY PG/PGZ.
    // Typ pokoju (wyjazd vs pobyt) bierzemy z hk_plan.pm_room_types — synchronizowanego
    // z planem maila przez aplikację. W hk_rooms.status jest tylko stan pracy
    // (W=czeka / czyszczenie / czyste), NIE typ pokoju — dlatego dawny filtr po status nic nie odcinał.
    rooms.forEach(r => {
      const type = String(roomTypes[r.room]||"").toUpperCase();
      if (type === "PG" || type === "PGZ") return;
      const w = r.worker; if (!w) return;
      byWorker[w] = byWorker[w] || { rooms:[], done:0, role:"" };
      if (byWorker[w].rooms.some(x => x.room === r.room)) return;
      const done = DONE_STATES.has(String(r.status||"").toLowerCase());
      byWorker[w].rooms.push({ room:r.room, done, vacated:!!r.vacated });
      if (done) byWorker[w].done++;
    });
    LIVE_DATA = { byWorker, today };
    const workers = Object.entries(byWorker).filter(([w]) => w && w!=="—").sort((a,b)=>a[0].localeCompare(b[0],"pl"));
    let html;
    if (!workers.length) {
      html = '<div class="empty">Dziś nikt nie ma jeszcze obsady ani przypisanych pokoi.</div>';
    } else {
      html = workers.map(([w, d]) => {
        const total = d.rooms.length, pct = total ? Math.round(d.done/total*100) : 0;
        const role = d.role ? ` <span style="font-size:11px;color:var(--muted);font-weight:600">${esc(d.role)}</span>` : "";
        const vac = d.rooms.filter(r=>r.vacated && !r.done).length;
        const vacB = vac ? ` <span style="font-size:10px;font-weight:800;color:#a07820;background:rgba(176,134,58,.12);border:1px solid rgba(176,134,58,.35);border-radius:99px;padding:1px 7px">🔔 ${vac} pusty</span>` : "";
        return `<div class="wcard" onclick="showLiveWorker('${esc(w).replace(/'/g,"\\'")}')">
          <div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}${role}${vacB}</span><span class="prog">${d.done}/${total}</span></div>
          <div class="bar"><span style="width:${pct}%"></span></div></div>`;
      }).join("");
    }
    let kpis = "";
    if (workers.length) {
      let tot=0, don=0; workers.forEach(([,d])=>{ tot+=d.rooms.length; don+=d.done; });
      const pct = tot ? Math.round(don/tot*100) : 0;
      kpis = `<div class="kpis">
        <div class="kpi"><div class="l">Pokoje dziś</div><div class="v">${tot}</div></div>
        <div class="kpi"><div class="l">Zrobione</div><div class="v ok">${don}</div></div>
        <div class="kpi"><div class="l">Postęp</div><div class="v gold">${pct}%</div></div>
        <div class="kpi"><div class="l">Ekipa</div><div class="v">${workers.length}</div></div>
      </div>`;
    }
    const feed = logs.length ? `<div class="soon" style="margin-top:18px">Ostatnie zdarzenia</div><div class="feed">${
      logs.map(l => { const t = l.log_time || (l.created_at?new Date(l.created_at).toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}):"");
        return `<div class="fitem"><span class="ic" style="color:${FEED_COLOR[l.action]||"var(--muted)"}">${FEED_ICON[l.action]||"·"}</span><span>${esc(feedText(l))}</span><span class="tm">${esc(t)}</span></div>`; }).join("")
    }</div>` : "";
    const head = `<div class="fullspan" style="margin-bottom:12px">
      <button class="rost-addbtn" style="width:100%;padding:11px;border-radius:11px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:13px;cursor:pointer" onclick="showHkReminders()">🔔 Przypomnienia dla ekipy HK</button>
    </div>`;
    body(head + kpis + `<div class="note" style="margin-top:0;margin-bottom:8px">Kliknij osobę, by zobaczyć jej pokoje i czasy.</div>` + html + feed);
  };
  await paint();
  liveTimer = setInterval(() => { if (hkTab==="live") paint(); else stopLive(); }, 5000);
}

// Szczegóły osoby: pokoje + ile/średni czas + ile już robi bieżący pokój.
window.showLiveWorker = async (w) => {
  stopLive();
  body('<div class="spin">Wczytywanie…</div>');
  const today = isoDate(new Date());
  let logs = [];
  try { const { data } = await sb.from("hk_logs").select("action,worker,room,created_at").eq("date", today).eq("worker", w).order("created_at"); logs = data || []; }
  catch {}
  const d = (LIVE_DATA.byWorker||{})[w] || { rooms:[], done:0 };
  const starts = {}, durs = [], elapsed = {};
  logs.filter(l=>l.created_at).forEach(l => {
    if (l.action==="start") starts[l.room] = new Date(l.created_at).getTime();
    else if (l.action==="done" && starts[l.room]) { const m=(new Date(l.created_at).getTime()-starts[l.room])/60000; if(m>0&&m<300) durs.push(m); delete starts[l.room]; }
  });
  Object.entries(starts).forEach(([room,ts]) => { elapsed[room] = Math.round((Date.now()-ts)/60000); });
  const avg = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;
  const roomsSorted = d.rooms.slice().sort((a,b)=>String(a.room).localeCompare(String(b.room),"pl",{numeric:true}));
  const list = roomsSorted.length ? roomsSorted.map(r => {
    const el = elapsed[r.room];
    const status = r.done ? `<span class="chip done">gotowe</span>`
      : (el!=null ? `<span class="chip" style="color:var(--gold);border-color:rgba(176,134,58,.4)">w trakcie · ${el} min</span>`
      : (r.vacated ? `<span class="chip" style="color:#a07820;border-color:rgba(176,134,58,.45);background:rgba(176,134,58,.1)">🔔 pusty — do sprzątania</span>`
      : `<span class="chip">do zrobienia</span>`));
    return `<div class="statrow"><span class="k">Pokój ${esc(r.room)}</span>${status}</div>`;
  }).join("") : '<div class="empty">Brak przypisanych pokoi.</div>';
  body(`<button class="link" onclick="setHkTab('live')">‹ Wróć do listy</button>
    <div class="panelbox">
      <div class="role-ttl" style="font-size:20px">${esc(w)}</div>
      <div class="role-who">Dziś: ${d.done}/${d.rooms.length} pokoi${avg!=null?` · średnio ${avg} min/pokój`:""}</div>
      <div style="margin-top:12px">${list}</div>
      <div class="note">Czasy ze zdarzeń start→koniec. Widoczne tylko dla kierownika.</div>
    </div>`);
};

// ── Statystyki: ostatnie 7 dni (pokoje sprzątnięte wg osoby + usterki zgłoszone z HK) ──
async function loadStats() {
  const role = CURRENT.role, isHKonly = role === "mgr_hk";
  const showHK = true, showRecep = !isHKonly;
  const showKons = role==="mgr_glowny"||role==="mgr_operacyjny"||role==="admin";
  const showOpinie = !isHKonly;
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate()-6);
  const fromKey = isoDate(from), toKey = isoDate(today);
  const fromIso = new Date(fromKey+"T00:00:00").toISOString(), toIso = new Date(toKey+"T23:59:59").toISOString();
  body('<div class="spin">Wczytywanie…</div>');
  let hkRes, recRes, konRes, revRes, recRoster;
  try {
    [hkRes, recRes, recRoster, konRes, revRes] = await Promise.all([
      showHK ? Promise.all([
        sb.from("hk_rooms").select("status,worker,date").gte("date",fromKey).lte("date",toKey),
        sb.from("faults").select("source,status,reported_by,reported_at").eq("source","hk").gte("reported_at",fromIso).lte("reported_at",toIso),
      ]) : Promise.resolve(null),
      showRecep ? sb.from("shift_reports").select("employee,day_key,tasks_done").eq("tenant_id",TENANT_ID).gte("day_key",fromKey).lte("day_key",toKey) : Promise.resolve(null),
      showRecep ? getMirror("employees") : Promise.resolve(null),  // pełny rejestr recepcji (nawet bez zamkniętych zmian)
      showKons ? sb.from("faults").select("assigned_to,status,reported_at").eq("tenant_id",TENANT_ID).gte("reported_at",fromIso).lte("reported_at",toIso) : Promise.resolve(null),
      showOpinie ? sb.from("booking_reviews").select("guest,rating,text_pos,text_neg,review_date").eq("tenant_id",TENANT_ID).order("review_date",{ascending:false}).limit(20) : Promise.resolve(null),
    ]);
  } catch { return body('<div class="empty">Nie udało się pobrać statystyk.</div>'); }
  let html = `<div class="note" style="margin-top:0;margin-bottom:6px">Ostatnie 7 dni (${fromKey} – ${toKey}). Każdy dział osobno.</div>`;
  // ── Housekeeping ──
  if (showHK && hkRes) {
    const rooms = hkRes[0].data||[], faults = hkRes[1].data||[];
    const pw = {};
    rooms.forEach(r => { const w=r.worker; if(!w) return; pw[w]=pw[w]||{sprzatniete:0,zgloszone:0}; if(DONE_STATES.has(String(r.status||"").toLowerCase())) pw[w].sprzatniete++; });
    faults.forEach(f => { const w=f.reported_by; if(!w) return; pw[w]=pw[w]||{sprzatniete:0,zgloszone:0}; pw[w].zgloszone++; });
    STATS_CACHE = pw;
    const list = Object.entries(pw).sort((a,b)=>b[1].sprzatniete-a[1].sprzatniete);
    html += `<div class="soon">Housekeeping</div>` + (list.length ? list.map(([w,s])=>`
      <div class="wcard" onclick="showWorker('${esc(w).replace(/'/g,"\\'")}')">
        <div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}</span><span class="prog">${s.sprzatniete}</span></div>
        <div class="chips"><span class="chip">${s.sprzatniete} pokoi</span><span class="chip">${s.zgloszone} usterek</span></div></div>`).join("") : '<div class="empty">Brak danych HK.</div>');
  }
  // ── Recepcja ──
  if (showRecep && (recRes || recRoster)) {
    const pe = {};
    if (Array.isArray(recRoster)) recRoster.forEach(n => { if (n) pe[n] = pe[n] || {zmiany:0,zadania:0}; }); // cały zespół recepcji
    (recRes && recRes.data || []).forEach(r => { const e=r.employee||"—"; pe[e]=pe[e]||{zmiany:0,zadania:0}; pe[e].zmiany++; pe[e].zadania+=r.tasks_done||0; });
    const list = Object.entries(pe).sort((a,b)=>b[1].zmiany-a[1].zmiany);
    html += `<div class="soon">Recepcja</div>` + (list.length ? list.map(([e,s])=>`
      <div class="wcard" style="cursor:default"><div class="wtop"><span class="av">${esc(initials(e))}</span><span class="nm">${esc(e)}</span><span class="prog">${s.zmiany}</span></div>
        <div class="chips"><span class="chip">${s.zmiany} zmian</span><span class="chip">${s.zadania} zadań</span></div></div>`).join("") : '<div class="empty">Brak danych recepcji (zamknięte zmiany).</div>');
  }
  // ── Konserwatorzy ──
  if (showKons && konRes) {
    const pk = {};
    (konRes.data||[]).forEach(f => { const w=(f.assigned_to||"").trim(); if(!w) return; pk[w]=pk[w]||{open:0,prog:0,done:0}; const st=f.status||"open"; if(st==="done")pk[w].done++; else if(st==="in_progress")pk[w].prog++; else pk[w].open++; });
    const list = Object.entries(pk).sort((a,b)=>(b[1].open+b[1].prog)-(a[1].open+a[1].prog));
    html += `<div class="soon">Konserwatorzy</div>` + (list.length ? list.map(([w,s])=>`
      <div class="wcard" style="cursor:default"><div class="wtop"><span class="av">${esc(initials(w))}</span><span class="nm">${esc(w)}</span><span class="prog">${s.done}</span></div>
        <div class="chips"><span class="chip">${s.open} otwarte</span><span class="chip">${s.prog} w toku</span><span class="chip" style="color:var(--ok)">${s.done} naprawione</span></div></div>`).join("") : '<div class="empty">Brak danych.</div>');
  }
  // ── Opinie gości (Booking) — recepcja widzi przez raporty ──
  if (showOpinie && revRes) {
    const rows = revRes.data||[];
    html += `<div class="soon">Opinie gości (Booking)</div>` + (rows.length ? rows.map(r=>{
      const rating = r.rating!=null ? Number(r.rating).toFixed(1) : "—";
      const txt = [r.text_pos, r.text_neg].filter(Boolean).join(" · ");
      const col = rating>=8?"var(--ok)":rating>=6?"var(--gold)":"var(--bad)";
      return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:3px">
        <div style="display:flex;width:100%;align-items:center;gap:8px"><span class="k" style="flex:1">${esc(r.guest||"Gość")}</span><span class="v" style="color:${col}">${rating}</span></div>
        ${txt?`<div style="font-size:12.5px;color:var(--muted)">${esc(txt.slice(0,200))}</div>`:""}</div>`;
    }).join("") : '<div class="empty">Brak opinii.</div>');
  }
  body(html);
}

let STATS_CACHE = {};
let WORKER_CTX = null;

// Tempo pracy — liczone z hk_logs (start→done), zwracane jako ETYKIETA (bez minut).
// Czas jest mierzony, ale konkretne minuty celowo nie są nigdzie pokazywane.
async function workerPaceLabel(worker){
  const today=new Date(), from=new Date(today); from.setDate(today.getDate()-6);
  const fk=isoDate(from), tk=isoDate(today);
  let logs=[];
  try { const { data } = await sb.from("hk_logs").select("action,worker,room,created_at,date").eq("worker",worker).gte("date",fk).lte("date",tk); logs=data||[]; }
  catch { return "brak danych"; }
  const starts={}, durs=[];
  logs.filter(l=>l.created_at).sort((a,b)=>String(a.created_at).localeCompare(String(b.created_at))).forEach(l=>{
    if (l.action==="start") starts[l.room]=new Date(l.created_at).getTime();
    else if (l.action==="done" && starts[l.room]){ const m=(new Date(l.created_at).getTime()-starts[l.room])/60000; if(m>2&&m<240) durs.push(m); delete starts[l.room]; }
  });
  if (!durs.length) return "brak danych";
  const avg=durs.reduce((a,b)=>a+b,0)/durs.length;
  return avg<25 ? "sprawne tempo" : avg<=40 ? "równe tempo" : "dokładne, spokojne tempo";
}
// Najbliższa dyspozycyjność z ostatniego zebranego grafiku.
async function workerAvailabilityText(worker){
  try {
    const { data:reqs } = await sb.rpc("list_availability_requests");
    if (!reqs || !reqs.length) return "";
    const { data:grid } = await sb.rpc("get_request_grid", { p_request_id: reqs[0].id });
    const today=isoDate(new Date());
    const ch={dzien:"dzień",popoludnie:"popoł.",poranna:"poranna",popoludniowa:"popoł.",nocna:"nocna"};
    const mine=(grid||[]).filter(r=>r.person===worker && r.date && r.choice && r.choice!=="off" && r.date>=today)
      .sort((a,b)=>a.date.localeCompare(b.date)).slice(0,7);
    return mine.map(r=>{ const [,m,d]=r.date.split("-"); return `${d}.${m} ${ch[r.choice]||r.choice}`; }).join(", ");
  } catch { return ""; }
}

const zl = v => (v==null||isNaN(v)) ? "—" : Number(v).toLocaleString("pl-PL",{minimumFractionDigits:2,maximumFractionDigits:2})+" zł";
let kasaFull = false;
window.toggleKasaFull = () => { kasaFull = !kasaFull; loadKasa(); };
async function loadKasa() {
  const today = new Date(); const from = new Date(today); from.setDate(today.getDate() - (kasaFull ? 89 : 6));
  const fromKey = isoDate(from), toKey = isoDate(today);
  const toggle = `<button class="rost-addbtn fullspan" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px" onclick="toggleKasaFull()">${kasaFull ? "Pokaż ostatnie 7 dni" : "Pokaż pełną historię (90 dni)"}</button>`;
  let rows = [];
  try {
    const { data } = await sb.from("shift_reports").select("day_key,shift_key,employee,cash_closing,safe_total,cash_current,saved_at")
      .eq("tenant_id", TENANT_ID).gte("day_key", fromKey).lte("day_key", toKey).order("saved_at", { ascending:false }).limit(300);
    rows = data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać stanu kasy.</div>'); }
  let cashHtml;

    cashHtml = `<div class="empty">Brak raportów kasy${kasaFull?"":" z ostatnich 7 dni"}. Pojawią się, gdy recepcja zamknie zmianę.</div>`;
  } else {
    const byDay = {};
    rows.forEach(r => { (byDay[r.day_key] = byDay[r.day_key] || []).push(r); });
    const days = Object.keys(byDay).sort().reverse();
    cashHtml = days.map(dk => {
      const d = fmtDate(dk);
      const items = byDay[dk].map(r => `
        <div class="statrow" style="margin-bottom:6px">
          <div class="k">
            <div>${esc(SHIFT_LBL[r.shift_key]||r.shift_key||"")} · ${esc(r.employee||"—")}</div>
            <div style="font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px">
              Kasa: ${zl(r.cash_current)} · KW: ${zl(r.cash_closing)}</div>
          </div>
          <div class="v" title="Sejf">${zl(r.safe_total)}</div>
        </div>`).join("");
      return `<div style="margin-bottom:14px"><div class="soon" style="margin-top:0">${d.dow}, ${d.txt}</div>${items}</div>`;
    }).join("");
  }
  // Korekty płatności + raporty zmian — z mirrora aplikacji recepcji (panel_mirror).
  const [corr, rf] = await Promise.all([getMirror("payment_corrections"), getMirror("reports_full")]);
  const inRange = k => { const dk=String(k||"").slice(0,10); return dk>=fromKey && dk<=toKey; };
  let corrHtml = "";
  if (Array.isArray(corr)) {
    const list = corr.filter(c => inRange(c.dateKey||c.date||c.createdAt||c.savedAt)).slice(0,80);
    if (list.length) corrHtml = `<div class="soon">Korekty płatności</div>` + list.map(c => {
      const who = esc(c.employee||c.name||"—"); const am = Number(c.amount);
      const when = String(c.dateKey||c.date||c.createdAt||c.savedAt||"").slice(0,10);
      const reason = esc(c.reason||c.note||c.powod||"");
      return `<div class="statrow"><div class="k"><div>${who}${reason?` — <span style="color:var(--muted);font-weight:600">${reason}</span>`:""}</div>${when?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(when)}</div>`:""}</div><div class="v" style="color:${am<0?"var(--bad)":"var(--ok)"}">${zl(am)}</div></div>`;
    }).join("");
  }
  let rfHtml = "";
  if (Array.isArray(rf)) {
    const byDk = {}; rf.forEach(r => { const dk=String(r.dayKey||r.day_key||r.savedAt||"").slice(0,10); if(inRange(dk)) (byDk[dk]=byDk[dk]||[]).push(r); });
    const dks = Object.keys(byDk).sort().reverse().slice(0,7);
    if (dks.length) rfHtml = `<div class="soon">Raporty zmian (źródło raportu dobowego)</div>` + dks.map(dk => {
      const d=fmtDate(dk);
      const items=byDk[dk].map(r=>`<div style="font-size:12.5px;color:var(--ink);padding:2px 0">• ${esc(SHIFT_LBL[r.shiftKey||r.shift_key]||r.shiftKey||r.shift_key||"")} — ${esc(r.employee||r.employeeName||"—")}</div>`).join("");
      return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:2px"><div style="font-weight:800;font-size:13px">${d.dow}, ${d.txt}</div>${items}</div>`;
    }).join("");
  }
  body(toggle + `<div class="note fullspan" style="margin-top:0;margin-bottom:10px">Stan kasy${kasaFull?" (pełna historia)":" — ostatnie 7 dni"}. Po prawej: kwota w sejfie.</div>` + cashHtml + corrHtml + rfHtml);
}

window.gPeriodChanged = () => {

window.genGrafik = async () => {

};
window.copyLink = (token, el) => {

window.regenLink = async (token, reqId) => {

window.delGrafik = async (reqId, btn) => {

let GRID_ROWS = [], GRID_REQ = null, gridView = "grid";
window.openGrid = async (reqId) => {
  body('<div class="spin">Wczytywanie odpowiedzi…</div>');
  try { const { data } = await sb.rpc("get_request_grid", { p_request_id: reqId }); GRID_ROWS = data || []; GRID_REQ = reqId; }
  catch { return body('<div class="empty">Nie udało się pobrać odpowiedzi.</div>'); }
  gridView = "grid"; renderGrid();
};
window.setGridView = (v) => { gridView = v; renderGrid(); };
function renderGrid() {
  const rows = GRID_ROWS, reqId = GRID_REQ;
  const persons = [...new Set(rows.map(r => r.person))].sort((a,b)=>a.localeCompare(b,"pl"));
  const dates = [...new Set(rows.filter(r=>r.date).map(r => r.date))].sort();
  const byPD = {}; rows.forEach(r => { if(r.date) byPD[r.person+"|"+r.date] = r.choice; });
  const tokenOf = {}; rows.forEach(r => { if(r.token && !tokenOf[r.person]) tokenOf[r.person] = r.token; });
  const av = (p,d) => { const c = byPD[p+"|"+d]; return c && c !== "off" ? c : null; };
  let html = `<button class="link" onclick="setHkTab('grafik')">‹ Wróć do grafików</button>`;
  html += `<div class="soon">Linki indywidualne</div>` + persons.map(pn => {
    const tok = tokenOf[pn] || "";
    return `<div class="statrow" style="gap:8px">
      <div class="k"><div>${esc(pn)}</div><div style="font-size:13px;font-weight:900;color:var(--plum);letter-spacing:.1em;margin-top:2px">kod: ${esc(tok)}</div></div>
      <button class="rost-addbtn" style="padding:7px 10px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:11.5px;cursor:pointer" onclick="copyLink('${esc(tok)}', this)">Kopiuj</button>
      <button class="rost-addbtn" style="padding:7px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:11.5px;cursor:pointer" onclick="regenLink('${esc(tok)}','${esc(reqId)}')">Odśwież</button>
    </div>`;
  }).join("");
  if (!dates.length) { html += '<div class="empty">Nikt jeszcze nie odpowiedział.</div>'; return body(html); }
  const vbtn = (v,l)=>`<button class="tab ${gridView===v?"on":""}" style="flex:0 0 auto" onclick="setGridView('${v}')">${l}</button>`;
  html += `<div class="tabs" style="margin:14px 0 8px">${vbtn("grid","Siatka")}${vbtn("summary","Podsumowanie dni")}${vbtn("person","Per osoba")}</div>`;
  const legend = Object.entries(CHOICE_ABBR).map(([k,a])=>`<span style="color:${a[1]};font-weight:800">${a[0]}</span> ${k}`).join(" · ");
  if (gridView === "grid") {
    const head = `<th style="text-align:left;padding:6px 8px;position:sticky;left:0;background:var(--cream)">Osoba</th>` +
      dates.map(d => { const [,m,dd]=d.split("-"); return `<th style="padding:6px 6px;font-size:11px;color:var(--muted)">${dd}.${m}</th>`; }).join("");
    const bodyRows = persons.map(p => {
      const cells = dates.map(d => { const c = byPD[p+"|"+d]; const a = CHOICE_ABBR[c];
        return `<td style="text-align:center;padding:5px 6px">${a?`<span style="display:inline-block;min-width:22px;font-weight:900;font-size:12px;color:${a[1]}">${a[0]}</span>`:`<span style="color:var(--line-strong)">·</span>`}</td>`; }).join("");
      return `<tr><td style="padding:6px 8px;font-weight:700;font-size:13px;position:sticky;left:0;background:var(--paper);border-right:1px solid var(--line)">${esc(p)}</td>${cells}</tr>`;
    }).join("");
    html += `<div class="note" style="margin-top:0">Legenda: ${legend}</div>
      <div class="fullspan" style="overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--paper);margin-top:8px">
        <table style="border-collapse:collapse;min-width:100%"><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
  } else if (gridView === "summary") {
    html += dates.map(d => {
      const avail = persons.filter(p => av(p,d)); const [,m,dd]=d.split("-");
      return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;width:100%;align-items:center;gap:8px"><span class="k" style="flex:1">${dd}.${m}</span><span class="v">${avail.length}</span></div>
        ${avail.length?`<div class="chips">${avail.map(p=>{const a=CHOICE_ABBR[byPD[p+"|"+d]];return `<span class="chip">${esc(p)} <b style="color:${a?a[1]:"inherit"}">${a?a[0]:""}</b></span>`;}).join("")}</div>`:`<div style="font-size:12px;color:var(--muted)">nikt nie może</div>`}
      </div>`;
    }).join("");
  } else {
    html += persons.map(p => {
      const days = dates.filter(d => av(p,d));
      return `<div class="wcard" style="cursor:default"><div class="wtop"><span class="av">${esc(initials(p))}</span><span class="nm">${esc(p)}</span><span class="prog">${days.length}</span></div>
        <div class="chips">${days.length?days.map(d=>{const [,m,dd]=d.split("-");const a=CHOICE_ABBR[byPD[p+"|"+d]];return `<span class="chip">${dd}.${m} <b style="color:${a?a[1]:"inherit"}">${a?a[0]:""}</b></span>`;}).join(""):'<span style="font-size:12px;color:var(--muted)">brak dyspozycyjności</span>'}</div></div>`;
    }).join("");
  }
  body(html);
}

// ── Konserwatorzy: obciążenie (usterki) + dodawanie zadań (insert faults → push przez webhook) ──
const KONSERW_BASE = ["Grzegorz","Kamil"];
const FSTATUS = { open:"otwarta", in_progress:"w toku", done:"naprawiona" };
async function loadKonserw() {
  let faults = [];
  try {
    const { data } = await sb.from("faults")
      .select("id,description,assigned_to,status,priority,space_id,room,reported_at,reported_by")
      .eq("tenant_id", TENANT_ID).in("status", ["open","in_progress"])
      .order("reported_at", { ascending:false }).limit(200);
    faults = data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać usterek.</div>'); }
  const names = [...new Set([...KONSERW_BASE, ...faults.map(f => (f.assigned_to||"").trim()).filter(Boolean)])];
  const opts = `<option value="__both__">Obaj (${esc(KONSERW_BASE.join(" + "))})</option>` + names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");
  const form = `
    <div class="card" style="margin-bottom:12px">
      <div class="soon" style="margin-top:0">Dodaj zadanie konserwatorowi</div>
      <div class="field"><label>Opis zadania / usterki</label>
        <input id="kDesc" class="inp" placeholder="np. Cieknący kran w 312"/></div>
      <div class="field"><label>Przypisz do</label><select id="kWho" class="inp">${opts}</select></div>
      <div class="field"><label>Miejsce (opcjonalnie)</label><input id="kLoc" class="inp" placeholder="np. 312 / parter / recepcja"/></div>
      <div class="field"><label>Priorytet</label>
        <select id="kPrio" class="inp"><option value="normal">Zwykły</option><option value="high">Pilny</option><option value="low">Niski</option></select></div>
      <button id="kBtn" class="btn" onclick="addKonserwTask()">Dodaj zadanie</button>
      <div id="kMsg" class="msg"></div>
    </div>`;
  const cards = names.map(n => {
    const mine = faults.filter(f => (f.assigned_to||"").trim() === n);
    const open = mine.filter(f => (f.status||"open")==="open").length;
    const prog = mine.filter(f => f.status==="in_progress").length;
    const rows = mine.length ? mine.map(f => faultRow(f)).join("") : '<div class="rost-empty" style="font-size:12px;color:var(--muted);padding:4px 0">Brak otwartych zadań.</div>';
    return `<div class="wcard" style="cursor:default">
      <div class="wtop"><span class="av">${esc(initials(n))}</span><span class="nm">${esc(n)}</span>
        <span class="prog">${open}+${prog}</span></div>
      <div class="note" style="margin-top:2px">otwarte: ${open} · w toku: ${prog}</div>
      <div style="margin-top:8px">${rows}</div>
    </div>`;
  }).join("");
  const un = faults.filter(f => !(f.assigned_to||"").trim());
  const unHtml = un.length ? `<div class="soon">Nieprzypisane (${un.length})</div>${un.map(f=>faultRow(f)).join("")}` : "";
  body(form + `<div class="soon">Obciążenie konserwatorów</div>` + cards + unHtml);
}
function faultRow(f){
  const p = PRIO[f.priority] || PRIO.normal;
  const loc = f.space_id || f.room || "";
  return `<div class="statrow" style="margin-bottom:6px;align-items:flex-start">
    <div class="k"><div style="font-size:13px">${esc(f.description||"")}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">
        ${loc?esc(loc)+" · ":""}${FSTATUS[f.status]||f.status}${f.reported_by?" · zgł. "+esc(f.reported_by):""}</div></div>
    <span class="chip" style="color:${p.c};border-color:${p.c}55">${p.l}</span>
  </div>`;
}
window.addKonserwTask = async () => {
  const desc = (document.getElementById("kDesc")||{}).value || "";
  const who  = (document.getElementById("kWho")||{}).value || "";

// ── Plan: dzienne zadania (np. Parking) dla konserwatorów + odpowiedź/status ──
const PLAN_TYPES = ["Parking","Sprzątanie terenu","Przegląd techniczny","Inne"];
async function loadPlan() {
  let rows = [];
  const fromKey = isoDate(new Date(Date.now() - 7*864e5));
  try { const { data } = await sb.from("panel_plan").select("id,plan,date,task,assigned_to,response,status,created_by")
      .eq("tenant_id", TENANT_ID).gte("date", fromKey).order("date", { ascending:false }).limit(200); rows = data || []; }
  catch { return body('<div class="empty">Nie udało się pobrać planu.</div>'); }
  const today = isoDate(new Date());
  const form = `<div class="card" style="margin-bottom:12px">
    <div class="soon" style="margin-top:0">Dodaj zadanie do planu</div>
    <div class="field"><label>Plan</label><select id="plKind" class="inp">${PLAN_TYPES.map(t=>`<option>${esc(t)}</option>`).join("")}</select></div>
    <div class="field"><label>Dzień</label><input id="plDate" class="inp" type="date" value="${today}"/></div>
    <div class="field"><label>Co wykonać</label><input id="plTask" class="inp" placeholder="np. Sprawdzić miejsca 1–20, odśnieżyć wjazd"/></div>
    <div class="field"><label>Przypisz do</label><select id="plWho" class="inp"><option value="">— dowolny —</option>${KONSERW_BASE.map(n=>`<option>${esc(n)}</option>`).join("")}</select></div>
    <button id="plBtn" class="btn" onclick="addPlan()">Dodaj do planu</button>
    <div id="plMsg" class="msg"></div>
  </div>`;
  if (!rows.length) return body(form + '<div class="empty">Brak zadań w planie (ostatnie 7 dni).</div>');
  const byPlan = {};
  rows.forEach(r => { (byPlan[r.plan] = byPlan[r.plan] || {})[r.date] = (byPlan[r.plan][r.date] || []); byPlan[r.plan][r.date].push(r); });
  const sections = Object.keys(byPlan).sort().map(pl => {
    const blocks = Object.keys(byPlan[pl]).sort().reverse().map(dk => {
      const d = fmtDate(dk);
      const items = byPlan[pl][dk].map(r => planRow(r)).join("");
      return `<div style="margin-bottom:8px"><div style="font-size:11.5px;font-weight:800;color:var(--muted);margin:2px 0">${d.dow}, ${d.txt}</div>${items}</div>`;
    }).join("");
    return `<div class="soon">📋 ${esc(pl)}</div>${blocks}`;
  }).join("");
  body(form + sections);
}
function planRow(r) {
  const done = r.status === "done";
  return `<div class="statrow" style="flex-direction:column;align-items:stretch;gap:5px;${done?"opacity:.7":""}">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="k" style="flex:1;${done?"text-decoration:line-through":""}">${esc(r.task||"")}</span>
      ${r.assigned_to?`<span class="chip">${esc(r.assigned_to)}</span>`:""}
      <span class="chip" style="color:${done?"var(--ok)":"var(--muted)"}">${done?"wykonane":"do zrobienia"}</span>
    </div>
    ${r.response?`<div style="font-size:12.5px;color:var(--ink);background:rgba(31,122,82,.06);border:1px solid rgba(31,122,82,.25);border-radius:8px;padding:7px 9px">💬 ${esc(r.response)}</div>`:""}
    <div style="display:flex;gap:7px">
      <button class="rost-addbtn" style="padding:6px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:11.5px;cursor:pointer" onclick="planRespond('${r.id}')">Odpowiedź</button>
      ${done?`<button class="rost-addbtn" style="padding:6px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--muted);font-weight:800;font-size:11.5px;cursor:pointer" onclick="planStatus('${r.id}','open')">Cofnij</button>`
            :`<button class="rost-addbtn" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(31,122,82,.4);background:rgba(31,122,82,.08);color:var(--ok);font-weight:800;font-size:11.5px;cursor:pointer" onclick="planStatus('${r.id}','done')">✓ Wykonane</button>`}
    </div>
  </div>`;
}
window.addPlan = async () => {

// ── Zmiany: grafik przydzielony (mirror "schedule" z aplikacji recepcji) ──
const DOW_SH = ["Pn","Wt","Śr","Cz","Pt","Sb","Nd"];
const SHIFT_CODE2 = { poranna:"P", popoludniowa:"PP", wieczorowa:"W", dzienna:"D", nocna:"N" };
async function loadZmiany() {
  const sched = await getMirror("schedule");
  if (!sched || typeof sched !== "object" || !Object.keys(sched).length)
    return body('<div class="empty">Brak grafiku przydzielonego. Pojawi się, gdy recepcja zapisze grafik w aplikacji (po wdrożeniu nowej wersji aplikacji recepcji).</div>');
  const mon = (()=>{ const d=new Date(); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); d.setHours(0,0,0,0); return d; })();
  const days = [...Array(7)].map((_,i)=> isoDate(new Date(mon.getTime()+i*86400000)));
  const emps = [...new Set(days.flatMap(dk => { const day=sched[dk]; return day&&typeof day==="object" ? Object.keys(day).filter(e=>day[e]) : []; }))].sort((a,b)=>a.localeCompare(b,"pl"));
  if (!emps.length) return body('<div class="empty">Brak przypisań w tym tygodniu.</div>');
  const head = `<th style="text-align:left;padding:7px 9px;position:sticky;left:0;background:var(--cream)">Pracownik</th>` +
    days.map((d,i)=>`<th style="padding:7px 6px;font-size:11px;color:var(--muted)">${DOW_SH[i]}<br><span style="font-weight:400">${d.slice(8)}</span></th>`).join("");
  const rows = emps.map(emp => {
    const cells = days.map(dk => {
      const e = sched[dk] && sched[dk][emp];
      if (!e) return `<td style="text-align:center;padding:5px 6px;color:var(--line-strong)">·</td>`;
      const code = SHIFT_CODE2[e.shift] || (e.shift?String(e.shift).slice(0,2).toUpperCase():"✓");
      const hrs = (e.start||e.end) ? `${e.start||""}${e.end?"-"+e.end:""}` : "";
      return `<td style="text-align:center;padding:5px 6px"><span style="font-weight:900;font-size:12px;color:var(--plum)">${esc(code)}</span>${hrs?`<div style="font-size:10px;color:var(--muted)">${esc(hrs)}</div>`:""}</td>`;
    }).join("");
    return `<tr><td style="padding:6px 9px;font-weight:700;font-size:13px;position:sticky;left:0;background:var(--paper);border-right:1px solid var(--line)">${esc(emp)}</td>${cells}</tr>`;
  }).join("");
  body(`<div class="note" style="margin-top:0;margin-bottom:8px">Grafik przydzielony — bieżący tydzień (z aplikacji recepcji).</div>
    <div class="fullspan" style="overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--paper)">
      <table style="border-collapse:collapse;min-width:100%"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`);
}

// ── Tablica: stałe przypomnienia (standing_reminders) + ostatnie ogłoszenia (manager_alerts) ──
async function loadTablica() {
  let rem = [], alr = [];
  try {
    const [r1, r2] = await Promise.all([
      sb.from("standing_reminders").select("id,title,body,active,created_by,created_at").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(60),
      sb.from("manager_alerts").select("title,body,priority,created_by,created_at,done").eq("tenant_id", TENANT_ID).order("created_at", { ascending:false }).limit(30),
    ]);
    rem = (r1.data || []).filter(r => r.active !== false);
    alr = (r2.data || []).filter(a => !a.done);
  } catch { return body('<div class="empty">Nie udało się pobrać tablicy.</div>'); }
  const form = `<div class="card" style="margin-bottom:12px">
    <div class="soon" style="margin-top:0">Dodaj stałe przypomnienie</div>
    <div class="field"><label>Treść</label><input id="srTitle" class="inp" placeholder="np. Zawsze sprawdzaj depozyt przy check-in" onkeydown="if(event.key==='Enter')addReminder()"/></div>
    <button id="srBtn" class="btn" onclick="addReminder()">Dodaj przypomnienie</button>
    <div id="srMsg" class="msg"></div>
  </div>`;
  const remList = rem.length ? rem.map(r => `<div class="statrow">
      <span class="k">📌 ${esc(r.title||"")}${r.body?` — <span style="color:var(--muted);font-weight:600">${esc(r.body)}</span>`:""}</span>
      <button class="rost-addbtn" style="padding:6px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--bad);font-weight:800;font-size:11.5px;cursor:pointer" onclick="removeReminder('${r.id}')">Usuń</button>
    </div>`).join("") : '<div class="empty">Brak stałych przypomnień.</div>';
  const alrList = alr.length ? alr.map(a => {
    const when = a.created_at ? new Date(a.created_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    const p = PRIO[a.priority] || PRIO.normal;
    return `<div class="statrow" style="flex-direction:column;align-items:flex-start;gap:3px">
      <div style="display:flex;gap:8px;width:100%;align-items:center"><span class="chip" style="color:${p.c};border-color:${p.c}55">${p.l}</span><span class="k" style="flex:1">${esc(a.title||"")}</span><span class="tm" style="font-size:11px;color:var(--muted)">${esc(when)}</span></div>
      ${a.body?`<div style="font-size:12.5px;color:var(--muted)">${esc(a.body)}</div>`:""}
    </div>`; }).join("") : '<div class="empty">Brak ogłoszeń.</div>';
  body(form + `<div class="soon">Stałe przypomnienia</div>` + remList + `<div class="soon">Ostatnie ogłoszenia</div>` + alrList);
}
window.addReminder = async () => {
  const t = (document.getElementById("srTitle")||{}).value || "";
  const msg = document.getElementById("srMsg"), btn = document.getElementById("srBtn");
  const setM = (x,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=x||""; } };
  if (!t.trim()) return setM("Wpisz treść.", "err");
  if (btn){ btn.disabled=true; btn.textContent="Dodaję…"; }
  try {
    const { error } = await sb.from("standing_reminders").insert({ tenant_id:TENANT_ID, title:t.trim(), body:"", active:true, created_by:CURRENT.name||"Panel" });
    if (error) throw error;
    try { await sb.rpc("log_action", { p_action:"przypomnienie_dodane", p_detail:t.trim() }); } catch {}
    loadTablica();
  } catch (e) { setM((e&&e.message)||"Nie udało się.", "err"); if (btn){ btn.disabled=false; btn.textContent="Dodaj przypomnienie"; } }
};
window.removeReminder = async (id) => {
  try { const { error } = await sb.from("standing_reminders").update({ active:false }).eq("id", id); if (error) throw error; loadTablica(); }
  catch (e) { alert((e&&e.message)||"Błąd."); }
};

// ── Akcje HK: operacyjny feed działu HK (hk_logs + zgłoszone usterki) ──
async function loadAkcjeHK() {
  const from = isoDate(new Date(Date.now() - 2*864e5));
  let logs = [], faults = [];
  try {
    const [r1, r2] = await Promise.all([
      sb.from("hk_logs").select("action,worker,room,extra,log_time,created_at,date").gte("date", from).order("created_at", { ascending:false }).limit(60),
      sb.from("faults").select("source,description,room,space_id,reported_by,reported_at").eq("source","hk").order("reported_at", { ascending:false }).limit(30),
    ]);
    logs = r1.data || []; faults = r2.data || [];
  } catch { return body('<div class="empty">Nie udało się pobrać akcji HK.</div>'); }
  const items = [];
  logs.forEach(l => items.push({ ts:l.created_at||l.date, col:FEED_COLOR[l.action]||"var(--muted)", icon:FEED_ICON[l.action]||"·", text:feedText(l), time:l.log_time }));
  faults.forEach(f => items.push({ ts:f.reported_at, col:"#c2415a", icon:"⚠", text:`${f.reported_by||"HK"} zgłosił usterkę: ${f.description||""}${(f.room||f.space_id)?" ("+(f.room||f.space_id)+")":""}` }));
  items.sort((a,b)=>String(b.ts||"").localeCompare(String(a.ts||"")));
  if (!items.length) return body('<div class="empty">Brak akcji HK z ostatnich dni.</div>');
  const html = items.slice(0,80).map(it => {
    const t = it.time || (it.ts ? new Date(it.ts).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "");
    return `<div class="fitem"><span class="ic" style="color:${it.col}">${it.icon}</span><span>${esc(it.text)}</span><span class="tm">${esc(t)}</span></div>`;
  }).join("");
  body(`<div class="note" style="margin-top:0;margin-bottom:8px">Akcje działu HK — kto zaczął/skończył pokój, co puste, wymiany, zgłoszone usterki.</div><div class="feed">${html}</div>`);
}

// ── Akcje: spis kto co zrobił / edytował (panel_audit) ──
const AUDIT_LBL = { grafik_utworzony:"Wysłał grafik", grafik_wpis:"Wpis w grafiku",
                    grafik_edycja:"Edycja grafiku", zadanie_dodane:"Dodał zadanie",
                    zadanie_konserwator:"Zadanie dla konserwatora", zadanie_zrobione:"Zadanie zrobione",
                    konto_dodane:"Dodał konto", konto_rola:"Zmienił rolę", konto_aktywne:"Aktywność konta",
                    konto_reset:"Reset hasła konta", konto_haslo:"Ustawił hasło konta",
                    grafik_link_reset:"Odświeżył link grafiku", obsada_zapis:"Zapis obsady",
                    przypomnienie_dodane:"Dodał przypomnienie", plan_dodane:"Dodał zadanie do planu",
                    konto_login:"Zmienił login", grafik_wyslany:"Wysłał grafik do aplikacji" };
async function loadAkcje() {
  if (CURRENT.role === "mgr_hk") return loadAkcjeHK();
  let rows = [];
  try { const { data } = await sb.rpc("list_panel_audit"); rows = data || []; }
  catch { return body('<div class="empty">Nie udało się pobrać akcji.</div>'); }
  if (!rows.length) return body('<div class="empty">Brak zarejestrowanych akcji.</div>');
  const html = rows.map(r => {
    const when = r.created_at ? new Date(r.created_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
    const lbl = AUDIT_LBL[r.action] || r.action;
    const role = r.actor_role ? ` <span style="color:var(--muted);font-weight:600">(${esc(ROLE_LABEL(r.actor_role))})</span>` : "";
    return `<div class="fitem"><span class="ic">•</span>
      <span><b>${esc(r.actor||"—")}</b>${role} — ${esc(lbl)}${r.detail?`: ${esc(r.detail)}`:""}</span>
      <span class="tm">${esc(when)}</span></div>`;
  }).join("");
  body(`<div class="note" style="margin-top:0;margin-bottom:8px">Ostatnie akcje w panelu — kto co zrobił lub edytował.</div><div class="feed">${html}</div>`);
}

// ── Konta (admin): dodawanie kont + role + aktywacja ──
const ROLE_OPTIONS = [["mgr_hk","Menedżer HK"],["koordynator","Koordynator"],["mgr_recepcja","Menedżer recepcji"],
  ["mgr_glowny","Menedżer główny"],["mgr_operacyjny","Menedżer operacyjny"],["mgr_gastro","Menedżer gastronomii"],["admin","Admin"]];
const roleSelect = (id, sel) => `<select id="${id}" class="inp">${ROLE_OPTIONS.map(([v,l])=>`<option value="${v}"${sel===v?" selected":""}>${l}</option>`).join("")}</select>`;
async function loadKonta() {
  let rows = [];
  try { const { data } = await sb.rpc("admin_list_accounts"); rows = data || []; }
  catch { return body('<div class="empty">Brak uprawnień lub błąd.</div>'); }
  const form = `
    <div class="card" style="margin-bottom:12px">
      <div class="soon" style="margin-top:0">Dodaj konto</div>
      <div class="field"><label>Imię (widoczne na liście logowania)</label>
        <input id="aName" class="inp" placeholder="np. Tetiana"/></div>
      <div class="field"><label>Rola</label>${roleSelect("aRole","mgr_hk")}</div>
      <div class="field"><label>Kod 1. logowania (opcjonalny)</label>
        <input id="aCode" class="inp" placeholder="np. 4821 — chroni przed przejęciem konta"/></div>
      <button id="aBtn" class="btn" onclick="addKonto()">Dodaj konto</button>
      <div id="aMsg" class="msg"></div>
      <div class="note">Hasło ustawi sama osoba przy pierwszym logowaniu. Jeśli podasz kod — przekaż go tej osobie.</div>
    </div>`;
  const list = rows.map(r => {
    const st = r.active === false ? "nieaktywne" : (r.claimed ? "aktywne · ma hasło" : "czeka na 1. logowanie");
    const stc = r.active === false ? "var(--bad)" : (r.claimed ? "var(--ok)" : "var(--muted)");
    return `<div class="wcard" style="cursor:default">
      <div class="wtop"><span class="av">${esc(initials(r.name))}</span>
        <span class="nm">${esc(r.name)}</span>
        <span style="font-size:11px;font-weight:800;color:${stc}">${st}</span></div>
      <div style="display:flex;gap:7px;margin-top:9px;align-items:center;flex-wrap:wrap">
        ${roleSelect("role_"+esc(r.email), r.role)}
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:none;background:var(--plum);color:#fff;font-weight:800;font-size:12px;cursor:pointer"
          onclick="saveKontoRole('${esc(r.email)}')">Zapisz rolę</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:${r.active===false?"var(--ok)":"var(--bad)"};font-weight:800;font-size:12px;cursor:pointer"
          onclick="toggleKonto('${esc(r.email)}', ${r.active===false})">${r.active===false?"Aktywuj":"Dezaktywuj"}</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12px;cursor:pointer"
          onclick="resetKonto('${esc(r.email)}','${esc(r.name)}')">Reset hasła</button>
        <button class="rost-addbtn" style="padding:8px 11px;border-radius:8px;border:1px solid var(--line-strong);background:var(--paper);color:var(--plum);font-weight:800;font-size:12px;cursor:pointer"
          onclick="renameKonto('${esc(r.email)}','${esc(r.name)}')">Zmień login</button>
      </div>
    </div>`;
  }).join("");
  body(form + `<div class="soon">Konta (${rows.length})</div>` + (list || '<div class="empty">Brak kont.</div>'));
}
window.addKonto = async () => {
  const name = (document.getElementById("aName")||{}).value || "";
  const role = (document.getElementById("aRole")||{}).value || "mgr_hk";
  const codeV = (document.getElementById("aCode")||{}).value || "";
  const msg = document.getElementById("aMsg"); const btn = document.getElementById("aBtn");
  const setM = (t,k)=>{ if(msg){ msg.className="msg "+(k||""); msg.textContent=t||""; } };
  if (!name.trim()) return setM("Wpisz imię.", "err");
  if (btn){ btn.disabled=true; btn.textContent="Dodaję…"; }
  try { const { error } = await sb.rpc("admin_add_account", { p_name: name.trim(), p_role: role, p_code: codeV.trim() });
    if (error) throw error;
    setM(codeV.trim() ? `Konto dodane. Kod 1. logowania: ${codeV.trim()} — przekaż osobie.` : "Konto dodane.", "info");
    setTimeout(loadKonta, 1400);
  } catch (e) { setM((e&&e.message)||"Nie udało się.", "err"); if (btn){ btn.disabled=false; btn.textContent="Dodaj konto"; } }
};
window.renameKonto = async (email, name) => {
  const nn = prompt(`Nowy login (imię) dla tego konta:`, name);
  if (nn == null || !nn.trim()) return;
  try { const { error } = await sb.rpc("admin_set_name", { p_email: email, p_name: nn.trim() }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd zmiany loginu."); }
};
window.resetKonto = async (email, name) => {
  const np = prompt(`Nowe hasło dla „${name}" (min. 6 znaków) — przekaż je tej osobie:`);
  if (np == null) return;
  if (np.length < 6) return alert("Hasło musi mieć min. 6 znaków.");
  try {
    const { data, error } = await sb.rpc("admin_set_password", { p_email: email, p_password: np });
    if (error) throw error;
    if (data === false) alert(`„${name}" nie logował(a) się jeszcze ani razu — ustawi hasło sam(a) przy pierwszym wejściu.`);
    else alert(`Hasło ustawione ✓ Przekaż „${name}": ${np}`);
    loadKonta();
  } catch (e) { alert((e&&e.message)||"Błąd resetu."); }
};
window.saveKontoRole = async (email) => {
  const role = (document.getElementById("role_"+email)||{}).value;
  try { const { error } = await sb.rpc("admin_set_role", { p_email: email, p_role: role }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd zmiany roli."); }
};
window.toggleKonto = async (email, makeActive) => {
  try { const { error } = await sb.rpc("admin_set_active", { p_email: email, p_active: makeActive }); if (error) throw error; loadKonta(); }
  catch (e) { alert((e&&e.message)||"Błąd."); }
};

window.doLogout = async () => {
  stopLive();
  await sb.auth.signOut();
  showLogin();
};
// Zmiana własnego hasła (zalogowany użytkownik).
window.changeMyPassword = async () => {
  const np = prompt("Podaj nowe hasło (min. 6 znaków):");
  if (np == null) return;
  if (np.length < 6) return alert("Hasło musi mieć min. 6 znaków.");
  try { const { error } = await sb.auth.updateUser({ password: np }); if (error) throw error; alert("Hasło zmienione ✓"); }
  catch (e) { alert((e&&e.message) || "Nie udało się zmienić hasła."); }
};

boot();
</script>

<script>
/* ── Interaktywna warstwa „atelier": jedwabista aurora + reflektor za kursorem/dotykiem ──
   Canvas 2D, ~4 oddychające plamy. Kap ~30 fps, DPR≤2, pauza gdy karta w tle.
   Respektuje prefers-reduced-motion (canvas wyłączony — zostaje statyczna aurora CSS). */
(function(){
  var c = document.getElementById('bgfx');
  if (!c || !c.getContext) return;
  var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)');
  if (rm && rm.matches) return;
  var ctx = c.getContext('2d');
  var W = 0, H = 0, M = 0, DPR = 1;

  // Plamy w barwach marki (plum / fiolet / złoto). r = promień bazowy, br = amplituda „oddechu".
  var blobs = [
    { col:'122,58,106', x:.18, y:.15, r:.60, br:.06, vx: .011, vy: .007, a:.30, ph:0.0 },
    { col:'150,92,152', x:.85, y:.12, r:.54, br:.07, vx:-.009, vy: .010, a:.26, ph:1.6 },
    { col:'90,29,74',   x:.20, y:.90, r:.58, br:.05, vx: .010, vy:-.009, a:.27, ph:3.1 },
    { col:'176,134,58', x:.86, y:.86, r:.50, br:.06, vx:-.008, vy:-.010, a:.19, ph:4.5 }
  ];
  // Wskaźnik (mysz/dotyk): pozycja docelowa + wygładzona; reflektor podąża z opóźnieniem.
  var p = { x:.5, y:.42, tx:.5, ty:.42, on:0 };

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = c.clientWidth; H = c.clientHeight; M = Math.max(W, H);
    c.width = Math.round(W * DPR); c.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();

  function move(e){
    var t = e.touches ? e.touches[0] : e;
    if (!t) return;
    p.tx = t.clientX / Math.max(W,1);
    p.ty = t.clientY / Math.max(H,1);
    p.on = 1;
  }
  window.addEventListener('pointermove', move, { passive:true });
  window.addEventListener('touchmove', move, { passive:true });
  window.addEventListener('pointerout', function(){ p.on = 0; }, { passive:true });

  function softCircle(x, y, r, col, a){
    var g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,    'rgba('+col+','+a+')');
    g.addColorStop(.5,   'rgba('+col+','+(a*0.42)+')');
    g.addColorStop(1,    'rgba('+col+',0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
  }

  var last = 0, t = 0;
  function frame(now){
    requestAnimationFrame(frame);
    if (document.hidden) return;
    if (now - last < 33) return;        // ~30 fps
    last = now; t += 0.012;

    p.x += (p.tx - p.x) * 0.055;
    p.y += (p.ty - p.y) * 0.055;

    ctx.clearRect(0, 0, W, H);

    // 1) jedwabista aurora — oddychające, dryfujące plamy
    ctx.globalCompositeOperation = 'source-over';
    for (var i = 0; i < blobs.length; i++){
      var b = blobs[i];
      b.x += b.vx * 0.0015; b.y += b.vy * 0.0015;
      if (b.x < -.12 || b.x > 1.12) b.vx *= -1;
      if (b.y < -.12 || b.y > 1.12) b.vy *= -1;
      var dx = p.x - b.x, dy = p.y - b.y, pull = p.on ? 0.09 : 0;
      var rr = (b.r + b.br * Math.sin(t + b.ph)) * M;   // „oddech"
      softCircle((b.x + dx*pull) * W, (b.y + dy*pull) * H, rr, b.col, b.a);
    }

    // 2) reflektor podążający za kursorem/dotykiem — światło ujawnia głębię
    if (p.on){
      var lx = p.x * W, ly = p.y * H;
      ctx.globalCompositeOperation = 'soft-light';       // głębszy plum pod światłem
      softCircle(lx, ly, 0.40 * M, '90,29,74', 0.30);
      ctx.globalCompositeOperation = 'lighter';          // ciepły rdzeń światła
      softCircle(lx, ly, 0.26 * M, '255,246,236', 0.10);
      ctx.globalCompositeOperation = 'source-over';
    }
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
